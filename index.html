<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Technical Formulations - Operations View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #141618; color: #e8e6e0; font-size: 14px; min-height: 100vh; }
  .shell { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .brand img { height: 54px; width: auto; background: #fff; border-radius: 8px; padding: 4px 8px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-name { font-size: 20px; font-weight: 500; color: #e8e6e0; line-height: 1.2; }
  .brand-sub { font-size: 13px; color: #888780; margin-top: 3px; }
  .nav-area { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .nav-top { display: flex; gap: 6px; }
  .nav-top button { padding: 6px 18px; border-radius: 20px; border: 0.5px solid #444441; background: transparent; cursor: pointer; font-size: 13px; color: #888780; font-family: system-ui, sans-serif; transition: all .15s; }
  .nav-top button.active { background: #378ADD; color: #fff; border-color: transparent; }
  .nav-sub { display: flex; border: 0.5px solid #444441; border-radius: 20px; overflow: hidden; }
  .nav-sub button { padding: 5px 18px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: #888780; font-family: system-ui, sans-serif; transition: all .15s; }
  .nav-sub button:not(:first-child) { border-left: 0.5px solid #444441; }
  .nav-sub button.active { background: #1D9E75; color: #fff; font-weight: 500; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 1rem; }
  .metric .label { font-size: 11px; color: #888780; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .metric .value { font-size: 22px; font-weight: 500; line-height: 1; color: #e8e6e0; }
  .metric .sub { font-size: 11px; color: #5f5e5a; margin-top: 4px; }
  .metric .yoy { margin-top: 6px; }
  .metric.good .value { color: #1D9E75; }
  .metric.warn .value { color: #EF9F27; }
  .metric.info .value { color: #378ADD; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .chart-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; }
  .chart-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .full-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; margin-bottom: 10px; }
  .full-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filters select, .filters input { padding: 6px 10px; border: 0.5px solid #444441; border-radius: 8px; background: #1e2124; color: #e8e6e0; font-size: 13px; }
  .filters select option { background: #1e2124; color: #e8e6e0; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #2c2c2a; color: #888780; font-weight: 500; white-space: nowrap; cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  thead th:hover { color: #e8e6e0; }
  tbody tr { border-bottom: 0.5px solid #2c2c2a; }
  tbody tr:hover { background: #252829; }
  tbody td { padding: 6px 10px; white-space: nowrap; color: #e8e6e0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.complete { background: #0F6E56; color: #9FE1CB; }
  .badge.partial { background: #633806; color: #FAC775; }
  .badge.neg-dev { background: #791F1F; color: #F09595; }
  .badge.pos-dev { background: #0F6E56; color: #9FE1CB; }
  .loading { text-align: center; padding: 3rem; color: #888780; }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: #888780; }
  .pagination button { padding: 4px 10px; border: 0.5px solid #444441; border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; color: #e8e6e0; }
  .pagination button:disabled { opacity: .3; cursor: default; }
  @keyframes dtfPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#141618;">
  <div style="background:#1e2124;border:0.5px solid #2c2c2a;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center">
    <img src="DTF_Logo.png" alt="DTF" onerror="this.style.display='none'" style="height:54px;width:auto;background:#fff;border-radius:8px;padding:4px 8px;margin-bottom:1.5rem">
    <div style="font-size:18px;font-weight:500;color:#e8e6e0;margin-bottom:4px">Dynamic Technical Formulations</div>
    <div style="font-size:13px;color:#888780;margin-bottom:2rem">Operations View</div>
    <input id="pw-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()" style="width:100%;padding:10px 14px;border:0.5px solid #444441;border-radius:8px;background:#141618;color:#e8e6e0;font-size:14px;margin-bottom:10px;outline:none;display:block">
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer">Sign in</button>
    <div id="pw-error" style="color:#F09595;font-size:12px;margin-top:10px;display:none">Incorrect password. Please try again.</div>
  </div>
</div>

<div id="main-app" style="display:none">
<div class="shell">
  <div class="top-bar">
    <div class="brand">
      <img src="DTF_Logo.png" alt="DTF Logo" onerror="this.style.display='none'">
      <div>
        <div class="brand-name">Dynamic Technical Formulations</div>
        <div class="brand-sub">Operations View</div>
      </div>
    </div>
    <div class="nav-area">
      <div class="nav-top">
        <button class="active" onclick="setTop('summary')">Summary</button>
        <button onclick="setTop('detail')">Detail</button>
      </div>
      <div class="nav-sub" id="sub-nav">
        <button class="active" onclick="setSub('today')">Daily</button>
        <button onclick="setSub('performance')">Performance</button>
      </div>
    </div>
  </div>
  <div id="loading" class="loading">Loading production data...</div>
  <div id="content" style="display:none"></div>
</div>
</div>

<script>
var CORRECT_PW = 'DTF2026!';
var CSV_2026 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=943770391&single=true&output=csv';
var CSV_2025 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=2024063496&single=true&output=csv';
var CSV_TARGETS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=1686526578&single=true&output=csv';
var YEAR_TARGET = 3927000;
var WEEKLY_TARGET = Math.round(YEAR_TARGET / 52);
var ALL_LINES = ['Line #1', 'Line #2', 'Line #4'];
var LINE_COLOR = {'line#1':'#378ADD','line#2':'#7F77DD','line#4':'#D4537E'};
var LINE_TRACK = {'line#1':'#061d35','line#2':'#1a1840','line#4':'#4B1528'};
var LINE_BG    = {'line#1':'#0C447C','line#2':'#3C3489','line#4':'#72243E'};
var LINE_TXT   = {'line#1':'#85B7EB','line#2':'#AFA9EC','line#4':'#ED93B1'};
var LINE_TYPE  = {'line#1':'Powder','line#2':'Capsules','line#4':'Powder'};

var allRows = [], allRows25 = [], lotMap = {}, dailyTargets = {};
var topView = 'summary', subView = 'today';
var sortCol = 'date', sortDir = -1, page = 1, PAGE_SIZE = 50;
var charts = {}, todayTimer = null, refreshTimer = null;
var productionDays = [], selectedDayIdx = -1;

function lk(s) { return (s||'').replace(/\s/g,'').toLowerCase(); }

function checkPw() {
  var v = document.getElementById('pw-input').value;
  if (v === CORRECT_PW) {
    sessionStorage.setItem('dtf_auth','1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

if (sessionStorage.getItem('dtf_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  loadDashboard();
}

function parseCSV(text) {
  var clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  var lines = clean.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.replace(/^"|"$/g,'').trim().replace(/^\uFEFF/,''); });
  return lines.slice(1).map(function(line) {
    var vals = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    return headers.reduce(function(o,h,i){ o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); return o; }, {});
  });
}

function isValid(r) {
  if (!r || typeof r !== 'object') return false;
  var d=(r['Date']||'').trim(), l=(r['Lot Number']||'').trim(), p=(r['Product']||'').trim();
  if (!d||!l||!p) return false;
  if (p.startsWith('#')||l.startsWith('#')||d.startsWith('#')) return false;
  return true;
}

function num(v) {
  if (!v && v !== 0) return 0;
  var n = parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}

function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }

function buildLotMap(rows) {
  var m = {};
  rows.forEach(function(r) {
    if (!r||typeof r!=='object') return;
    var lot = (r['Lot Number']||'').trim(); if (!lot) return;
    if (!m[lot]) m[lot] = { lot:lot, date:r['Date']||'', product:r['Product']||'', bottleSize:r['Bottle Size']||'', jarSize:r['Jar Size']||'', projected:num(r['Projected Units']), finalUnits:0, status:r['Complete or Partial']||'', week:r['WEEK NUMBER']||'', line:r['Line']||'' };
    m[lot].finalUnits += num(r['Final Units']);
    if (r['Complete or Partial']) m[lot].status = r['Complete or Partial'];
    if (!m[lot].line && r['Line']) m[lot].line = r['Line'];
    if (!m[lot].date && r['Date']) m[lot].date = r['Date'];
  });
  return m;
}

function lotDev(l) {
  if (!l||!l.projected) return null;
  return ((l.finalUnits - l.projected) / l.projected) * 100;
}

function jarSizeKey(j) {
  if (!j) return null; j = j.trim();
  var gm = j.match(/(\d+(?:\.\d+)?)\s*gallon/i); if (gm) return gm[1]+' Gallon';
  var um = j.match(/^(\d+(?:\.\d+)?)\s*(oz|cc|ml|lb|gal|g)\b/i);
  if (um) { var n=um[1],u=um[2].toLowerCase(); return (u==='g'||u==='gal')?n+' Gallon':n+u; }
  return j;
}

function deltaTag(v26, v25, isHigherBetter, fmt, v25Label) {
  if (!v25 && v25 !== 0) return '';
  var diff = v26 - v25, pctDiff = v25 ? ((diff/Math.abs(v25))*100) : 0;
  var positive = isHigherBetter ? diff > 0 : diff < 0;
  var bg = positive ? '#085041' : '#791F1F', txt = positive ? '#9FE1CB' : '#F09595';
  var sign = diff > 0 ? '+' : '';
  var label = fmt === 'pct' ? sign+pctDiff.toFixed(1)+'% vs 2025' : sign+Math.round(diff).toLocaleString()+' vs 2025';
  return '<div style="font-size:10px;color:#5f5e5a;margin-bottom:3px">2025: '+(v25Label||v25.toLocaleString())+'</div>'
       + '<span style="display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:500;background:'+bg+';color:'+txt+'">'+label+'</span>';
}

function parseTargets(text) {
  if (!text) return {};
  try {
    var rows = parseCSV(text);
    var m = {};
    rows.forEach(function(r){
      var d = (r['Date']||'').trim(); if (!d) return;
      var dt = new Date(d); if (isNaN(dt)) return;
      var key = (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear();
      m[key] = {
        'Line #1': num(r['Line #1']||r['Line 1']||r['LINE #1']||''),
        'Line #2': num(r['Line #2']||r['Line 2']||r['LINE #2']||''),
        'Line #4': num(r['Line #4']||r['Line 4']||r['LINE #4']||'')
      };
    });
    return m;
  } catch(e) { return {}; }
}

function buildProductionDays() {
  var now = new Date();
  var todayStr = (now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear();
  var seen = new Set();
  allRows.forEach(function(r){
    var d = (r['Date']||'').trim(); if (!d) return;
    var dt = new Date(d); if (isNaN(dt)) return;
    seen.add((dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear());
  });
  var days = Array.from(seen).sort(function(a,b){ return new Date(a)-new Date(b); });
  if (!seen.has(todayStr)) days.push(todayStr);
  productionDays = days;
  selectedDayIdx = days.length - 1;
}

function loadDashboard() {
  fetchData().then(function(results) {
    allRows   = parseCSV(results[0]).filter(isValid);
    allRows25 = parseCSV(results[1]).filter(isValid);
    dailyTargets = parseTargets(results[2]);
    lotMap = buildLotMap(allRows);
    buildProductionDays();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
    startRefreshTimers();
  }).catch(function(e){ document.getElementById('loading').textContent='Failed to load data: '+e.message; });
}

function fetchWithRetry(url, retries, delay) {
  retries = retries || 3; delay = delay || 1500;
  return fetch(url).then(function(r){
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).catch(function(e){
    if (retries <= 1) throw e;
    return new Promise(function(res){ setTimeout(res, delay); })
      .then(function(){ return fetchWithRetry(url, retries-1, delay*1.5); });
  });
}

function fetchData() {
  return Promise.all([
    fetchWithRetry(CSV_2026),
    fetchWithRetry(CSV_2025),
    fetchWithRetry(CSV_TARGETS).catch(function(){ return ''; })
  ]);
}

function applyFreshData(res) {
  // Parse everything into locals first — only swap globals once all data is ready
  var newRows   = parseCSV(res[0]).filter(isValid);
  var newRows25  = parseCSV(res[1]).filter(isValid);
  var newTargets = parseTargets(res[2]);
  // Validate: if the primary sheet came back nearly empty, something went wrong — abort
  if (newRows.length < 3) { console.warn('Refresh aborted: suspiciously few rows returned'); return false; }
  var newLotMap  = buildLotMap(newRows);
  // Atomic swap
  allRows = newRows; allRows25 = newRows25; dailyTargets = newTargets; lotMap = newLotMap;
  buildProductionDays();
  return true;
}

function startRefreshTimers() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (todayTimer) clearInterval(todayTimer);
  refreshTimer = setInterval(function(){
    fetchData().then(function(res){
      if(applyFreshData(res)){
        if(topView==='summary'&&subView==='performance') render();
        else if(topView==='detail') render();
      }
    }).catch(function(e){ console.error('Background refresh failed:', e); });
  }, 5*60*1000);
  todayTimer = setInterval(function(){
    if(topView==='summary'&&subView==='today'){
      fetchData().then(function(res){
        if(applyFreshData(res)) render();
      }).catch(function(e){ console.error('Today refresh failed:', e); });
    }
  }, 60*1000);
}

function setTop(v) {
  topView = v;
  document.querySelectorAll('.nav-top button').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&v==='summary')||(i===1&&v==='detail'));
  });
  document.getElementById('sub-nav').style.display = v==='summary'?'flex':'none';
  render();
}

function setSub(v) {
  subView = v;
  document.querySelectorAll('.nav-sub button').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&v==='today')||(i===1&&v==='performance'));
  });
  render();
}

function navDay(dir) {
  var scrollY = window.scrollY;
  selectedDayIdx = Math.max(0, Math.min(productionDays.length-1, selectedDayIdx+dir));
  render();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ window.scrollTo(0, scrollY); }); });
}

function goLive() {
  var scrollY = window.scrollY;
  selectedDayIdx = productionDays.length - 1;
  render();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ window.scrollTo(0, scrollY); }); });
}

function pickDay(str) {
  var scrollY = window.scrollY;
  var idx = productionDays.indexOf(str);
  if (idx !== -1) selectedDayIdx = idx;
  closePicker();
  render();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ window.scrollTo(0, scrollY); }); });
}

function openPicker() {
  var existing = document.getElementById('day-picker');
  if (existing) { closePicker(); return; }
  var now = new Date();
  var todayStr = (now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear();
  var selected = productionDays[selectedDayIdx];
  var byMonth = {};
  productionDays.forEach(function(d){
    var dt = new Date(d); if(isNaN(dt)) return;
    var k = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    if(!byMonth[k]) byMonth[k] = {label: dt.toLocaleDateString('en-US',{month:'long',year:'numeric'}), days:[]};
    byMonth[k].days.push({str:d, dt:dt});
  });
  var monthsHTML = Object.keys(byMonth).sort().reverse().map(function(k){
    var mo = byMonth[k];
    var firstDay = new Date(mo.days[0].dt.getFullYear(), mo.days[0].dt.getMonth(), 1);
    var daysInMonth = new Date(firstDay.getFullYear(), firstDay.getMonth()+1, 0).getDate();
    var startDow = firstDay.getDay();
    var dataByDay = {};
    mo.days.forEach(function(d){ dataByDay[d.dt.getDate()] = d.str; });
    var cells = '';
    for(var i=0;i<startDow;i++) cells += '<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      var str = dataByDay[day];
      var isSelected = str && str===selected;
      var isToday = str && str===todayStr;
      var hasData = !!str;
      var bg = isSelected?'#1D9E75':isToday?'#0C447C':'transparent';
      var color = isSelected?'#fff':isToday?'#85B7EB':hasData?'#e8e6e0':'#444441';
      var cursor = hasData?'pointer':'default';
      var onclick = hasData?'pickDay(\''+str+'\')':'';
      cells += '<div onclick="'+onclick+'" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:'+(isSelected||isToday?'500':'400')+';color:'+color+';background:'+bg+';cursor:'+cursor+'">'+day+'</div>';
    }
    return '<div style="margin-bottom:1rem"><div style="font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">'+mo.label+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,30px);gap:2px;">'
      +'<div style="font-size:10px;color:#5f5e5a;text-align:center">Su</div><div style="font-size:10px;color:#5f5e5a;text-align:center">Mo</div><div style="font-size:10px;color:#5f5e5a;text-align:center">Tu</div><div style="font-size:10px;color:#5f5e5a;text-align:center">We</div><div style="font-size:10px;color:#5f5e5a;text-align:center">Th</div><div style="font-size:10px;color:#5f5e5a;text-align:center">Fr</div><div style="font-size:10px;color:#5f5e5a;text-align:center">Sa</div>'
      +cells+'</div></div>';
  }).join('');
  var picker = document.createElement('div');
  picker.id = 'day-picker';
  picker.style.cssText = 'position:absolute;z-index:1000;background:#1e2124;border:0.5px solid #444441;border-radius:12px;padding:1rem;max-height:400px;overflow-y:auto;min-width:240px;right:0;top:44px;';
  picker.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem"><span style="font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em">Select date</span><button onclick="closePicker()" style="background:transparent;border:none;color:#888780;cursor:pointer;font-size:16px;line-height:1;padding:0">&#x2715;</button></div>'+monthsHTML;
  picker.addEventListener('click', function(e){ e.stopPropagation(); });
  var anchor = document.getElementById('date-nav-anchor');
  if (anchor) { anchor.style.position = 'relative'; anchor.appendChild(picker); }
  setTimeout(function(){ document.addEventListener('click', closePicker, {once:true}); }, 0);
}

function closePicker() {
  var p = document.getElementById('day-picker');
  if (p) p.remove();
}

function render() {
  Object.values(charts).forEach(function(c){ try{c.destroy();}catch(e){} });
  charts = {};
  try {
    if (topView==='detail') renderDetail();
    else if (subView==='today') renderToday();

function prepData() {
  var now = new Date();
  var lots = Object.values(lotMap).filter(Boolean);
  var completeLots = lots.filter(function(l){return l.status.toLowerCase().includes('complete');});
  var partialLots  = lots.filter(function(l){return l.status.toLowerCase().includes('partial');});
  var totalUnits   = lots.reduce(function(s,l){return s+l.finalUnits;},0);
  var totalProj    = lots.reduce(function(s,l){return s+l.projected;},0);
  var uniqueProds  = new Set(lots.map(function(l){return l.product;})).size;
  var uniqueCusts  = new Set(lots.map(function(l){return (l.product||'').split('-')[0].trim();}).filter(Boolean)).size;
  var totalLots    = lots.length;
  var devs         = lots.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var avgDev       = devs.length ? devs.reduce(function(s,d){return s+d;},0)/devs.length : 0;
  var highDevCount = devs.filter(function(d){return d<-5;}).length;
  var uniqDays     = new Set(lots.map(function(l){return l.date;}).filter(Boolean)).size;
  var avgPerDay    = uniqDays ? Math.round(totalUnits/uniqDays) : 0;
  var now25mo = now.getMonth(), now25dy = now.getDate();
  var rows25ytd = allRows25.filter(function(r){
    var d=new Date(r['Date']); if(isNaN(d)) return false;
    return (d.getMonth()<now25mo)||(d.getMonth()===now25mo&&d.getDate()<=now25dy);
  });
  var total25     = rows25ytd.reduce(function(s,r){return s+num(r['Final Units']);},0);
  var lots25Map   = buildLotMap(rows25ytd);
  var lots25      = Object.values(lots25Map).filter(Boolean);
  var comp25      = lots25.filter(function(l){return l.status.toLowerCase().includes('complete');}).length;
  var total25lots = lots25.length;
  var comp25pct   = total25lots?Math.round((comp25/total25lots)*100):0;
  var uniqDays25  = new Set(lots25.map(function(l){return l.date;}).filter(Boolean)).size;
  var avg25perDay = uniqDays25?Math.round(total25/uniqDays25):0;
  var devs25      = lots25.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var avgDev25    = devs25.length?devs25.reduce(function(s,d){return s+d;},0)/devs25.length:0;
  var custs25     = new Set(lots25.map(function(l){return (l.product||'').split('-')[0].trim();}).filter(Boolean)).size;
  var byLine={};
  allRows.forEach(function(r){
    var line=(r['Line']||'').trim(); if(!line) return;
    if(!byLine[line]) byLine[line]={units:0,lots:new Set()};
    byLine[line].units+=num(r['Final Units']); byLine[line].lots.add(r['Lot Number']);
  });
  var lineEntries=Object.entries(byLine).sort(function(a,b){return parseInt(a[0].replace(/\D/g,''))-parseInt(b[0].replace(/\D/g,''));});
  var lineAvg={};
  lineEntries.forEach(function(e){lineAvg[e[0]]=uniqDays?Math.round(e[1].units/uniqDays):0;});
  return {now,lots,completeLots,partialLots,totalUnits,totalProj,uniqueProds,uniqueCusts,totalLots,devs,avgDev,highDevCount,uniqDays,avgPerDay,total25,total25lots,comp25pct,avg25perDay,avgDev25,custs25,lineEntries,lineAvg,comp25};
}

function animateGauges(gaugeData, todayTotal, totalGoal, barColor) {
  var DURATION = 1200, start = null;
  function easeOut(t){ return 1-Math.pow(1-t,3); }
  function drawDial(idx, color, track, frac) {
    var canvas=document.getElementById('dial_'+idx); if(!canvas) return 0;
    var ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, cx=W/2, cy=H-8, r=Math.min(cx,cy)-8, lw=11;
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.strokeStyle=track;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
    if(frac>0){ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,Math.PI+Math.min(frac,1)*Math.PI);ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();}
    var p=Math.round(frac*100);
    ctx.fillStyle='#888780';ctx.font='500 12px system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p+'%',cx,cy-r*0.38);
    return p;
  }
  function draw(ts) {
    if(!start) start=ts;
    var t=Math.min((ts-start)/DURATION,1), e=easeOut(t);
    gaugeData.forEach(function(g){
      var frac=g.avg?(g.units/g.avg):0, hit=frac>=1;
      var p=drawDial(g.idx, hit?'#1D9E75':g.color, hit?'#085041':g.track, Math.min(frac*e,1));
      var ve=document.getElementById('gval_'+g.idx); if(ve){ve.textContent=Math.round(g.units*e).toLocaleString();ve.style.color=hit?'#1D9E75':g.color;}
      var be=document.getElementById('gbadge_'+g.idx); if(be){be.textContent=p+(g.sfx||'% of avg');if(hit){be.style.background='#085041';be.style.color='#9FE1CB';}}
    });
    var tp=totalGoal?Math.round((todayTotal*e)/totalGoal*100):0;
    var pp=document.getElementById('banner-pct'); if(pp) pp.textContent=tp+'%';
    var pt=document.getElementById('banner-total'); if(pt) pt.textContent=Math.round(todayTotal*e).toLocaleString();
    var bf=document.getElementById('banner-bar'); if(bf){bf.style.width=Math.min(tp,100)+'%';bf.style.background=barColor;}
    if(t>=1){
      gaugeData.forEach(function(g){
        var frac=g.avg?(g.units/g.avg):0, hit=frac>=1;
        drawDial(g.idx, hit?'#1D9E75':g.color, hit?'#085041':g.track, frac);
        var ve=document.getElementById('gval_'+g.idx); if(ve) ve.textContent=g.units.toLocaleString();
        var be=document.getElementById('gbadge_'+g.idx); if(be) be.textContent=Math.round(frac*100)+(g.sfx||'% of avg');
      });
      return;
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

function applyHitStates(gaugeData, todayTotal, totalGoal, statusLabel, statusColor) {
  gaugeData.forEach(function(g){
    var frac = g.avg ? (g.units/g.avg) : 0, hit = frac >= 1;
    var card = document.getElementById('gcard_'+g.idx);
    var check = document.getElementById('gcheck_'+g.idx);
    if(card) {
      if(hit) {
        card.style.border = '2.5px solid #1D9E75';
        card.style.boxShadow = '0 0 12px 2px rgba(29,158,117,0.45), 0 0 28px 4px rgba(29,158,117,0.18)';
      } else {
        card.style.border = '0.5px solid #2c2c2a';
        card.style.boxShadow = 'none';
      }
    }
    if(check) check.style.display = hit ? 'flex' : 'none';
  });
  var allHit = todayTotal >= totalGoal;
  var banner = document.getElementById('today-banner');
  if(banner){ banner.style.background=allHit?'#085041':'#141618'; banner.style.border=allHit?'1.5px solid #1D9E75':'0.5px solid #2c2c2a'; }
  ['banner-lbl-total','banner-lbl-goal','banner-lbl-pct','banner-lbl-status'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.color=allHit?'#5DCAA5':'#888780'; });
  ['banner-div1','banner-div2','banner-div3'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.background=allHit?'#0F6E56':'#2c2c2a'; });
  var bt=document.getElementById('banner-track'); if(bt) bt.style.background=allHit?'#0F6E56':'#2c2c2a';

  if(allHit){
    var pt=document.getElementById('banner-total'); if(pt) pt.style.animation='dtfPulse .6s ease-in-out 2';
  }
}

    var units25Str=m.units25?'<span style="color:#5f5e5a;font-weight:400"> ('+m.units25.toLocaleString()+')</span>':'';
    var yoyDelta='<td style="text-align:right">';
    if(m.yoyDiff!==null){var yPos=m.yoyDiff>=0,yBg=yPos?'#085041':'#791F1F',yTxt=yPos?'#9FE1CB':'#F09595';yoyDelta+='<span style="display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:500;background:'+yBg+';color:'+yTxt+'">'+(yPos?'+':'')+m.yoyDiff.toFixed(1)+'%</span>';}else yoyDelta+='\u2014';
    yoyDelta+='</td>';
    return '<tr><td style="font-weight:500">'+monthLabel+'</td><td style="text-align:right">'+m.units.toLocaleString()+units25Str+'</td><td style="text-align:right;color:#888780">'+m.target.toLocaleString()+'</td><td style="text-align:right"><span class="badge" style="background:'+pBg+';color:'+pTxt+'">'+m.pctOfTarget.toFixed(2)+'%</span></td><td style="min-width:100px;padding:6px 10px"><div style="background:#2c2c2a;border-radius:3px;height:6px;overflow:hidden"><div style="height:100%;width:'+bw+'%;background:'+bCol+';border-radius:3px"></div></div></td>'+yoyDelta+'</tr>';
  }).join('');

  var curMo=monthRows.find(function(m){return m.isCurrentMonth;});
  var asterisk=curMo?'<div style="font-size:10px;color:#5f5e5a;margin-top:10px;padding-top:8px;border-top:0.5px solid #2c2c2a"><sup style="color:#9FE1CB">*</sup> '+curMo.label+' target adjusted for month-to-date ('+curMo.daysSoFar+'/'+curMo.daysInMonth+' days). Full month target: '+curMo.fullMonthTarget.toLocaleString()+'. 2025 figure shown is also MTD for comparison.</div>':'';

  var jarLegHTML=jarEntries.map(function(e,i){var j=e[0],v=e[1],p=jarTotal?((v/jarTotal)*100).toFixed(1):0;return '<tr style="border-bottom:0.5px solid #2c2c2a"><td style="padding:3px 6px;width:16px"><div style="width:10px;height:10px;border-radius:2px;background:'+JAR_COLORS[i]+'"></div></td><td style="padding:3px 6px;font-weight:500">'+j+'</td><td style="padding:3px 6px;text-align:right;white-space:nowrap">'+v.toLocaleString()+'</td><td style="padding:3px 6px;text-align:right;color:#888780;width:40px">'+p+'%</td></tr>';}).join('');

  var custHTML=top10.map(function(e,i){var c=e[0],cd=e[1],avg2=cd.lots?Math.round(cd.units/cd.lots):0,bw=Math.round((cd.units/maxCU)*100),sp=totalUnits?((cd.units/totalUnits)*100).toFixed(1):0;return '<tr><td style="color:#5f5e5a;font-size:11px;width:24px">'+(i+1)+'</td><td style="font-weight:500">'+c+'</td><td style="text-align:right">'+cd.units.toLocaleString()+'</td><td style="padding:6px 10px;width:90px"><div style="background:#2c2c2a;border-radius:2px;height:4px;overflow:hidden"><div style="height:100%;width:'+bw+'%;background:#94A3B8;border-radius:2px"></div></div></td><td style="text-align:right;color:#888780">'+cd.lots+'</td><td style="text-align:right;color:#888780">'+avg2.toLocaleString()+'</td><td style="text-align:right;color:#888780">'+sp+'%</td></tr>';}).join('');

  document.getElementById('content').innerHTML=
    '<div class="metrics">'+metricsHTML+'</div>'
    +'<div class="full-card"><h3>Year-end projection vs target</h3>'+yearEndHTML+'</div>'
    +'<div class="charts-row"><div class="chart-card">'+typeSplitHTML
    +'<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'
    +'<th style="text-align:left;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Line</th>'
    +'<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Units</th>'
    +'<th style="border-bottom:0.5px solid #2c2c2a"></th>'
    +'<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">% of total</th>'
    +'<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Lots run</th>'
    +'</tr></thead><tbody>'+linesHTML+'</tbody></table></div>'
    +'<div class="chart-card"><h3>Powder product mix \u2014 units by jar size</h3><div style="display:flex;align-items:center;gap:12px"><div style="position:relative;height:200px;min-width:200px;flex-shrink:0"><canvas id="cJar"></canvas></div><div id="jar-legend" style="flex:1;overflow-y:auto"></div></div></div></div>'
    +'<div class="chart-card" style="margin-bottom:10px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px"><h3 style="margin:0">Weekly units produced \u2014 last 8 weeks</h3><div style="display:flex;gap:16px;align-items:center;font-size:11px;color:#888780"><span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:20px;border-top:2px dashed #EF9F27"></span>8-wk avg: '+weekAvg.toLocaleString()+'</span><span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:20px;border-top:2px dashed #1D9E75"></span>Weekly target: '+WEEKLY_TARGET.toLocaleString()+'</span></div></div><div style="position:relative;height:240px"><canvas id="cWeekly"></canvas></div></div>'
    +'<div class="full-card"><h3>Units produced by month vs. target</h3><div class="tbl-wrap"><table><thead><tr><th>Month</th><th style="text-align:right">2026 actual <span style="color:#5f5e5a;font-weight:400">(2025 actual)</span></th><th style="text-align:right">Target</th><th style="text-align:right">% of target</th><th></th><th style="text-align:right">YoY</th></tr></thead><tbody>'+monthHTML+'</tbody></table>'+asterisk+'</div></div>'
    +'<div class="full-card"><h3>Top 10 customers by units produced</h3><div class="tbl-wrap"><table><thead><tr><th style="width:24px">#</th><th>Customer</th><th style="text-align:right">Units produced</th><th style="width:90px"></th><th style="text-align:right">Lots</th><th style="text-align:right">Avg run size</th><th style="text-align:right">% of production</th></tr></thead><tbody>'+custHTML+'</tbody></table></div></div>';

  document.getElementById('jar-legend').innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px"><tbody>'+jarLegHTML+'</tbody></table>';

  charts.jar=new Chart(document.getElementById('cJar'),{type:'doughnut',data:{labels:jarEntries.map(function(e){return e[0];}),datasets:[{data:jarEntries.map(function(e){return e[1];}),backgroundColor:JAR_COLORS,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){var v=ctx.raw,p=jarTotal?((v/jarTotal)*100).toFixed(1):0;return v.toLocaleString()+' units ('+p+'%)';}}}}}});
  charts.weekly=new Chart(document.getElementById('cWeekly'),{type:'bar',data:{labels:weekLabels,datasets:[{type:'bar',label:'Units produced',data:weekData26,backgroundColor:weekColors,borderRadius:4,order:2},{type:'line',label:'8-week avg',data:weeks.map(function(){return weekAvg;}),borderColor:'#EF9F27',borderWidth:2,borderDash:[6,4],pointRadius:0,pointHoverRadius:0,fill:false,tension:0,order:1},{type:'line',label:'Weekly target',data:weeks.map(function(){return WEEKLY_TARGET;}),borderColor:'#1D9E75',borderWidth:2,borderDash:[6,4],pointRadius:0,pointHoverRadius:0,fill:false,tension:0,order:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){if(ctx.dataset.label==='8-week avg')return '8-wk avg: '+weekAvg.toLocaleString();if(ctx.dataset.label==='Weekly target')return 'Weekly target: '+WEEKLY_TARGET.toLocaleString();return 'Units: '+ctx.raw.toLocaleString();}}}},scales:{x:{ticks:{color:'#888780',font:{size:10},maxRotation:20},grid:{color:'#2c2c2a'}},y:{ticks:{color:'#888780',callback:function(v){return(v/1000).toFixed(0)+'k';}},grid:{color:'#2c2c2a'}}}},plugins:[{id:'barLabels',afterDatasetsDraw:function(chart){var ctx2=chart.ctx,meta=chart.getDatasetMeta(0);ctx2.save();ctx2.font='500 10px system-ui,sans-serif';ctx2.textAlign='center';ctx2.textBaseline='bottom';meta.data.forEach(function(bar,i){ctx2.fillStyle=parseInt(weeks[i])===cwn?'rgba(133,183,235,0.7)':'#85B7EB';ctx2.fillText(weekData26[i].toLocaleString(),bar.x,bar.y-4);});ctx2.restore();}}]});
}

function renderDetail() {
  var lots=Object.values(lotMap).filter(Boolean);
  var products=Array.from(new Set(lots.map(function(l){return l.product;}).filter(Boolean))).sort();
  var weeks=Array.from(new Set(lots.map(function(l){return l.week;}).filter(Boolean))).sort();
  var bottleSizes=Array.from(new Set(allRows.map(function(r){return r['Bottle Size'];}).filter(Boolean))).sort();
  var jarSizes=Array.from(new Set(allRows.map(function(r){return r['Jar Size'];}).filter(Boolean))).sort();
  document.getElementById('content').innerHTML=
    '<div class="filters"><input type="text" id="fSearch" placeholder="Search lot # or product\u2026" style="min-width:180px" oninput="applyFilters()"><select id="fProduct" onchange="applyFilters()"><option value="">All products</option>'+products.map(function(p){return '<option>'+p+'</option>';}).join('')+'</select><select id="fStatus" onchange="applyFilters()"><option value="">All statuses</option><option>Complete</option><option>Partial</option></select><select id="fWeek" onchange="applyFilters()"><option value="">All weeks</option>'+weeks.map(function(w){return '<option>'+w+'</option>';}).join('')+'</select><select id="fBottle" onchange="applyFilters()"><option value="">All bottle sizes</option>'+bottleSizes.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select><select id="fJar" onchange="applyFilters()"><option value="">All jar sizes</option>'+jarSizes.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select><button onclick="clearFilters()" style="font-size:12px;padding:6px 12px;border:0.5px solid #444441;border-radius:8px;background:transparent;cursor:pointer;color:#888780">Clear</button></div>'
    +'<div id="ops-metrics" class="metrics" style="margin-bottom:1rem"></div>'
    +'<div class="full-card"><div class="tbl-wrap"><table style="min-width:600px"><thead><tr><th onclick="sortBy(\'date\')">Date \u21d5</th><th onclick="sortBy(\'lot\')">Lot # \u21d5</th><th onclick="sortBy(\'product\')">Product \u21d5</th><th onclick="sortBy(\'line\')">Line \u21d5</th><th onclick="sortBy(\'bottleSize\')">Bottle \u21d5</th><th onclick="sortBy(\'jarSize\')">Jar \u21d5</th><th onclick="sortBy(\'projected\')">Projected \u21d5</th><th onclick="sortBy(\'finalUnits\')">Final units \u21d5</th><th onclick="sortBy(\'dev\')">Dev % \u21d5</th><th onclick="sortBy(\'status\')">Status \u21d5</th></tr></thead><tbody id="ops-body"></tbody></table></div><div class="pagination"><button id="prevBtn" onclick="changePage(-1)">\u2190 Prev</button><span id="pageInfo"></span><button id="nextBtn" onclick="changePage(1)">Next \u2192</button><span id="rowCount" style="margin-left:auto"></span></div></div>';
  applyFilters();
}

function getFilteredLots(){
  var search=document.getElementById('fSearch')?document.getElementById('fSearch').value.toLowerCase():'';
  var prod=document.getElementById('fProduct')?document.getElementById('fProduct').value:'';
  var status=document.getElementById('fStatus')?document.getElementById('fStatus').value:'';
  var week=document.getElementById('fWeek')?document.getElementById('fWeek').value:'';
  var bottle=document.getElementById('fBottle')?document.getElementById('fBottle').value:'';
  var jar=document.getElementById('fJar')?document.getElementById('fJar').value:'';
  return Object.values(lotMap).filter(Boolean).filter(function(l){
    if(search&&!(l.lot.toLowerCase().includes(search)||l.product.toLowerCase().includes(search)))return false;
    if(prod&&l.product!==prod)return false;
    if(status&&!l.status.toLowerCase().includes(status.toLowerCase()))return false;
    if(week&&l.week!==week)return false;
    if(bottle&&l.bottleSize!==bottle)return false;
    if(jar&&l.jarSize!==jar)return false;
    return true;
  });
}

function applyFilters(){page=1;updateOpsTable();}
function clearFilters(){['fSearch','fProduct','fStatus','fWeek','fBottle','fJar'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});applyFilters();}
function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}updateOpsTable();}
function changePage(dir){page+=dir;updateOpsTable();}

function updateOpsTable(){
  var lots=getFilteredLots();
  if(sortCol){lots=lots.slice().sort(function(a,b){var av=a[sortCol]!=null?a[sortCol]:'',bv=b[sortCol]!=null?b[sortCol]:'';if(sortCol==='dev'){av=lotDev(a)!=null?lotDev(a):-999;bv=lotDev(b)!=null?lotDev(b):-999;}if(sortCol==='date'){return(new Date(av)-new Date(bv))*sortDir;}if(typeof av==='number'||!isNaN(parseFloat(av)))return(parseFloat(av)-parseFloat(bv))*sortDir;return String(av).localeCompare(String(bv))*sortDir;});}
  var total=lots.length,totalPages=Math.ceil(total/PAGE_SIZE)||1;
  page=Math.min(Math.max(1,page),totalPages);
  var slice=lots.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  var tP=lots.reduce(function(s,l){return s+l.projected;},0),tF=lots.reduce(function(s,l){return s+l.finalUnits;},0);
  var comp=lots.filter(function(l){return l.status.toLowerCase().includes('complete');}).length;
  var devs=lots.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var aD=devs.length?devs.reduce(function(s,d){return s+d;},0)/devs.length:0;
  var dc=aD<-2?'#EF9F27':aD>2?'#1D9E75':'#e8e6e0';
  var om=document.getElementById('ops-metrics');
  if(om)om.innerHTML='<div class="metric info"><div class="label">Lots shown</div><div class="value">'+total.toLocaleString()+'</div></div><div class="metric"><div class="label">Units produced</div><div class="value">'+tF.toLocaleString()+'</div><div class="sub">vs '+tP.toLocaleString()+' projected</div></div><div class="metric"><div class="label">Avg deviation</div><div class="value" style="color:'+dc+'">'+(aD>0?'+':'')+aD.toFixed(1)+'%</div><div class="sub">lot by lot</div></div><div class="metric good"><div class="label">Complete lots</div><div class="value">'+comp+'</div><div class="sub">of '+total+' shown</div></div>';
  var body=document.getElementById('ops-body');if(!body)return;
  body.innerHTML=slice.map(function(l){var dev=lotDev(l),dS=dev!==null?(dev>0?'+':'')+dev.toFixed(1)+'%':'\u2014',dC=dev!==null&&Math.abs(dev)>=5?(dev<0?'neg-dev':'pos-dev'):'',st=l.status.toLowerCase(),bC=st.includes('complete')?'complete':st.includes('partial')?'partial':'';return '<tr><td>'+l.date+'</td><td style="font-weight:500">'+l.lot+'</td><td>'+l.product+'</td><td>'+(l.line||'\u2014')+'</td><td>'+(l.bottleSize||'\u2014')+'</td><td>'+(l.jarSize||'\u2014')+'</td><td style="text-align:right">'+(l.projected?l.projected.toLocaleString():'\u2014')+'</td><td style="text-align:right">'+(l.finalUnits?l.finalUnits.toLocaleString():'\u2014')+'</td><td>'+(dev!==null?'<span class="badge '+dC+'">'+dS+'</span>':'\u2014')+'</td><td><span class="badge '+bC+'">'+(l.status||'\u2014')+'</span></td></tr>';}).join('');
  var pi=document.getElementById('pageInfo'),pb=document.getElementById('prevBtn'),nb=document.getElementById('nextBtn'),rc=document.getElementById('rowCount');
  if(pi)pi.textContent='Page '+page+' of '+totalPages;
  if(pb)pb.disabled=page<=1;
  if(nb)nb.disabled=page>=totalPages;
  if(rc)rc.textContent=total.toLocaleString()+' lots';
}
</script>
