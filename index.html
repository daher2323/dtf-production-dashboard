      +'</tr>';
    }).join('');

    var custDataObj = {
      name: cd.cust,
      tag: cd.tag,
      ytd: cd.ytd, ytd25: cd.ytd25,
      ytdLots: cd.ytdLots, ytdLots25: cd.ytdLots25,
      ytdPct: cd.ytdPct, ytdPct25: cd.ytdPct25,
      qtrs: cd.qtrs.filter(function(q){return q.units>0;}).map(function(q){
        return {key:q.key, label:quarterLabel(q.key), units:q.units, lots:q.lots, avgRun:q.avgRun, pctOfProd:q.pctOfProd};
      })
    };

    var detailTable = '<div id="ch-body-'+sid+'" style="display:'+(expanded?'block':'none')+';border-top:0.5px solid #2c2c2a;">'
      +'<script type="application/json" id="ch-data-'+sid+'">'+JSON.stringify(custDataObj)+'<\/script>'
      +'<div id="ch-synopsis-'+sid+'" style="padding:12px 14px;border-bottom:0.5px solid #2c2c2a;background:#141618;min-height:44px;"></div>'
      +'<table style="width:100%;border-collapse:collapse;">'
      +'<thead><tr>'
        +'<th style="'+thSL+'padding-left:14px;width:90px;">Quarter</th>'
        +'<th style="'+thS+'">Units</th>'
        +'<th style="'+thS+'width:70px;">vs prev</th>'
        +'<th style="'+thS+'">Lots</th>'
        +'<th style="'+thS+'">Avg run</th>'
        +'<th style="'+thS+'width:70px;">vs prev</th>'
        +'<th style="'+thS+'">% of prod</th>'
        +'<th style="'+thS+'width:70px;">vs prev</th>'
        +'<th style="'+thS+'padding-right:14px;width:110px;">Volume</th>'
      +'</tr></thead>'
      +'<tbody>'+tableRows+'</tbody>'
      +'</table>'
    +'</div>';

    return '<div style="background:#1e2124;border:0.5px solid #2c2c2a;border-left:3px solid '+borderColor+';border-radius:0 10px 10px 0;overflow:hidden;margin-bottom:5px;">'
      +header+detailTable
    +'</div>';
  }).join('');

  var legendHTML = '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">'
    +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#085041;color:#9FE1CB;">&#x2191; Growing</span>'
    +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#791F1F;color:#F09595;">&#x2193; Declining</span>'
    +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#2c2c2a;color:#888780;">&#x2192; Flat</span>'
    +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#0C447C;color:#85B7EB;">New</span>'
  +'</div>';

  return '<div style="margin-bottom:10px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="font-size:10px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.05em;">Customer overview &middot; thru '+ytdLabel+'</div>'
        +'<div style="display:flex;gap:2px;padding:3px;background:#141618;border:0.5px solid #2c2c2a;border-radius:8px;">'
          +'<button onclick="setCustLimit(10)" style="'+navBtnStyle(custLimit===10)+'">Top 10</button>'
          +'<button onclick="setCustLimit(25)" style="'+navBtnStyle(custLimit===25)+'">Top 25</button>'
          +'<button onclick="setCustLimit(0)" style="'+navBtnStyle(custLimit===0)+'">All <span style="opacity:.6;">('+customers.length+')</span></button>'
        +'</div>'
      +'</div>'
      +legendHTML
    +'</div>'
    +rows
  +'</div>';
}

function _triggerExpandedSynopses() {
  Object.keys(_chExpanded).forEach(function(sid) {
    if (_chExpanded[sid]) generateSynopsis(sid);
  });
}

var _procSynopsis = {};

function generateProcSynopsis(sid) {
  var el = document.getElementById('psynopsis-' + sid);
  if (!el) return;
  if (_procSynopsis[sid]) { el.innerHTML = _procSynopsis[sid]; return; }
  var dataEl = document.getElementById('pdata-' + sid);
  if (!dataEl) return;
  var cd = JSON.parse(dataEl.textContent);
  var curQk = getQuarterKey(new Date());

  var completed = cd.qtrs.filter(function(q){ return q.units > 0 && q.key !== curQk; });
  var hasLY = cd.ytd25Units > 0;
  var ytdChg = hasLY ? (cd.ytdUnits - cd.ytd25Units) / cd.ytd25Units * 100 : null;
  var lotChg = cd.ytd25Lots > 0 ? (cd.ytdLots - cd.ytd25Lots) / cd.ytd25Lots * 100 : null;
  var pctChg = cd.ytdPct25 != null && cd.ytdPct != null ? (cd.ytdPct - cd.ytdPct25) : null;
  var typeLabel = cd.type; // 'jar', 'bottle', 'lid'

  function n(v) { return Number(v).toLocaleString(); }
  var sentences = [];

  // Sentence 1: top-line usage
  if (!hasLY) {
    var firstQ = cd.qtrs.filter(function(q){return q.units>0;})[0];
    var when = firstQ ? 'in ' + firstQ.label : 'this year';
    sentences.push('We started using ' + cd.sku + ' ' + when
      + ' — ' + n(cd.ytdUnits) + ' units across ' + cd.ytdLots + ' lot' + (cd.ytdLots!==1?'s':'') + ' so far this year'
      + (cd.ytdPct != null ? ', representing ' + cd.ytdPct + '% of our total ' + typeLabel + ' usage YTD' : '') + '.');
  } else if (ytdChg !== null) {
    var mag = Math.abs(ytdChg);
    var tone = mag > 40 ? (ytdChg>0?'significantly up':'significantly down')
             : mag > 15 ? (ytdChg>0?'up':'down')
             :             (ytdChg>0?'slightly up':'slightly down');
    sentences.push('Usage of ' + cd.sku + ' is ' + tone + ' ' + mag.toFixed(1) + '% YTD vs. the same period last year'
      + ' (' + n(cd.ytd25Units) + ' → ' + n(cd.ytdUnits) + ' units)'
      + (cd.ytdPct != null ? ', now ' + cd.ytdPct + '% of our total ' + typeLabel + ' usage' : '') + '.');
  }

  // Sentence 2: lot count trend
  if (lotChg !== null && Math.abs(lotChg) > 5) {
    var lotDir = lotChg > 0 ? 'more' : 'fewer';
    var avgCur  = cd.ytdLots  > 0 ? Math.round(cd.ytdUnits  / cd.ytdLots)  : 0;
    var avgPrev = cd.ytd25Lots > 0 ? Math.round(cd.ytd25Units / cd.ytd25Lots) : 0;
    if (avgPrev > 0 && Math.abs((avgCur-avgPrev)/avgPrev*100) > 5) {
      var runDir = avgCur > avgPrev ? 'larger' : 'smaller';
      sentences.push('We\'re running ' + lotDir + ' lots (' + cd.ytd25Lots + ' → ' + cd.ytdLots + ')'
        + ' with ' + runDir + ' average runs (' + n(avgPrev) + ' → ' + n(avgCur) + ' units per lot).');
    } else {
      sentences.push('Lot count has ' + (lotChg>0?'increased':'decreased') + ' from '
        + cd.ytd25Lots + ' to ' + cd.ytdLots + ' lots YTD, with roughly similar run sizes.');
    }
  }

  // Sentence 3: share of production trend or quarterly trajectory
  if (pctChg !== null && Math.abs(pctChg) >= 0.5) {
    sentences.push('Its share of our ' + typeLabel + ' usage has ' + (pctChg>0?'grown':'shrunk')
      + ' from ' + cd.ytdPct25 + '% to ' + cd.ytdPct + '%'
      + (Math.abs(pctChg) >= 2 ? ', a meaningful shift in our ' + typeLabel + ' mix' : '') + '.');
  } else if (completed.length >= 3) {
    var last3 = completed.slice(-3);
    var allUp = last3[2].units > last3[1].units && last3[1].units > last3[0].units;
    var allDn = last3[2].units < last3[1].units && last3[1].units < last3[0].units;
    if (allUp) {
      sentences.push('Usage has grown in each of the last three completed quarters ('
        + n(last3[0].units) + ' → ' + n(last3[1].units) + ' → ' + n(last3[2].units) + ' units).');
    } else if (allDn) {
      sentences.push('Usage has declined in each of the last three completed quarters ('
        + n(last3[0].units) + ' → ' + n(last3[1].units) + ' → ' + n(last3[2].units) + ' units).');
    } else if (completed.length >= 2) {
      var prev = completed[completed.length-2], last = completed[completed.length-1];
      var qChg = (last.units - prev.units) / prev.units * 100;
      if (Math.abs(qChg) > 10) {
        sentences.push('The most recent completed quarter (' + last.label + ') was '
          + (qChg>0?'up':'down') + ' ' + Math.abs(qChg).toFixed(1) + '% vs. ' + prev.label
          + ' (' + n(prev.units) + ' → ' + n(last.units) + ' units).');
      }
    }
  } else if (completed.length === 2) {
    var p2 = completed[0], l2 = completed[1];
    var q2 = (l2.units - p2.units) / p2.units * 100;
    if (Math.abs(q2) > 10) {
      sentences.push('The most recent completed quarter (' + l2.label + ') was '
        + (q2>0?'up':'down') + ' ' + Math.abs(q2).toFixed(1) + '% vs. ' + p2.label
        + ' (' + n(p2.units) + ' → ' + n(l2.units) + ' units).');
    }
  }

  var text = sentences.join(' ');
  if (!text) { el.innerHTML = ''; return; }
  var html = '<div style="display:flex;align-items:flex-start;gap:10px;">'
    + '<div style="width:20px;height:20px;border-radius:50%;background:#0C447C;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#85B7EB" stroke-width="1.2"/><line x1="5" y1="3" x2="5" y2="5.5" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7" r=".6" fill="#85B7EB"/></svg>'
    + '</div>'
    + '<p style="font-size:12px;color:#e8e6e0;line-height:1.65;margin:0;">' + text + '</p>'
  + '</div>';
  _procSynopsis[sid] = html;
  el.innerHTML = html;
}

function switchProcTab(sid, tab) {
  var custEl = document.getElementById('pcust-' + sid);
  var qtrEl  = document.getElementById('pqtr-'  + sid);
  var btnC   = document.getElementById('ptab-cust-' + sid);
  var btnQ   = document.getElementById('ptab-qtr-'  + sid);
  var onC = tab === 'cust';
  if (custEl) custEl.style.display = onC ? 'block' : 'none';
  if (qtrEl)  qtrEl.style.display  = onC ? 'none'  : 'block';
  var navOn  = 'padding:4px 12px;border-radius:6px;border:1.5px solid #378ADD;background:#0C447C;color:#85B7EB;font-weight:500;font-size:12px;cursor:pointer;font-family:system-ui;';
  var navOff = 'padding:4px 12px;border-radius:6px;border:1.5px solid transparent;background:transparent;color:#888780;font-weight:400;font-size:12px;cursor:pointer;font-family:system-ui;';
  if (btnC) btnC.style.cssText = onC  ? navOn : navOff;
  if (btnQ) btnQ.style.cssText = !onC ? navOn : navOff;
}

function toggleProc(sid) {
  if (!window._procExpanded) window._procExpanded = {};
  window._procExpanded[sid] = !window._procExpanded[sid];
  var body = document.getElementById('pb-' + sid);
  var chev = document.getElementById('pc-' + sid);
  if (body) body.style.display = window._procExpanded[sid] ? 'block' : 'none';
  if (chev) chev.style.transform = window._procExpanded[sid] ? 'rotate(180deg)' : '';
  if (window._procExpanded[sid]) generateProcSynopsis(sid);
}

function renderProcurement() {
  var now = new Date();
  var curQk = getQuarterKey(now);
  var cutoff = new Date(2025, 0, 1);
  var col = procView === 'jars' ? 'jarSize' : procView === 'bottles' ? 'bottleSize' : 'lidSize';
  var label = procView === 'jars' ? 'jar' : procView === 'bottles' ? 'bottle' : 'lid';
  var Label = procView === 'jars' ? 'Jar' : procView === 'bottles' ? 'Bottle' : 'Lid';

  function getSku(r) {
    if (procView === 'lids') {
      var parts = [r['Lid Size'], r['Lid Color'], r['Lid Profile']].map(function(v){ return (v||'').trim(); }).filter(Boolean);
      return parts.join(' ');
    }
    return (r[procView === 'jars' ? 'Jar Size' : 'Bottle Size']||'').trim();
  }

  // Build per-SKU per-quarter data from both years
  var allRowsCombined = allRows.concat(allRows25);
  var skuQtr = {};
  var skuCust = {}; // skuCust[sku][customer] = {units, lots:Set, products:{product:units}}
  var totalQtrUnits = {};
  allRowsCombined.forEach(function(r) {
    var dt = new Date(r['Date']); if (isNaN(dt) || dt < cutoff) return;
    var lot = (r['Lot Number']||'').trim(); if (!lot) return;
    var sku = getSku(r); if (!sku) return;
    var qk = getQuarterKey(dt);
    if (!skuQtr[sku]) skuQtr[sku] = {};
    if (!skuQtr[sku][qk]) skuQtr[sku][qk] = {lots:new Set(), units:0};
    skuQtr[sku][qk].lots.add(lot);
    skuQtr[sku][qk].units += num(r['Final Units']);
    totalQtrUnits[qk] = (totalQtrUnits[qk]||0) + num(r['Final Units']);
    // Customer + product breakdown
    var prod = (r['Product']||'').trim(); if (!prod) return;
    var cust = prod.split('-')[0].trim();
    if (!skuCust[sku]) skuCust[sku] = {};
    if (!skuCust[sku][cust]) skuCust[sku][cust] = {units:0, lots:new Set(), products:{}};
    skuCust[sku][cust].units += num(r['Final Units']);
    skuCust[sku][cust].lots.add(lot);
    skuCust[sku][cust].products[prod] = (skuCust[sku][cust].products[prod]||0) + num(r['Final Units']);
  });

  // Build all quarters Q1 2025 → current
  var displayQtrs = [];
  var dq = new Date(2025, 0, 1);
  while (getQuarterKey(dq) <= curQk) { displayQtrs.push(getQuarterKey(dq)); dq.setMonth(dq.getMonth()+3); }

  // Build SKU results
  var nowYr = now.getFullYear();
  var ytd25cutoff = new Date(nowYr-1, now.getMonth(), now.getDate(), 23, 59, 59);
  var ytd25start  = new Date(nowYr-1, 0, 1);
  var ytdStart    = new Date(nowYr, 0, 1);

  // Total YTD units for % of usage
  var totalYtdUnits = 0, totalYtd25Units = 0;
  allRowsCombined.forEach(function(r) {
    var dt = new Date(r['Date']); if (isNaN(dt)) return;
    var sku = getSku(r); if (!sku) return;
    var u = num(r['Final Units']);
    if (dt >= ytdStart && dt <= now) totalYtdUnits += u;
    if (dt >= ytd25start && dt <= ytd25cutoff) totalYtd25Units += u;
  });

  var results = Object.keys(skuQtr).map(function(sku) {
    var qmap = skuQtr[sku];
    var qtrs = displayQtrs.map(function(qk) {
      var d = qmap[qk];
      if (!d || d.lots.size === 0) return {key:qk, lots:0, units:0, pctOfTotal:null};
      var pct = totalQtrUnits[qk] ? parseFloat(((d.units/totalQtrUnits[qk])*100).toFixed(1)) : null;
      return {key:qk, lots:d.lots.size, units:d.units, pctOfTotal:pct};
    });

    // YTD this year
    var ytdLots = new Set(), ytdUnits = 0;
    allRowsCombined.forEach(function(r) {
      var dt = new Date(r['Date']); if (isNaN(dt)) return;
      var s = getSku(r); if (s !== sku) return;
      var lot = (r['Lot Number']||'').trim();
      var u = num(r['Final Units']);
      if (dt >= ytdStart && dt <= now) { if (lot) ytdLots.add(lot); ytdUnits += u; }
    });

    // YTD last year same window
    var ytd25Lots = new Set(), ytd25Units = 0;
    allRowsCombined.forEach(function(r) {
      var dt = new Date(r['Date']); if (isNaN(dt)) return;
      var s = getSku(r); if (s !== sku) return;
      var lot = (r['Lot Number']||'').trim();
      var u = num(r['Final Units']);
      if (dt >= ytd25start && dt <= ytd25cutoff) { if (lot) ytd25Lots.add(lot); ytd25Units += u; }
    });

    var ytdPct   = totalYtdUnits   > 0 ? parseFloat(((ytdUnits   / totalYtdUnits)   * 100).toFixed(1)) : null;
    var ytdPct25 = totalYtd25Units > 0 ? parseFloat(((ytd25Units / totalYtd25Units) * 100).toFixed(1)) : null;
    var ytdChg   = ytd25Units > 0 ? (ytdUnits - ytd25Units) / ytd25Units * 100 : null;

    // Tag based on YTD comparison
    var tag = ytd25Units > 0
      ? (ytdChg > 5 ? 'up' : ytdChg < -5 ? 'down' : 'flat')
      : 'new';

    // Customer breakdown
    var custBreakdown = skuCust[sku] ? Object.entries(skuCust[sku]).map(function(e) {
      return {cust:e[0], units:e[1].units, lots:e[1].lots.size,
              products:Object.entries(e[1].products).sort(function(a,b){return b[1]-a[1];}).slice(0,5)};
    }).sort(function(a,b){return b.units-a.units;}) : [];

    return {sku:sku, qtrs:qtrs, tag:tag, ytdLots:ytdLots.size, ytdUnits:ytdUnits,
            ytd25Lots:ytd25Lots.size, ytd25Units:ytd25Units, ytdPct:ytdPct, ytdPct25:ytdPct25,
            ytdChg:ytdChg, custBreakdown:custBreakdown};
  });

  // Sort by YTD units descending
  results.sort(function(a,b){ return b.ytdUnits - a.ytdUnits; });

  var maxYtd = Math.max.apply(null, results.map(function(r){ return Math.max(r.ytdUnits, r.ytd25Units); })) || 1;

  // Expand state
  if (!window._procExpanded) window._procExpanded = {};

  var thS  = 'text-align:right;padding:5px 10px;font-size:10px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid #2c2c2a;white-space:nowrap;';
  var thSL = 'text-align:left;padding:5px 10px 5px 14px;font-size:10px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid #2c2c2a;white-space:nowrap;';

  function pctB(cur, prev, ml) {
    if (!prev) return '';
    var p = (cur-prev)/prev*100, pos = p>=0;
    return '<span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500;'+(ml?'margin-left:5px;':'')+'background:'+(pos?'#085041':'#791F1F')+';color:'+(pos?'#9FE1CB':'#F09595')+'">'+(pos?'+':'')+p.toFixed(1)+'%</span>';
  }

  var rows = results.map(function(cd) {
    var sid = 'proc_' + safeid(cd.sku);
    var expanded = !!window._procExpanded[sid];
    var borderColor = cd.tag==='up'?'#1D9E75':cd.tag==='down'?'#791F1F':cd.tag==='new'?'#378ADD':'#444441';
    var bar26Color  = cd.tag==='down'?'#791F1F':'#378ADD';
    var tagEl = cd.tag==='up'
      ? '<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;background:#085041;color:#9FE1CB;flex-shrink:0;">&#x2191; Up</span>'
      : cd.tag==='down'
      ? '<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;background:#791F1F;color:#F09595;flex-shrink:0;">&#x2193; Down</span>'
      : cd.tag==='flat'
      ? '<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;background:#2c2c2a;color:#888780;flex-shrink:0;">&#x2192; Flat</span>'
      : '<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;background:#0C447C;color:#85B7EB;flex-shrink:0;">New</span>';

    var w25 = cd.ytd25Units ? Math.round((cd.ytd25Units/maxYtd)*100) : 0;
    var w26 = cd.ytdUnits   ? Math.round((cd.ytdUnits/maxYtd)*100)   : 0;
    var prevYr = nowYr - 1;
    var ytdLabel = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    // Sparkline
    var sparkMax = Math.max.apply(null, cd.qtrs.map(function(q){return q.units;})) || 1;
    var sparkBars = cd.qtrs.map(function(q) {
      var h = q.units ? Math.max(3, Math.round((q.units/sparkMax)*28)) : 3;
      var isCur = q.key === curQk;
      var col = isCur ? '#378ADD' : (q.units > 0 ? bar26Color : '#2c2c2a');
      var op  = isCur ? '.6' : (q.units > 0 ? '.75' : '.25');
      return '<div style="width:7px;height:'+h+'px;background:'+col+';opacity:'+op+';border-radius:1px 1px 0 0;align-self:flex-end;"></div>';
    }).join('');

    var header = '<div onclick="toggleProc(\''+sid+'\')" '
      +'style="display:flex;align-items:center;gap:0;padding:11px 14px 11px 12px;cursor:pointer;" onmouseover="this.style.background=\'#252829\'" onmouseout="this.style.background=\'transparent\'">'
      +'<div style="width:160px;flex-shrink:0;">'
        +'<div style="font-size:13px;font-weight:500;color:#e8e6e0;margin-bottom:4px;">'+cd.sku+'</div>'
        +tagEl
      +'</div>'
      +'<div style="flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;">'
        +(cd.ytd25Units ? '<div style="display:flex;align-items:center;gap:7px;"><div style="width:32px;font-size:10px;color:#5f5e5a;flex-shrink:0;">'+prevYr+'</div><div style="flex:1;height:7px;background:#2c2c2a;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+w25+'%;background:#4A6580;border-radius:2px;"></div></div><div style="font-size:11px;color:#888780;width:68px;text-align:right;flex-shrink:0;">'+cd.ytd25Units.toLocaleString()+'</div></div>' : '')
        +'<div style="display:flex;align-items:center;gap:7px;"><div style="width:32px;font-size:10px;color:#378ADD;flex-shrink:0;">'+nowYr+'</div><div style="flex:1;height:7px;background:#2c2c2a;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+w26+'%;background:'+bar26Color+';border-radius:2px;"></div></div><div style="font-size:11px;color:#e8e6e0;font-weight:500;width:68px;text-align:right;flex-shrink:0;">'+cd.ytdUnits.toLocaleString()+'</div>'
        +pctB(cd.ytdUnits, cd.ytd25Units, true)
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:20px;flex-shrink:0;margin-left:16px;">'
        +'<div style="text-align:right;"><div style="font-size:10px;color:#888780;margin-bottom:2px;">Lots YTD</div>'
          +'<div style="font-size:12px;font-weight:500;color:#e8e6e0;">'+cd.ytdLots+(cd.ytd25Lots?' <span style="font-size:11px;color:#5f5e5a;font-weight:400;">was '+cd.ytd25Lots+'</span>':'')+'</div></div>'
        +'<div style="text-align:right;border-left:0.5px solid #2c2c2a;padding-left:16px;"><div style="font-size:10px;color:#888780;margin-bottom:2px;">% of '+label+' usage</div>'
          +'<div style="font-size:14px;font-weight:500;color:#e8e6e0;">'+(cd.ytdPct!==null?cd.ytdPct+'%':'&#x2014;')
          +pctB(cd.ytdPct, cd.ytdPct25, true)+'</div></div>'
      +'</div>'
      +'<div style="display:flex;align-items:flex-end;gap:2px;height:28px;flex-shrink:0;margin-left:16px;">'+sparkBars+'</div>'
      +'<svg id="pc-'+sid+'" width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0;margin-left:8px;transition:transform .15s;transform:'+(expanded?'rotate(180deg)':'')+'"><polyline points="2,4 6,8 10,4" stroke="#5f5e5a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    +'</div>';

    // Detail table
    var maxUnits = Math.max.apply(null, cd.qtrs.map(function(q){return q.units;})) || 1;
    var tableRows = cd.qtrs.map(function(q, idx) {
      var isCur = q.key === curQk;
      var tdB = 'padding:6px 10px;border-bottom:0.5px solid #2c2c2a;white-space:nowrap;font-size:12px;';
      var rBg = isCur ? 'background:#1a2030;' : '';
      var prevWithData = null;
      for (var pi=idx-1; pi>=0; pi--) { if (cd.qtrs[pi].units>0){prevWithData=cd.qtrs[pi];break;} }
      var unitsDelta = '';
      if (prevWithData && q.units>0 && q.key!==curQk) unitsDelta = pctB(q.units, prevWithData.units, true);
      else if (!prevWithData && q.units>0) unitsDelta = '<span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500;background:#0C447C;color:#85B7EB;">new</span>';
      else if (q.key===curQk && q.units>0) unitsDelta = '<span style="font-size:10px;color:#5f5e5a;">in progress</span>';
      var prevPct = null;
      for (var ci=idx-1; ci>=0; ci--) { if (cd.qtrs[ci].pctOfTotal!==null){prevPct=cd.qtrs[ci].pctOfTotal;break;} }
      var pctDelta = prevPct!==null && q.pctOfTotal!==null && q.key!==curQk ? pctB(q.pctOfTotal, prevPct, true) : '';
      var bW = q.units ? Math.round((q.units/maxUnits)*88) : 0;
      var bCol = isCur ? '#378ADD' : '#4A6580';
      return '<tr>'
        +'<td style="'+tdB+rBg+'padding-left:14px;color:'+(isCur?'#378ADD':'#888780')+';font-weight:'+(isCur?'500':'400')+';">'
          +(isCur?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#378ADD;margin-right:5px;vertical-align:middle;"></span>':'')
          +quarterLabel(q.key)+(isCur?' <span style="font-size:10px;color:#5f5e5a;font-weight:400;">partial</span>':'')
        +'</td>'
        +'<td style="'+tdB+rBg+'text-align:right;color:#e8e6e0;">'+(q.lots||'&#x2014;')+'</td>'
        +'<td style="'+tdB+rBg+'text-align:right;color:#e8e6e0;">'+(q.units?q.units.toLocaleString():'&#x2014;')+'</td>'
        +'<td style="'+tdB+rBg+'text-align:right;">'+unitsDelta+'</td>'
        +'<td style="'+tdB+rBg+'text-align:right;color:#888780;">'+(q.pctOfTotal!==null?q.pctOfTotal+'%':'&#x2014;')+'</td>'
        +'<td style="'+tdB+rBg+'text-align:right;">'+pctDelta+'</td>'
        +'<td style="'+tdB+rBg+'padding-right:14px;width:110px;">'
          +'<div style="height:4px;background:#2c2c2a;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+bW+'%;background:'+bCol+';border-radius:2px;"></div></div>'
        +'</td>'
      +'</tr>';
    }).join('');

    var procDataObj = {
      sku: cd.sku, type: label,
      ytdUnits: cd.ytdUnits, ytd25Units: cd.ytd25Units,
      ytdLots: cd.ytdLots, ytd25Lots: cd.ytd25Lots,
      ytdPct: cd.ytdPct, ytdPct25: cd.ytdPct25,
      qtrs: cd.qtrs.filter(function(q){return q.units>0;}).map(function(q){
        return {key:q.key, label:quarterLabel(q.key), units:q.units, lots:q.lots, pctOfTotal:q.pctOfTotal};
      })
    };

    // Customer + product breakdown HTML
    var totalCustUnits = cd.custBreakdown.reduce(function(s,c){return s+c.units;},0) || 1;
    var maxCustUnits = cd.custBreakdown.length ? cd.custBreakdown[0].units : 1;
    var custRows = cd.custBreakdown.map(function(c) {
      var barW = Math.round((c.units / maxCustUnits) * 100);
      var pct = ((c.units / totalCustUnits) * 100).toFixed(1);
      var prodList = c.products.map(function(p){
        var prodName = p[0].indexOf('-') !== -1 ? p[0].split('-').slice(1).join('-').trim() : p[0];
        return '<span style="font-size:10px;color:#5f5e5a;white-space:nowrap;">'+prodName
          +' <span style="color:#444441;">'+p[1].toLocaleString()+'</span></span>';
      }).join('<span style="color:#2c2c2a;margin:0 4px;">·</span>');
      return '<div style="padding:8px 14px;border-bottom:0.5px solid #2c2c2a;">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">'
          +'<div style="font-size:12px;font-weight:500;color:#e8e6e0;width:140px;flex-shrink:0;">'+c.cust+'</div>'
          +'<div style="flex:1;height:5px;background:#2c2c2a;border-radius:2px;overflow:hidden;">'
            +'<div style="height:100%;width:'+barW+'%;background:#378ADD;border-radius:2px;opacity:.7;"></div>'
          +'</div>'
          +'<div style="font-size:11px;color:#e8e6e0;font-weight:500;width:80px;text-align:right;flex-shrink:0;">'+c.units.toLocaleString()+'</div>'
          +'<div style="font-size:10px;color:#888780;width:36px;text-align:right;flex-shrink:0;">'+c.lots+' lot'+(c.lots!==1?'s':'')+'</div>'
          +'<div style="font-size:10px;font-weight:500;color:#888780;width:36px;text-align:right;flex-shrink:0;">'+pct+'%</div>'
        +'</div>'
        +(prodList ? '<div style="padding-left:150px;display:flex;flex-wrap:wrap;gap:4px;">'+prodList+'</div>' : '')
      +'</div>';
    }).join('');

    var custSection = custRows;

    var qtrSection = '<table style="width:100%;border-collapse:collapse;">'
      +'<thead><tr>'
        +'<th style="'+thSL+'">Quarter</th>'
        +'<th style="'+thS+'">Lots</th>'
        +'<th style="'+thS+'">Units</th>'
        +'<th style="'+thS+'width:70px;">vs prev</th>'
        +'<th style="'+thS+'">% of '+label+'s</th>'
        +'<th style="'+thS+'width:70px;">vs prev</th>'
        +'<th style="'+thS+'padding-right:14px;width:110px;">Volume</th>'
      +'</tr></thead>'
      +'<tbody>'+tableRows+'</tbody>'
    +'</table>';

    var navS = function(active) { return 'padding:4px 12px;border-radius:6px;border:'+(active?'1.5px solid #378ADD':'1.5px solid transparent')+';background:'+(active?'#0C447C':'transparent')+';color:'+(active?'#85B7EB':'#888780')+';font-weight:'+(active?'500':'400')+';font-size:12px;cursor:pointer;font-family:system-ui;'; };

    var detailTable = '<div id="pb-'+sid+'" style="display:'+(expanded?'block':'none')+';border-top:0.5px solid #2c2c2a;">'
      +'<script type="application/json" id="pdata-'+sid+'">'+JSON.stringify(procDataObj)+'<\/script>'
      +'<div id="psynopsis-'+sid+'" style="padding:12px 14px;border-bottom:0.5px solid #2c2c2a;background:#141618;min-height:44px;"></div>'
      // Inner tab bar
      +'<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:0.5px solid #2c2c2a;background:#1a1d20;">'
        +'<div style="display:flex;gap:2px;padding:3px;background:#141618;border:0.5px solid #2c2c2a;border-radius:8px;">'
          +'<button id="ptab-cust-'+sid+'" onclick="switchProcTab(\''+sid+'\',\'cust\')" style="'+navS(false)+'">By customer</button>'
          +'<button id="ptab-qtr-'+sid+'"  onclick="switchProcTab(\''+sid+'\',\'qtr\')"  style="'+navS(true)+'">By quarter</button>'
        +'</div>'
      +'</div>'
      +'<div id="pcust-'+sid+'" style="display:none;">'+ custSection +'</div>'
      +'<div id="pqtr-'+sid+'">'+ qtrSection +'</div>'
    +'</div>';

    return '<div style="background:#1e2124;border:0.5px solid #2c2c2a;border-left:3px solid '+borderColor+';border-radius:0 10px 10px 0;overflow:hidden;margin-bottom:5px;">'
      +header+detailTable
    +'</div>';
  }).join('');

  var ytdLabelFull = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('content').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">'
      +'<div style="font-size:10px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.05em;">'+Label+' usage — Q1 2025 &#x2192; present &middot; sorted by YTD units &middot; thru '+ytdLabelFull+'</div>'
      +'<div style="display:flex;gap:6px;">'
        +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#085041;color:#9FE1CB;">&#x2191; Up</span>'
        +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#791F1F;color:#F09595;">&#x2193; Down</span>'
        +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#2c2c2a;color:#888780;">&#x2192; Flat</span>'
        +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;background:#0C447C;color:#85B7EB;">New</span>'
      +'</div>'
    +'</div>'
    + rows;
}

function renderCustomers() {
  var now = new Date();
  if (!selectedPerfRange) selectedPerfRange = getDefaultPerfRange();
  var range = selectedPerfRange;
  var allRowsCombined = allRows.concat(allRows25);
  var rangeRows = allRowsCombined.filter(function(r){ var dt=new Date(r['Date']); return !isNaN(dt)&&dt>=range.start&&dt<=range.end; });

  var rangeYear = range.start.getFullYear();
  var compShift = (rangeYear === 2025) ? 1 : -1;
  var compStart = new Date(range.start.getTime()); compStart.setFullYear(rangeYear + compShift);
  var compEnd   = new Date(range.end.getTime());   compEnd.setFullYear(range.end.getFullYear() + compShift);
  var compYearLabel = String(compStart.getFullYear());

  var rangeRows25 = allRowsCombined.filter(function(r){ var dt=new Date(r['Date']); return !isNaN(dt)&&dt>=compStart&&dt<=compEnd; });

  // Build current-period customer totals from raw rows
  var byCust = {};
  rangeRows.forEach(function(r){
    var prod=(r['Product']||'').trim(); if(!prod) return;
    var c=prod.split('-')[0].trim(); if(!c) return;
    if(!byCust[c]) byCust[c]={units:0,lots:new Set()};
    byCust[c].units+=num(r['Final Units']);
    var lot=(r['Lot Number']||'').trim(); if(lot) byCust[c].lots.add(lot);
  });
  Object.keys(byCust).forEach(function(k){ byCust[k].lots=byCust[k].lots.size; });
  var allCustSorted=Object.entries(byCust).sort(function(a,b){return b[1].units-a[1].units;});
  var maxCU=allCustSorted[0]?allCustSorted[0][1].units:1;
  var totalUnits=allCustSorted.reduce(function(s,e){return s+e[1].units;},0);

  // Build comparison-period customer totals
  var byCust25raw={};
  allRowsCombined.filter(function(r){ var dt=new Date(r['Date']); return !isNaN(dt)&&dt>=compStart&&dt<=compEnd; }).forEach(function(r){
    var prod=(r['Product']||'').trim(); if(!prod) return;
    var c=prod.split('-')[0].trim(); if(!c) return;
    var ck=c.toLowerCase();
    if(!byCust25raw[ck]) byCust25raw[ck]={units:0,lots:new Set(),displayName:c};
    byCust25raw[ck].units+=num(r['Final Units']);
    var lot=(r['Lot Number']||'').trim(); if(lot) byCust25raw[ck].lots.add(lot);
  });
  Object.keys(byCust25raw).forEach(function(k){ byCust25raw[k].lots=byCust25raw[k].lots.size; });
  function getCust25(name){ return byCust25raw[(name||'').toLowerCase()]||null; }
  var total25units=Object.values(byCust25raw).reduce(function(s,v){return s+v.units;},0);

  var visibleCusts = custLimit===0 ? allCustSorted : allCustSorted.slice(0,custLimit);
  var showSummaryRow = custLimit===0;

  var custHTML = visibleCusts.map(function(e,i){
    var c=e[0],cd=e[1];
    var avg2=cd.lots?Math.round(cd.units/cd.lots):0;
    var bw=Math.round((cd.units/maxCU)*100);
    var sp=totalUnits?((cd.units/totalUnits)*100).toFixed(1):0;
    var cd25=getCust25(c);
    var compUnits  = cd25?'<span style="color:#5f5e5a;font-weight:400"> ('+cd25.units.toLocaleString()+')</span>':'';
    var avg225     = cd25&&cd25.lots?Math.round(cd25.units/cd25.lots):null;
    var compAvg    = avg225!==null?'<span style="color:#5f5e5a;font-weight:400"> ('+avg225.toLocaleString()+')</span>':'';
    var sp25       = total25units&&cd25?((cd25.units/total25units)*100).toFixed(1):null;
    var compSp     = sp25!==null?'<span style="color:#5f5e5a;font-weight:400"> ('+sp25+'%)</span>':'';
    var compLots   = cd25?'<span style="color:#5f5e5a;font-weight:400"> ('+cd25.lots+')</span>':'';
    var yoyCell='<td style="text-align:right">';
    if(cd25&&cd25.units){
      var yPos=(cd.units-cd25.units)>=0, yPct=((cd.units-cd25.units)/cd25.units*100);
      var yBg=yPos?'#085041':'#791F1F', yTxt=yPos?'#9FE1CB':'#F09595';
      yoyCell+='<span style="display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:500;background:'+yBg+';color:'+yTxt+'">'+(yPos?'+':'')+yPct.toFixed(1)+'%</span>';
    } else { yoyCell+='\u2014'; }
    yoyCell+='</td>';
    return '<tr>'
      +'<td style="color:#5f5e5a;font-size:11px;width:24px">'+(i+1)+'</td>'
      +'<td style="font-weight:500">'+c+'</td>'
      +'<td style="text-align:right">'+cd.units.toLocaleString()+compUnits+'</td>'
      +'<td style="padding:6px 10px;width:90px"><div style="background:#2c2c2a;border-radius:2px;height:4px;overflow:hidden"><div style="height:100%;width:'+bw+'%;background:#94A3B8;border-radius:2px"></div></div></td>'
      +yoyCell
      +'<td style="text-align:right;color:#888780">'+cd.lots+compLots+'</td>'
      +'<td style="text-align:right;color:#888780">'+avg2.toLocaleString()+compAvg+'</td>'
      +'<td style="text-align:right;color:#888780">'+sp+'%'+compSp+'</td>'
      +'</tr>';
  }).join('');

  if (showSummaryRow) {
    var sumUnits=allCustSorted.reduce(function(s,e){return s+e[1].units;},0);
    var sumLots=allCustSorted.reduce(function(s,e){return s+e[1].lots;},0);
    var sumAvg=sumLots?Math.round(sumUnits/sumLots):0;
    var sum25units=Object.values(byCust25raw).reduce(function(s,v){return s+v.units;},0);
    var sum25lots=Object.values(byCust25raw).reduce(function(s,v){return s+v.lots;},0);
    var sum25avg=sum25lots?Math.round(sum25units/sum25lots):0;
    var sPos=(sumUnits-sum25units)>=0, sPct=((sumUnits-sum25units)/sum25units*100);
    var sBg=sPos?'#085041':'#791F1F', sTxt2=sPos?'#9FE1CB':'#F09595';
    custHTML+='<tr style="border-top:1.5px solid #444441;background:#1a1d1f;">'
      +'<td></td><td style="font-weight:500;color:#e8e6e0;font-size:12px;">All '+allCustSorted.length+' customers</td>'
      +'<td style="text-align:right;font-weight:500">'+sumUnits.toLocaleString()+(sum25units?'<span style="color:#5f5e5a;font-weight:400"> ('+sum25units.toLocaleString()+')</span>':'')+'</td>'
      +'<td></td>'
      +'<td style="text-align:right">'+(sum25units?'<span style="display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:500;background:'+sBg+';color:'+sTxt2+'">'+(sPos?'+':'')+sPct.toFixed(1)+'%</span>':'\u2014')+'</td>'
      +'<td style="text-align:right;color:#888780;font-weight:500">'+sumLots+(sum25lots?'<span style="color:#5f5e5a;font-weight:400"> ('+sum25lots+')</span>':'')+'</td>'
      +'<td style="text-align:right;color:#888780;font-weight:500">'+sumAvg.toLocaleString()+(sum25avg?'<span style="color:#5f5e5a;font-weight:400"> ('+sum25avg.toLocaleString()+')</span>':'')+'</td>'
      +'<td style="text-align:right;color:#888780;font-weight:500">100%</td>'
      +'</tr>';
  }

  // ── Customer overview ──
  var healthData = computeCustomerData();

  if (selectedCustomer) {
    selectedCustomer = null;
    renderSubBar();
  }

  document.getElementById('content').innerHTML = renderCustomerOverview(healthData);
  _triggerExpandedSynopses();
}

function toggleExportPopover(e) {
  e.stopPropagation();
  var existing = document.getElementById('export-popover');
  if (existing) { existing.remove(); return; }
  var lots = getFilteredLots();
  var count = lots.length;
  var ec = document.getElementById('export-count');
  if (ec) ec.textContent = 'Export ' + count.toLocaleString() + ' lots';
  var metaParts = [];
  var range = selectedDetailRange ? selectedDetailRange.label : (subView === 'today' ? (productionDays[selectedDayIdx] || 'Today') : subView === 'weekly' ? 'This week' : 'YTD');
  metaParts.push(range);
  var activeFilters = [];
  ['customer','product','status','bottle','jar'].forEach(function(id) {
    var arr = filterState[id] || [];
    if (arr.length) activeFilters.push(arr.length + ' ' + id);
  });
  if (activeFilters.length) metaParts.push(activeFilters.join(', ') + ' filtered');
  var metaStr = count.toLocaleString() + ' lots · ' + metaParts.join(' · ');
  var popover = document.createElement('div');
  popover.id = 'export-popover';
  popover.className = 'export-popover';
  popover.innerHTML =
    '<div class="export-popover-row">'
    + '<span style="font-size:12px;color:#e8e6e0;">Export <strong style="font-weight:500;">' + count.toLocaleString() + ' lots</strong> to Excel?</span>'
    + '<div style="display:flex;gap:6px;">'
    + '<button onclick="closeExportPopover()" style="padding:4px 10px;border-radius:6px;border:0.5px solid #444441;background:transparent;cursor:pointer;color:#888780;font-size:12px;font-family:system-ui;">Cancel</button>'
    + '<button onclick="confirmExport()" style="padding:4px 10px;border-radius:6px;border:1.5px solid #1D9E75;background:#085041;cursor:pointer;color:#9FE1CB;font-size:12px;font-weight:500;font-family:system-ui;display:inline-flex;align-items:center;gap:5px;"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#9FE1CB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Confirm</button>'
    + '</div>'
    + '</div>'
    + '<div class="export-popover-meta">' + metaStr + '</div>';
  popover.addEventListener('click', function(ev) { ev.stopPropagation(); });
  var wrap = document.getElementById('export-wrap');
  if (wrap) wrap.appendChild(popover);
  setTimeout(function() { document.addEventListener('click', closeExportPopoverOutside, true); }, 0);
}

function closeExportPopoverOutside(e) {
  var pop = document.getElementById('export-popover');
  var wrap = document.getElementById('export-wrap');
  if (pop && !pop.contains(e.target) && wrap && !wrap.contains(e.target)) closeExportPopover();
}

function closeExportPopover() {
  document.removeEventListener('click', closeExportPopoverOutside, true);
  var pop = document.getElementById('export-popover');
  if (pop) pop.remove();
}

function confirmExport() { closeExportPopover(); exportDetailExcel(); }

if (sessionStorage.getItem('dtf_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  loadDashboard();
} else {
  window.addEventListener('load', function(){
    var pw = document.getElementById('pw-input');
    if(pw) pw.focus();
  });
}</script>
