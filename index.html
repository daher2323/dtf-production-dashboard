<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTF Production Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--color-background-tertiary, #f5f5f3); color: var(--color-text-primary, #1a1a1a); font-size: 14px; }
  .shell { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 54px; width: auto; }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name { font-size: 20px; font-weight: 500; line-height: 1.2; }
  .brand-sub { font-size: 13px; color: var(--color-text-secondary, #666); margin-top: 2px; }
  .data-range { font-size: 11px; color: var(--color-text-tertiary, #999); margin-top: 3px; }
  .view-toggle { display: flex; gap: 6px; }
  .view-toggle button { padding: 6px 18px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary, #555); transition: all .15s; }
  .view-toggle button.active { background: var(--color-text-primary, #1a1a1a); color: var(--color-background-primary, #fff); border-color: transparent; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .metric { background: var(--color-background-secondary, #ececea); border-radius: 10px; padding: 1rem; }
  .metric .label { font-size: 11px; color: var(--color-text-secondary, #666); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .metric .value { font-size: 24px; font-weight: 500; line-height: 1; }
  .metric .sub { font-size: 11px; color: var(--color-text-tertiary, #999); margin-top: 4px; }
  .metric.good .value { color: #3b6d11; }
  .metric.warn .value { color: #a32d2d; }
  .metric.info .value { color: #185fa5; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .chart-card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); border-radius: 12px; padding: 1rem; }
  .chart-card h3 { font-size: 12px; font-weight: 500; color: var(--color-text-secondary, #666); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .full-card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
  .full-card h3 { font-size: 12px; font-weight: 500; color: var(--color-text-secondary, #666); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filters select, .filters input { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); border-radius: 8px; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #1a1a1a); font-size: 13px; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { text-align: left; padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); color: var(--color-text-secondary, #666); font-weight: 500; white-space: nowrap; cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  thead th:hover { color: var(--color-text-primary, #1a1a1a); }
  tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.06)); }
  tbody tr:hover { background: var(--color-background-secondary, #f5f5f3); }
  tbody td { padding: 6px 10px; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.complete { background: #eaf3de; color: #3b6d11; }
  .badge.partial  { background: #faeeda; color: #854f0b; }
  .badge.neg-dev  { background: #fcebeb; color: #a32d2d; }
  .badge.pos-dev  { background: #eaf3de; color: #3b6d11; }
  .loading { text-align: center; padding: 3rem; color: var(--color-text-secondary, #666); }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary, #666); }
  .pagination button { padding: 4px 10px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; color: var(--color-text-primary, #1a1a1a); }
  .pagination button:disabled { opacity: .4; cursor: default; }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <div class="brand">
      <img src="DTF_Logo.png" alt="DTF Logo" onerror="this.style.display='none'">
      <div class="brand-text">
        <div class="brand-name">Dynamic Technical Formulations</div>
        <div class="brand-sub">Production Dashboard</div>
        <div class="data-range" id="data-range"></div>
      </div>
    </div>
    <div class="view-toggle">
      <button class="active" onclick="setView('exec')">Executive</button>
      <button onclick="setView('ops')">Operations</button>
    </div>
  </div>
  <div id="loading" class="loading">Loading production data...</div>
  <div id="content" style="display:none"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=943770391&single=true&output=csv";
const YEAR_TARGET = 3927000;

let allRows = [], lotMap = {}, currentView = 'exec', sortCol = 'date', sortDir = -1, page = 1;
const PAGE_SIZE = 50;
let charts = {};

function parseCSV(text) {
  // strip BOM if present
  const clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  const lines = clean.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().replace(/^\uFEFF/,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    return headers.reduce((o,h,i) => { o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); return o; }, {});
  });
}

function isValid(r) {
  const d = (r['Date']||'').trim(), l = (r['Lot Number']||'').trim(), p = (r['Product']||'').trim();
  if (!d || !l || !p) return false;
  if (p.startsWith('#') || l.startsWith('#') || d.startsWith('#')) return false;
  return true;
}

function num(v) {
  if (!v && v !== 0) return 0;
  const n = parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}
function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }

function buildLotMap(rows) {
  const m = {};
  rows.forEach(r => {
    const lot = r['Lot Number'];
    const vals = Object.values(r);
    const rowDate = vals[0] || ''; // Date is always column 1
    const rowLine = vals[1] || ''; // Line is always column 2
    if (!m[lot]) {
      m[lot] = {
        lot, date: rowDate, product: r['Product'],
        bottleSize: r['Bottle Size'], jarSize: r['Jar Size'],
        projected: num(r['Projected Units']),
        finalUnits: 0,
        status: r['Complete or Partial'] || '',
        week: r['WEEK NUMBER'] || '', monYr: r['MON-YR'] || '',
        line: rowLine,
        induction: r['Induction Setting'] || '', beltSpeed: r['Belt Speed'] || '',
        lidSize: r['Lid Size'] || '', desiccant: r['Desiccant'] || ''
      };
    }
    m[lot].finalUnits += num(r['Final Units']);
    if (r['Complete or Partial']) m[lot].status = r['Complete or Partial'];
    if (!m[lot].line && rowLine) m[lot].line = rowLine;
    if (!m[lot].date && rowDate) m[lot].date = rowDate;
  });
  return m;
}

function lotDev(l) {
  if (!l.projected) return null;
  return ((l.finalUnits - l.projected) / l.projected) * 100;
}

function jarSizeKey(j) {
  if (!j) return null;
  j = j.trim();
  const galMatch = j.match(/(\d+(?:\.\d+)?)\s*gallon/i);
  if (galMatch) return `${galMatch[1]} Gallon`;
  const unitMatch = j.match(/^(\d+(?:\.\d+)?)\s*(oz|cc|ml|lb|gal|g)\b/i);
  if (unitMatch) {
    const n = unitMatch[1], u = unitMatch[2].toLowerCase();
    if (u === 'g' || u === 'gal') return `${n} Gallon`;
    return `${n}${u}`;
  }
  return j;
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    allRows = parseCSV(text).filter(isValid);
    const built = buildLotMap(allRows);
    lotMap = built.lotMap;
    window._lineDateSets = built.lineDateSets;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  })
  .catch(e => { document.getElementById('loading').textContent = 'Failed to load data: ' + e.message; });

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach((b,i) => b.classList.toggle('active',(i===0&&v==='exec')||(i===1&&v==='ops')));
  render();
}

function render() {
  Object.values(charts).forEach(c => { try{c.destroy();}catch(e){} });
  charts = {};
  try {
    currentView === 'exec' ? renderExec() : renderOps();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div style="padding:2rem;color:#a32d2d;font-family:monospace;font-size:12px">
      Error: ${e.message}<br><br>
      Stack: ${(e.stack||'').split('\n').slice(0,5).join('<br>')}
    </div>`;
    console.error(e);
  }
}

function renderExec() {
  const lots = Object.values(lotMap);
  const completeLots = lots.filter(l => l.status.toLowerCase().includes('complete'));
  const partialLots  = lots.filter(l => l.status.toLowerCase().includes('partial'));
  const totalUnits   = lots.reduce((s,l) => s + l.finalUnits, 0);
  const totalProj    = lots.reduce((s,l) => s + l.projected, 0);
  const uniqueProds  = new Set(lots.map(l => l.product)).size;
  const uniqueCustomers = new Set(lots.map(l => (l.product||'').split('-')[0].trim()).filter(Boolean)).size;
  const uniqueProductionDays = new Set(lots.map(l => l.date).filter(Boolean)).size;
  const avgUnitsPerDay = uniqueProductionDays ? Math.round(totalUnits / uniqueProductionDays) : 0;
  const totalLots    = lots.length;
  const devs         = lots.map(l => lotDev(l)).filter(d => d !== null);
  const avgDev       = devs.length ? devs.reduce((s,d)=>s+d,0)/devs.length : 0;
  const highDevCount = devs.filter(d => d < -5).length;

  // Date range
  const dates = allRows.map(r => new Date(r['Date'])).filter(d => !isNaN(d));
  const minDate = new Date(Math.min(...dates)), maxDate = new Date(Math.max(...dates));
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  if (dates.length) document.getElementById('data-range').textContent = `Data: ${fmt(minDate)} – ${fmt(maxDate)}`;

  // Year-end projection
  const now = new Date();
  const dayOfYear = Math.ceil((now - new Date(now.getFullYear(),0,1)) / 86400000);
  const yearProjected = Math.round((totalUnits / dayOfYear) * 365);
  const toTarget = yearProjected - YEAR_TARGET;
  const targetPct = Math.round((yearProjected / YEAR_TARGET) * 100);
  const onTrack = yearProjected >= YEAR_TARGET;

  // Top products
  const byProd = {};
  lots.forEach(l => { byProd[l.product] = (byProd[l.product]||0) + l.finalUnits; });
  const topProds = Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxProdUnits = topProds[0]?.[1] || 1;

  // Powder mix by jar size
  const byJar = {};
  lots.forEach(l => {
    const k = jarSizeKey(l.jarSize);
    if (!k) return;
    byJar[k] = (byJar[k]||0) + l.finalUnits;
  });
  const jarEntries = Object.entries(byJar).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const jarTotal = jarEntries.reduce((s,[,v])=>s+v,0);

  // Weekly trend (last 6 non-zero weeks)
  const byWeek = {};
  allRows.forEach(r => {
    const w = (r['WEEK NUMBER']||'').trim();
    if (!w) return;
    byWeek[w] = (byWeek[w]||0) + num(r['Final Units']);
  });
  const weeks = Object.keys(byWeek)
    .sort((a,b) => { const an=parseFloat(a),bn=parseFloat(b); return (!isNaN(an)&&!isNaN(bn))?an-bn:a.localeCompare(b); })
    .filter(w => byWeek[w] > 0).slice(-6);

  // Monthly vs target
  const byMonth = {};
  allRows.forEach(r => {
    const d = new Date(r['Date']);
    if (isNaN(d)) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = { year:d.getFullYear(), month:d.getMonth()+1, units:0 };
    byMonth[key].units += num(r['Final Units']);
  });
  const monthRows = Object.keys(byMonth).sort().map(k => {
    const {year,month,units} = byMonth[k];
    const daysInMonth = new Date(year,month,0).getDate();
    const daysInYear  = (year%4===0&&(year%100!==0||year%400===0))?366:365;
    const fullMonthTarget = Math.round((daysInMonth/daysInYear)*YEAR_TARGET);
    // for current month, prorate target by days elapsed so far
    const isCurrentMonth = (now.getFullYear()===year && now.getMonth()+1===month);
    const target = isCurrentMonth
      ? Math.round(fullMonthTarget * now.getDate() / daysInMonth)
      : fullMonthTarget;
    const pctOfTarget = target ? (units/target)*100 : 0;
    const label = `${String(month).padStart(2,'0')}/${year}`;
    return {label, units, target, pctOfTarget, isCurrentMonth, daysInMonth, daysSoFar: now.getDate()};
  });

  // Production lines
  const byLine = {};
  allRows.forEach(r => {
    const line = (r['Line']||'').trim();
    if (!line) return;
    if (!byLine[line]) byLine[line] = { units:0, lots:new Set() };
    byLine[line].units += num(r['Final Units']);
    byLine[line].lots.add(r['Lot Number']);
  });
  const lineEntries = Object.entries(byLine).sort((a,b) => {
    const na = parseInt(a[0].replace(/\D/g,'')), nb = parseInt(b[0].replace(/\D/g,''));
    return na - nb;
  });
  const maxLineUnits = lineEntries[0]?.[1]?.units || 1;
  const lineTotal = lineEntries.reduce((s,[,d])=>s+d.units,0);

  // Product performance table
  const prodDetail = {};
  lots.forEach(l => {
    if (!prodDetail[l.product]) prodDetail[l.product]={proj:0,final:0,lots:0,complete:0,partial:0};
    const p=prodDetail[l.product];
    p.proj+=l.projected; p.final+=l.finalUnits; p.lots++;
    if(l.status.toLowerCase().includes('complete'))p.complete++;
    else if(l.status.toLowerCase().includes('partial'))p.partial++;
  });
  const top10=Object.entries(prodDetail).sort((a,b)=>b[1].final-a[1].final).slice(0,10);

  const devColor = avgDev<-2?'#a32d2d':avgDev>2?'#3b6d11':'inherit';
  const devClass  = avgDev<-2?'warn':avgDev>2?'good':'';

  document.getElementById('content').innerHTML = `
    <div class="metrics">
      <div class="metric info"><div class="label">Units produced</div><div class="value">${totalUnits.toLocaleString()}</div><div class="sub">vs ${totalProj.toLocaleString()} projected</div></div>
      <div class="metric"><div class="label">Avg units / day</div><div class="value">${avgUnitsPerDay.toLocaleString()}</div><div class="sub">${uniqueProductionDays} production days</div></div>
      <div class="metric"><div class="label">Total lots</div><div class="value">${totalLots.toLocaleString()}</div><div class="sub">${completeLots.length} complete · ${partialLots.length} partial</div></div>
      <div class="metric good"><div class="label">Completion rate</div><div class="value">${pct(completeLots.length,totalLots)}%</div><div class="sub">${completeLots.length} of ${totalLots} lots</div></div>
      <div class="metric ${devClass}"><div class="label">Avg deviation</div><div class="value" style="color:${devColor}">${avgDev>0?'+':''}${avgDev.toFixed(1)}%</div><div class="sub">${highDevCount} lots >5% under</div></div>
      <div class="metric"><div class="label">Unique products</div><div class="value">${uniqueProds}</div><div class="sub">across all lots</div></div>
      <div class="metric"><div class="label">Unique customers</div><div class="value">${uniqueCustomers}</div><div class="sub">across all lots</div></div>
    </div>

    <div class="full-card">
      <h3>Year-end projection vs target</h3>
      <div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;margin-bottom:1rem">
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Day of year</div><div style="font-size:20px;font-weight:500">${dayOfYear} <span style="font-size:13px;color:var(--color-text-secondary,#666)">of 365</span></div></div>
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Units to date</div><div style="font-size:20px;font-weight:500">${totalUnits.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Year-end projection</div><div style="font-size:20px;font-weight:500;color:${onTrack?'#3b6d11':'#a32d2d'}">${yearProjected.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Year-end target</div><div style="font-size:20px;font-weight:500">3,927,000</div></div>
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">vs target</div><div style="font-size:20px;font-weight:500;color:${onTrack?'#3b6d11':'#a32d2d'}">${onTrack?'+':''}${toTarget.toLocaleString()} <span style="font-size:13px">(${targetPct}%)</span></div></div>
      </div>
      <div style="background:var(--color-background-secondary,#ececea);border-radius:8px;height:12px;overflow:hidden">
        <div style="height:100%;width:${Math.min(targetPct,100)}%;background:${onTrack?'#639922':'#a32d2d'};border-radius:8px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary,#999);margin-top:4px">
        <span>0</span><span style="color:${onTrack?'#3b6d11':'#a32d2d'};font-weight:500">${targetPct}% of target</span><span>3,927,000</span>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <h3>Top products by units produced</h3>
        <div id="top-prods-table" style="overflow-y:auto;max-height:260px"></div>
      </div>
      <div class="chart-card">
        <h3>Powder product mix — units by jar size</h3>
        <div style="position:relative;height:180px"><canvas id="cJar"></canvas></div>
        <div id="jar-legend" style="margin-top:8px;overflow-y:auto;max-height:120px"></div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:1rem">
      <h3>Weekly units produced — last 6 weeks</h3>
      <div style="position:relative;height:200px"><canvas id="cWeekly"></canvas></div>
    </div>

          <div class="full-card">
      <h3>Production lines breakdown</h3>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Line</th>
          <th style="text-align:right">Avg units/day</th>
          <th style="text-align:right">Units produced</th>
          <th style="min-width:140px"></th>
          <th style="text-align:right">% of total</th>
          <th style="text-align:right">Lots run</th>
        </tr></thead>
        <tbody>${lineEntries.map(([line,d]) => {
          const sp = lineTotal ? ((d.units/lineTotal)*100) : 0;
          const bw = Math.round((d.units/maxLineUnits)*100);
          const daysWithData = d.dates?.size || 0;
          const avgPerDay = daysWithData ? Math.round(d.units / daysWithData) : null;
          return `<tr>
            <td style="font-weight:500">${line}</td>
            <td style="text-align:right;color:var(--color-text-secondary,#666)">${avgPerDay !== null ? avgPerDay.toLocaleString() : '—'} <span style="font-size:10px;color:#a32d2d">[${daysWithData}d / ${d.units}u]</span></td>
            <td style="text-align:right;white-space:nowrap">${d.units.toLocaleString()}</td>
            <td style="padding:6px 10px">
              <div style="background:var(--color-background-secondary,#ececea);border-radius:3px;height:6px;overflow:hidden">
                <div style="height:100%;width:${bw}%;background:#1D9E75;border-radius:3px"></div>
              </div>
            </td>
            <td style="text-align:right;color:var(--color-text-secondary,#666)">${sp.toFixed(1)}%</td>
            <td style="text-align:right;color:var(--color-text-secondary,#666)">${d.lots.size.toLocaleString()}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

    <div class="full-card">
      <h3>Units produced by month vs. target</h3>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Month</th>
          <th style="text-align:right">Actual</th>
          <th style="text-align:right">Target</th>
          <th style="text-align:right">% of target</th>
          <th></th>
        </tr></thead>
        <tbody>${monthRows.map(m => {
          const over = m.pctOfTarget >= 100;
          const pc = over?'#3b6d11':'#a32d2d';
          const bw = Math.min(Math.round(m.pctOfTarget),100);
          const targetLabel = m.isCurrentMonth
            ? `${m.target.toLocaleString()} <span style="font-size:10px;color:var(--color-text-tertiary,#999)">(${m.daysSoFar}/${m.daysInMonth} days)</span>`
            : m.target.toLocaleString();
          return `<tr>
            <td style="font-weight:500">${m.label}</td>
            <td style="text-align:right">${m.units.toLocaleString()}</td>
            <td style="text-align:right;color:var(--color-text-secondary,#666)">${targetLabel}</td>
            <td style="text-align:right;font-weight:500;color:${pc}">${m.pctOfTarget.toFixed(2)}%</td>
            <td style="min-width:100px;padding:6px 10px">
              <div style="background:var(--color-background-secondary,#ececea);border-radius:3px;height:6px;overflow:hidden">
                <div style="height:100%;width:${bw}%;background:${over?'#639922':'#a32d2d'};border-radius:3px"></div>
              </div>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

    <div class="full-card">
      <h3>Product performance — top 10 by volume</h3>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Product</th><th style="text-align:right">Lots</th><th style="text-align:right">Projected</th>
          <th style="text-align:right">Units produced</th><th style="text-align:right">Avg deviation</th>
        </tr></thead>
        <tbody>${top10.map(([prod,d])=>{
          const dev=d.proj?((d.final-d.proj)/d.proj*100):0;
          const dc=dev<-5?'color:#a32d2d':dev>5?'color:#3b6d11':'';
          return `<tr>
            <td style="font-weight:500">${prod}</td>
            <td style="text-align:right">${d.lots}</td>
            <td style="text-align:right">${d.proj.toLocaleString()}</td>
            <td style="text-align:right">${d.final.toLocaleString()}</td>
            <td style="text-align:right;${dc}">${dev>0?'+':''}${dev.toFixed(1)}%</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  `;

  // Top products table
  document.getElementById('top-prods-table').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:4px 8px;color:var(--color-text-secondary,#666);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))">#</th>
        <th style="text-align:left;padding:4px 8px;color:var(--color-text-secondary,#666);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))">Product</th>
        <th style="text-align:right;padding:4px 8px;color:var(--color-text-secondary,#666);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))">Units</th>
        <th style="border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));width:80px"></th>
      </tr></thead>
      <tbody>${topProds.map(([p,v],i)=>{
        const bw=Math.round((v/maxProdUnits)*100);
        return `<tr style="border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.06))">
          <td style="padding:5px 8px;color:var(--color-text-tertiary,#999);font-size:11px">${i+1}</td>
          <td style="padding:5px 8px;font-weight:500">${p}</td>
          <td style="padding:5px 8px;text-align:right;white-space:nowrap">${v.toLocaleString()}</td>
          <td style="padding:5px 8px">
            <div style="background:var(--color-background-secondary,#ececea);border-radius:3px;height:6px;overflow:hidden">
              <div style="height:100%;width:${bw}%;background:#378ADD;border-radius:3px"></div>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;

  const JAR_COLORS=['#185fa5','#1D9E75','#EF9F27','#D4537E','#7F77DD','#D85A30','#639922','#E24B4A','#378ADD','#5DCAA5'];
  const maxJarUnits = jarEntries[0]?.[1] || 1;
  charts.jar = new Chart(document.getElementById('cJar'), {
    type: 'doughnut',
    data: {
      labels: jarEntries.map(([j]) => j),
      datasets: [{ data: jarEntries.map(([,v]) => v), backgroundColor: JAR_COLORS, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => { const v=ctx.raw; const p=jarTotal?((v/jarTotal)*100).toFixed(1):0; return `${v.toLocaleString()} units (${p}%)`; } } }
      }
    }
  });

  document.getElementById('jar-legend').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      ${jarEntries.map(([j,v],i) => {
        const p = jarTotal ? ((v/jarTotal)*100).toFixed(1) : 0;
        return `<tr style="border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.06))">
          <td style="padding:3px 6px;width:12px">
            <div style="width:10px;height:10px;border-radius:2px;background:${JAR_COLORS[i]};flex-shrink:0"></div>
          </td>
          <td style="padding:3px 6px;font-weight:500">${j}</td>
          <td style="padding:3px 6px;text-align:right;white-space:nowrap">${v.toLocaleString()}</td>
          <td style="padding:3px 6px;text-align:right;color:var(--color-text-secondary,#666);width:40px">${p}%</td>
        </tr>`;
      }).join('')}
    </table>`;

  // current week number (ISO-ish: week 1 = first week with data)
  const currentWeekNum = (() => {
    const d = new Date(now);
    d.setHours(0,0,0,0);
    const jan1 = new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
  })();

  const weekColors = weeks.map(w => parseInt(w) === currentWeekNum ? 'rgba(55,138,221,0.35)' : '#378ADD');
  const weekLabels = weeks.map(w => parseInt(w) === currentWeekNum ? `Week ${w} (current)` : `Week ${w}`);

  charts.weekly = new Chart(document.getElementById('cWeekly'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [{ label: 'Units produced', data: weeks.map(w=>byWeek[w]), backgroundColor: weekColors, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { callback: v => v.toLocaleString() } } }
    }
  });
}

function renderOps() {
  const lots = Object.values(lotMap);
  const products    = [...new Set(lots.map(l=>l.product).filter(Boolean))].sort();
  const weeks       = [...new Set(lots.map(l=>l.week).filter(Boolean))].sort();
  const bottleSizes = [...new Set(allRows.map(r=>r['Bottle Size']).filter(Boolean))].sort();
  const jarSizes    = [...new Set(allRows.map(r=>r['Jar Size']).filter(Boolean))].sort();

  document.getElementById('content').innerHTML = `
    <div class="filters">
      <input type="text" id="fSearch" placeholder="Search lot # or product…" style="min-width:180px" oninput="applyFilters()">
      <select id="fProduct" onchange="applyFilters()"><option value="">All products</option>${products.map(p=>`<option>${p}</option>`).join('')}</select>
      <select id="fStatus" onchange="applyFilters()"><option value="">All statuses</option><option>Complete</option><option>Partial</option></select>
      <select id="fWeek" onchange="applyFilters()"><option value="">All weeks</option>${weeks.map(w=>`<option>${w}</option>`).join('')}</select>
      <select id="fBottle" onchange="applyFilters()"><option value="">All bottle sizes</option>${bottleSizes.map(s=>`<option>${s}</option>`).join('')}</select>
      <select id="fJar" onchange="applyFilters()"><option value="">All jar sizes</option>${jarSizes.map(s=>`<option>${s}</option>`).join('')}</select>
      <button onclick="clearFilters()" style="font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;background:transparent;cursor:pointer;color:var(--color-text-secondary,#666)">Clear</button>
    </div>
    <div id="ops-metrics" class="metrics" style="margin-bottom:1rem"></div>
          <div class="full-card">
      <div class="tbl-wrap"><table style="min-width:600px">
        <thead><tr>
          <th onclick="sortBy('date')">Date ↕</th>
          <th onclick="sortBy('lot')">Lot # ↕</th>
          <th onclick="sortBy('product')">Product ↕</th>
          <th onclick="sortBy('line')">Line ↕</th>
          <th onclick="sortBy('bottleSize')">Bottle ↕</th>
          <th onclick="sortBy('jarSize')">Jar ↕</th>
          <th onclick="sortBy('projected')">Projected ↕</th>
          <th onclick="sortBy('finalUnits')">Final units ↕</th>
          <th onclick="sortBy('dev')">Dev % ↕</th>
          <th onclick="sortBy('status')">Status ↕</th>
        </tr></thead>
        <tbody id="ops-body"></tbody>
      </table></div>
      <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Next →</button>
        <span id="rowCount" style="margin-left:auto"></span>
      </div>
    </div>`;
  applyFilters();
}

function getFilteredLots() {
  const search=(document.getElementById('fSearch')||{}).value?.toLowerCase()||'';
  const prod  =(document.getElementById('fProduct')||{}).value||'';
  const status=(document.getElementById('fStatus')||{}).value||'';
  const week  =(document.getElementById('fWeek')||{}).value||'';
  const bottle=(document.getElementById('fBottle')||{}).value||'';
  const jar   =(document.getElementById('fJar')||{}).value||'';
  return Object.values(lotMap).filter(l=>{
    if(search&&!(l.lot.toLowerCase().includes(search)||l.product.toLowerCase().includes(search)))return false;
    if(prod&&l.product!==prod)return false;
    if(status&&!l.status.toLowerCase().includes(status.toLowerCase()))return false;
    if(week&&l.week!==week)return false;
    if(bottle&&l.bottleSize!==bottle)return false;
    if(jar&&l.jarSize!==jar)return false;
    return true;
  });
}

function applyFilters(){page=1;updateOpsTable();}
function clearFilters(){['fSearch','fProduct','fStatus','fWeek','fBottle','fJar'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});applyFilters();}
function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}updateOpsTable();}
function changePage(dir){page+=dir;updateOpsTable();}

function updateOpsTable(){
  let lots=getFilteredLots();
  if(sortCol){
    lots=[...lots].sort((a,b)=>{
      let av=a[sortCol]??'',bv=b[sortCol]??'';
      if(sortCol==='dev'){av=lotDev(a)??-999;bv=lotDev(b)??-999;}
      if(sortCol==='date'){return(new Date(av)-new Date(bv))*sortDir;}
      if(typeof av==='number'||!isNaN(parseFloat(av)))return(parseFloat(av)-parseFloat(bv))*sortDir;
      return String(av).localeCompare(String(bv))*sortDir;
    });
  }
  const total=lots.length,totalPages=Math.ceil(total/PAGE_SIZE)||1;
  page=Math.min(Math.max(1,page),totalPages);
  const slice=lots.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const totalProj=lots.reduce((s,l)=>s+l.projected,0);
  const totalFinal=lots.reduce((s,l)=>s+l.finalUnits,0);
  const complete=lots.filter(l=>l.status.toLowerCase().includes('complete')).length;
  const devs=lots.map(l=>lotDev(l)).filter(d=>d!==null);
  const avgDev=devs.length?devs.reduce((s,d)=>s+d,0)/devs.length:0;
  const dc=avgDev<-2?'#a32d2d':avgDev>2?'#3b6d11':'inherit';
  const om=document.getElementById('ops-metrics');
  if(om)om.innerHTML=`
    <div class="metric info"><div class="label">Lots shown</div><div class="value">${total.toLocaleString()}</div></div>
    <div class="metric"><div class="label">Units produced</div><div class="value">${totalFinal.toLocaleString()}</div><div class="sub">vs ${totalProj.toLocaleString()} projected</div></div>
    <div class="metric"><div class="label">Avg deviation</div><div class="value" style="color:${dc}">${avgDev>0?'+':''}${avgDev.toFixed(1)}%</div><div class="sub">lot by lot</div></div>
    <div class="metric good"><div class="label">Complete lots</div><div class="value">${complete}</div><div class="sub">of ${total} shown</div></div>`;
  const body=document.getElementById('ops-body');
  if(!body)return;
  body.innerHTML=slice.map(l=>{
    const dev=lotDev(l);
    const devStr=dev!==null?`${dev>0?'+':''}${dev.toFixed(1)}%`:'—';
    const devCls=dev!==null&&Math.abs(dev)>=5?(dev<0?'neg-dev':'pos-dev'):'';
    const st=l.status.toLowerCase();
    const badgeCls=st.includes('complete')?'complete':st.includes('partial')?'partial':'';
    return `<tr>
      <td>${l.date}</td><td style="font-weight:500">${l.lot}</td><td>${l.product}</td>
      <td>${l.line||'—'}</td><td>${l.bottleSize||'—'}</td><td>${l.jarSize||'—'}</td>
      <td style="text-align:right">${l.projected?l.projected.toLocaleString():'—'}</td>
      <td style="text-align:right">${l.finalUnits?l.finalUnits.toLocaleString():'—'}</td>
      <td>${dev!==null?`<span class="badge ${devCls}">${devStr}</span>`:'—'}</td>
      <td><span class="badge ${badgeCls}">${l.status||'—'}</span></td>
    </tr>`;
  }).join('');
  const pi=document.getElementById('pageInfo'),pb=document.getElementById('prevBtn'),nb=document.getElementById('nextBtn'),rc=document.getElementById('rowCount');
  if(pi)pi.textContent=`Page ${page} of ${totalPages}`;
  if(pb)pb.disabled=page<=1;
  if(nb)nb.disabled=page>=totalPages;
  if(rc)rc.textContent=`${total.toLocaleString()} lots`;
}
</script>
</body>
</html>
