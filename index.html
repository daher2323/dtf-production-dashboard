<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTF - Production Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #141618; color: #e8e6e0; font-size: 14px; min-height: 100vh; }
  .shell { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

  .app-bar { display: flex; align-items: stretch; background: #141618; border-bottom: 0.5px solid #2c2c2a; padding: 0; min-height: 68px; position: sticky; top: 0; z-index: 100; }
  .brand-wrap { display: flex; align-items: center; gap: 12px; padding: 10px 20px 10px 4px; margin-right: 16px; border-right: 0.5px solid #2c2c2a; flex-shrink: 0; cursor: pointer; }
  .brand-wrap:hover { opacity: .85; }
  .brand-name { font-size: 19px; font-weight: 500; color: #e8e6e0; line-height: 1.2; }
  .brand-sub { font-size: 12px; color: #888780; margin-top: 2px; }
  .main-tabs { display: flex; align-items: center; gap: 6px; padding: 12px 0; flex: 1; }
  .main-tab { display: flex; align-items: center; gap: 9px; padding: 7px 14px; border-radius: 9px; font-size: 13px; cursor: pointer; transition: all .15s; white-space: nowrap; border: 1.5px solid transparent; user-select: none; }
  .main-tab.on { background: #0C2240; border-color: #1D5A99; }
  .main-tab:not(.on) { color: #5f5e5a; }
  .main-tab:not(.on):hover { background: #1a1d20; color: #888780; }
  .main-tab-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .main-tab.on .main-tab-icon { background: #0C447C; border: 0.5px solid #378ADD; }
  .main-tab:not(.on) .main-tab-icon { background: #1e2124; border: 0.5px solid #2c2c2a; }
  .main-tab-name { font-size: 13px; font-weight: 500; }
  .main-tab.on .main-tab-name { color: #e8e6e0; }
  .main-tab:not(.on) .main-tab-name { color: #5f5e5a; }
  .app-bar-right { display: flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 0.5px solid #2c2c2a; margin-left: auto; flex-shrink: 0; }
  .sub-bar-outer { background: #0d1118; border-bottom: 0.5px solid #1a2030; position: sticky; top: 68px; z-index: 99; }
  .sub-divider { width: 0.5px; height: 20px; background: #2c2c2a; flex-shrink: 0; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 1rem; }
  .metric .label { font-size: 11px; color: #888780; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .metric .value { font-size: 22px; font-weight: 500; line-height: 1; color: #e8e6e0; }
  .metric .sub { font-size: 11px; color: #5f5e5a; margin-top: 4px; }
  .metric .yoy { margin-top: 6px; }
  .metric.good .value { color: #1D9E75; }
  .metric.warn .value { color: #EF9F27; }
  .metric.info .value { color: #378ADD; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .chart-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; }
  .chart-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .full-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; margin-bottom: 10px; }
  .full-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .filters { display: flex; align-items: center; gap: 6px; margin-bottom: 1rem; width: 100%; }
  .filters input[type=text] { flex: 1 1 0; min-width: 120px; padding: 5px 7px; border: 0.5px solid #444441; border-radius: 8px; background: #1e2124; color: #e8e6e0; font-size: 12px; height: 28px; }
  .filters .ms-wrap { flex: 1 1 0; min-width: 0; }
  .filters .ms-wrap .ms-trigger { width: 100%; justify-content: space-between; }
  .filters .filter-clear-btn { flex: 0 0 auto; }
  .filters .filter-export-btn { flex: 0 0 auto; margin-left: auto; position: relative; }
  .export-popover { position: absolute; right: 0; top: calc(100% + 6px); background: #1e2124; border: 0.5px solid #444441; border-radius: 10px; padding: 10px 12px; min-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 99998; white-space: nowrap; }
  .export-popover-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .export-popover-meta { font-size: 11px; color: #5f5e5a; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #2c2c2a; }
  .ms-trigger { display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;border:0.5px solid #444441;background:#1e2124;color:#888780;font-size:12px;cursor:pointer;white-space:nowrap;height:28px;user-select:none; }
  .ms-trigger.active { border-color:#378ADD;color:#e8e6e0; }
  .ms-badge { background:#378ADD;color:#042C53;font-size:10px;font-weight:500;padding:1px 6px;border-radius:8px; }
  .ms-wrap { position:relative; }
  .ms-item { display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;color:#e8e6e0;cursor:pointer; }
  .ms-item:hover { background:#252829; }
  .ms-chk { width:14px;height:14px;border-radius:3px;border:0.5px solid #444441;background:#141618;flex-shrink:0;display:flex;align-items:center;justify-content:center; }
  .ms-chk.on { background:#0C447C;border-color:#378ADD; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #2c2c2a; color: #888780; font-weight: 500; white-space: nowrap; cursor: default; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  thead th:hover { color: #e8e6e0; }
  tbody tr { border-bottom: 0.5px solid #2c2c2a; }
  tbody tr:hover { background: #252829; }
  tbody td { padding: 6px 10px; white-space: nowrap; color: #e8e6e0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.complete { background: #0F6E56; color: #9FE1CB; }
  .badge.partial { background: #633806; color: #FAC775; }
  .badge.neg-dev { background: #791F1F; color: #F09595; }
  .badge.pos-dev { background: #0F6E56; color: #9FE1CB; }
  .loading { text-align: center; padding: 3rem; color: #888780; }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: #888780; }
  .pagination button { padding: 4px 10px; border: 0.5px solid #444441; border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; color: #e8e6e0; }
  .pagination button:disabled { opacity: .3; cursor: default; }
  .ms-panel-fixed { position: fixed; z-index: 99999; background: #1e2124; border: 0.5px solid #444441; border-radius: 10px; padding: 8px; min-width: 220px; box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
  .ms-search { width:100%;padding:5px 8px;border:0.5px solid #444441;border-radius:6px;background:#141618;color:#e8e6e0;font-size:12px;margin-bottom:6px;outline:none; }
  .ms-list { max-height:200px;overflow-y:auto; }
  .ms-footer { border-top:0.5px solid #2c2c2a;margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;align-items:center; }
  .ms-count { font-size:11px;color:#5f5e5a; }
  .ms-clear { font-size:11px;color:#378ADD;cursor:pointer;background:none;border:none;padding:0; }
  @keyframes dtfPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#141618;">
  <div style="background:#1e2124;border:0.5px solid #2c2c2a;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center">
    <svg width="64" height="64" viewBox="0 0 54 54" style="margin-bottom:1.5rem"><rect x="2" y="2" width="50" height="50" rx="10" fill="#0C447C" stroke="#378ADD" stroke-width="1.5"/><text x="27" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#85B7EB" font-family="system-ui,sans-serif" letter-spacing="-1">DTF</text></svg>
    <div style="font-size:18px;font-weight:500;color:#e8e6e0;margin-bottom:4px">Dynamic Technical Formulations</div>
    <div style="font-size:13px;color:#888780;margin-bottom:2rem">Production Hub</div>
    <input id="pw-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()" style="width:100%;padding:10px 14px;border:0.5px solid #444441;border-radius:8px;background:#141618;color:#e8e6e0;font-size:14px;margin-bottom:10px;outline:none;display:block" autofocus>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer">Sign in</button>
    <div id="pw-error" style="color:#F09595;font-size:12px;margin-top:10px;display:none">Incorrect password. Please try again.</div>
  </div>
</div>

<div id="main-app" style="display:none">

<!-- App bar -->
<div class="app-bar">
  <div style="max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:stretch;padding:0 1.5rem;">
    <div class="brand-wrap" onclick="resetDashboard()" title="Return to home">
      <svg width="44" height="44" viewBox="0 0 54 54" style="flex-shrink:0"><rect x="2" y="2" width="50" height="50" rx="10" fill="#0C447C" stroke="#378ADD" stroke-width="1.5"/><text x="27" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#85B7EB" font-family="system-ui,sans-serif" letter-spacing="-1">DTF</text></svg>
      <div><div class="brand-name">Dynamic Technical Formulations</div><div class="brand-sub">Production Hub</div></div>
    </div>
    <div class="main-tabs">
      <div class="main-tab on" id="mtab-production" onclick="setMainSection('production')">
        <div class="main-tab-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#85B7EB" stroke-width="1.4" stroke-linecap="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></div>
        <span class="main-tab-name">Production</span>
      </div>
      <div class="main-tab" id="mtab-customers" onclick="setMainSection('customers')">
        <div class="main-tab-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#444441" stroke-width="1.4" stroke-linecap="round"><circle cx="6" cy="5" r="2.2"/><circle cx="11" cy="5" r="2.2"/><path d="M1 13c0-2 1.8-3.5 5-3.5"/><path d="M15 13c0-2-1.8-3.5-4-3.5"/></svg></div>
        <span class="main-tab-name">Customers</span>
      </div>
      <div class="main-tab" id="mtab-procurement" onclick="setMainSection('procurement')">
        <div class="main-tab-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#444441" stroke-width="1.4" stroke-linecap="round"><path d="M3 13V8m3 5V5m3 8V7m3 6V3"/></svg></div>
        <span class="main-tab-name">Procurement</span>
      </div>
    </div>
    <div class="app-bar-right" id="app-bar-right"></div>
  </div>
</div>

<!-- Sub-bar -->
<div class="sub-bar-outer">
  <div id="sub-bar" style="max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center;gap:8px;padding:.5rem 1.5rem;"></div>
</div>

<div class="shell">
  <div id="loading" class="loading">Loading production data...</div>
  <div id="content" style="display:none"></div>
</div>
</div>

<script>
var CORRECT_PW = 'DTF2026!';
var CSV_2026 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=943770391&single=true&output=csv';
var CSV_2025 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=2024063496&single=true&output=csv';
var CSV_TARGETS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=1686526578&single=true&output=csv';
var YEAR_TARGET = 3927000;
var YEAR_TARGET_2025 = 3300000;
var WEEKLY_TARGET = Math.round(YEAR_TARGET / 52);
var WEEKLY_TARGET_2025 = Math.round(YEAR_TARGET_2025 / 52);
var ALL_LINES = ['Line #1', 'Line #2', 'Line #4'];
var LINE_COLOR = {'line#1':'#378ADD','line#2':'#7F77DD','line#4':'#D4537E'};
var LINE_TRACK = {'line#1':'#061d35','line#2':'#1a1840','line#4':'#4B1528'};
var LINE_BG    = {'line#1':'#0C447C','line#2':'#3C3489','line#4':'#72243E'};
var LINE_TXT   = {'line#1':'#85B7EB','line#2':'#AFA9EC','line#4':'#ED93B1'};
var LINE_TYPE  = {'line#1':'Powder','line#2':'Capsules','line#4':'Powder'};

var allRows = [], allRows25 = [], lotMap = {}, dailyTargets = {};
var mainSection = 'production'; // 'production' | 'customers' | 'procurement'
var topView = 'summary', subView = 'today';
var selectedCustomer = null;
var sortCol = 'date', sortDir = -1, page = 1, PAGE_SIZE = 50;
var custLimit = 10;
var charts = {}, todayTimer = null, refreshTimer = null;
var productionDays = [], selectedDayIdx = -1;
var selectedWeekMon = null;
var selectedDetailQuarter = 'ytd';
var selectedDetailYear = new Date().getFullYear();
var selectedDetailRange = null;
var selectedPerfRange = null;
var procView = 'jars'; // 'jars' | 'bottles'
var lastRefreshTime = 0;
var filterState = { customer:[], product:[], status:[], bottle:[], jar:[] };

var _openMsId = null;

function lk(s) { return (s||'').replace(/\s/g,'').toLowerCase(); }

function toggleMsPanel(id) {
  if (_openMsId === id) { closeMsPanel(); return; }
  closeMsPanel();
  _openMsId = id;
  var trig = document.getElementById('ms-trig-' + id);
  if (!trig) return;
  var rect = trig.getBoundingClientRect();
  var allOpts = (window._msOptions && window._msOptions[id]) ? window._msOptions[id] : [];
  var selected = filterState[id] || [];
  var panel = document.createElement('div');
  panel.id = 'ms-panel-' + id;
  panel.className = 'ms-panel-fixed';
  panel.style.top  = (rect.bottom + 4) + 'px';
  panel.style.left = rect.left + 'px';
  panel.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
    + '<input class="ms-search" id="ms-search-' + id + '" placeholder="Search\u2026">'
    + '<button id="ms-close-btn-' + id + '" style="background:transparent;border:none;color:#888780;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;flex-shrink:0;margin-left:6px;">&#x2715;</button>'
    + '</div>'
    + '<div class="ms-list" id="ms-list-' + id + '">' + renderMsItems(id, allOpts, selected, '') + '</div>'
    + '<div class="ms-footer">'
    + '<span class="ms-count" id="ms-count-' + id + '">' + selected.length + ' selected</span>'
    + '<button class="ms-clear" id="ms-clear-btn-' + id + '">Clear</button>'
    + '</div>';
  document.body.appendChild(panel);
  var si = document.getElementById('ms-search-' + id);
  if (si) { si.addEventListener('input', function() { filterMsList(id); }); si.focus(); }
  var closeBtn = document.getElementById('ms-close-btn-' + id);
  if (closeBtn) closeBtn.addEventListener('click', function(e) { e.stopPropagation(); closeMsPanel(); });
  var clearBtn = document.getElementById('ms-clear-btn-' + id);
  if (clearBtn) clearBtn.addEventListener('click', function(e) { e.stopPropagation(); clearMsFilter(id); });
  panel.addEventListener('click', function(e) {
    e.stopPropagation();
    var item = e.target.closest('[data-ms-val]');
    if (item) toggleMsItem(id, item.getAttribute('data-ms-val'));
  });
  setTimeout(function() { document.addEventListener('click', outsideClickHandler, true); }, 0);
}

function outsideClickHandler(e) {
  if (!_openMsId) { document.removeEventListener('click', outsideClickHandler, true); return; }
  var panel = document.getElementById('ms-panel-' + _openMsId);
  var trig  = document.getElementById('ms-trig-' + _openMsId);
  if (panel && panel.contains(e.target)) return;
  if (trig  && trig.contains(e.target))  return;
  closeMsPanel();
}

function closeMsPanel() {
  document.removeEventListener('click', outsideClickHandler, true);
  if (_openMsId) { var p = document.getElementById('ms-panel-' + _openMsId); if (p) p.remove(); _openMsId = null; }
}

function renderMsItems(id, opts, selected, search) {
  var filtered = search ? opts.filter(function(o){ return o.toLowerCase().includes(search.toLowerCase()); }) : opts;
  if (!filtered.length) return '<div style="padding:8px;font-size:12px;color:#5f5e5a;font-style:italic;">No options</div>';
  return filtered.map(function(o) {
    var on = selected.indexOf(o) !== -1;
    var safe = o.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<div class="ms-item" data-ms-val="' + safe + '">'
      + '<div class="ms-chk' + (on ? ' on' : '') + '">'
      + (on ? '<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><polyline points="1,3 3,5 7,1" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '')
      + '</div><span>' + o + '</span></div>';
  }).join('');
}

function filterMsList(id) {
  var si = document.getElementById('ms-search-' + id); if (!si) return;
  var li = document.getElementById('ms-list-' + id);   if (!li) return;
  var opts = (window._msOptions && window._msOptions[id]) ? window._msOptions[id] : [];
  li.innerHTML = renderMsItems(id, opts, filterState[id] || [], si.value);
}

function toggleMsItem(id, val) {
  var arr = filterState[id] || [];
  var idx = arr.indexOf(val);
  if (idx === -1) arr.push(val); else arr.splice(idx, 1);
  filterState[id] = arr;
  var si   = document.getElementById('ms-search-' + id);
  var opts = (window._msOptions && window._msOptions[id]) ? window._msOptions[id] : [];
  var li   = document.getElementById('ms-list-' + id);
  if (li) li.innerHTML = renderMsItems(id, opts, arr, si ? si.value : '');
  var cc = document.getElementById('ms-count-' + id); if (cc) cc.textContent = arr.length + ' selected';
  rebuildMsTrigger(id);
  if (id === 'customer') rebuildProductOptions();
  applyFilters();
}

function rebuildMsTrigger(id) {
  var trig = document.getElementById('ms-trig-' + id); if (!trig) return;
  var count = (filterState[id] || []).length;
  var labels    = {customer:'Customer', product:'Product', status:'Status', bottle:'Bottle', jar:'Jar size'};
  var allLabels = {customer:'All customers', product:'All products', status:'All statuses', bottle:'All bottles', jar:'All jars'};
  trig.className = 'ms-trigger' + (count > 0 ? ' active' : '');
  trig.innerHTML = (count > 0 ? labels[id] + ' <span class="ms-badge">' + count + '</span>' : allLabels[id])
    + ' <span style="font-size:9px;color:#5f5e5a;">&#x25BE;</span>';
}

function rebuildProductOptions() {
  var custFilter = filterState['customer'] || [];
  var srcMap = window._detailLotMap || lotMap;
  var lots = Object.values(srcMap).filter(Boolean);
  var filtered = custFilter.length ? lots.filter(function(l){ return custFilter.indexOf((l.product||'').split('-')[0].trim()) !== -1; }) : lots;
  var prods = Array.from(new Set(filtered.map(function(l){ return l.product; }).filter(Boolean))).sort();
  if (window._msOptions) window._msOptions['product'] = prods;
  filterState['product'] = (filterState['product'] || []).filter(function(p){ return prods.indexOf(p) !== -1; });
  rebuildMsTrigger('product');
  var li = document.getElementById('ms-list-product');
  var si = document.getElementById('ms-search-product');
  if (li) li.innerHTML = renderMsItems('product', prods, filterState['product'], si ? si.value : '');
  var cc = document.getElementById('ms-count-product'); if (cc) cc.textContent = filterState['product'].length + ' selected';
}

function clearMsFilter(id) {
  filterState[id] = [];
  if (id === 'customer') rebuildProductOptions();
  rebuildMsTrigger(id);
  var opts = (window._msOptions && window._msOptions[id]) ? window._msOptions[id] : [];
  var li = document.getElementById('ms-list-' + id);
  if (li) li.innerHTML = renderMsItems(id, opts, [], '');
  var cc = document.getElementById('ms-count-' + id); if (cc) cc.textContent = '0 selected';
  applyFilters();
}

function buildMultiSelect(id, label, options, selectedArr) {
  var count = selectedArr.length;
  var allLabels = {customer:'All customers', product:'All products', status:'All statuses', bottle:'All bottles', jar:'All jars'};
  var triggerLabel = count > 0 ? label + ' <span class="ms-badge">' + count + '</span>' : allLabels[id];
  return '<div class="ms-wrap" id="ms-wrap-' + id + '">'
    + '<div class="ms-trigger' + (count > 0 ? ' active' : '') + '" onclick="toggleMsPanel(\'' + id + '\')" id="ms-trig-' + id + '">'
    + triggerLabel + ' <span style="font-size:9px;color:#5f5e5a;">&#x25BE;</span>'
    + '</div></div>';
}

function applyFilters() {

function parseCSV(text) {
  var clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  var lines = clean.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.replace(/^"|"$/g,'').trim().replace(/^\uFEFF/,''); });
  return lines.slice(1).map(function(line) {
    var vals = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    return headers.reduce(function(o,h,i){ o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); return o; }, {});
  });
}

function isValid(r) {
  if (!r || typeof r !== 'object') return false;
  var d=(r['Date']||'').trim(), l=(r['Lot Number']||'').trim(), p=(r['Product']||'').trim();
  if (!d||!l||!p) return false;
  if (p.startsWith('#')||l.startsWith('#')||d.startsWith('#')) return false;
  var suspect = /loading|#error|#ref|#n\/a|#value|#name|#div/i;
  if (suspect.test(p) || suspect.test(l) || suspect.test(d)) return false;
  var dt = new Date(d); if (isNaN(dt)) return false;
  var yr = dt.getFullYear(); if (yr < 2020 || yr > 2035) return false;
  return true;
}

function num(v) {
  if (!v && v !== 0) return 0;
  var n = parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}

function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }

function buildLotMap(rows) {
  var m = {};
  rows.forEach(function(r, idx) {
    if (!r||typeof r!=='object') return;
    var lot = (r['Lot Number']||'').trim(); if (!lot) return;
    if (!m[lot]) m[lot] = { lot:lot, date:r['Date']||'', product:r['Product']||'', bottleSize:r['Bottle Size']||'', jarSize:r['Jar Size']||'', projected:num(r['Projected Units']), finalUnits:0, status:r['Complete or Partial']||'', week:r['WEEK NUMBER']||'', line:r['Line']||'', startTime:r['Start Time']||'', rowIdx:idx };
    m[lot].finalUnits += num(r['Final Units']);
    if (r['Complete or Partial']) m[lot].status = r['Complete or Partial'];
    if (!m[lot].line && r['Line']) m[lot].line = r['Line'];
    if (!m[lot].date && r['Date']) m[lot].date = r['Date'];
    if (!m[lot].startTime && r['Start Time']) m[lot].startTime = r['Start Time'];
  });
  return m;
}

function lotDev(l) {
  if (!l||!l.projected) return null;
  return ((l.finalUnits - l.projected) / l.projected) * 100;
}

function jarSizeKey(j) {
  if (!j) return null; j = j.trim();
  var gm = j.match(/(\d+(?:\.\d+)?)\s*gallon/i); if (gm) return gm[1]+' Gallon';
  var um = j.match(/^(\d+(?:\.\d+)?)\s*(oz|cc|ml|lb|gal|g)\b/i);
  if (um) { var n=um[1],u=um[2].toLowerCase(); return (u==='g'||u==='gal')?n+' Gallon':n+u; }
  return j;
}

function deltaTag(vCur, vComp, isHigherBetter, fmt, compLabel, compYearLabel) {
  if (!vComp && vComp !== 0) return '';
  var diff = vCur - vComp, pctDiff = vComp ? ((diff/Math.abs(vComp))*100) : 0;
  var positive = isHigherBetter ? diff > 0 : diff < 0;
  var bg = positive ? '#085041' : '#791F1F', txt = positive ? '#9FE1CB' : '#F09595';
  var sign = diff > 0 ? '+' : '';
  var vsLabel = compYearLabel || '2025';
  var label = fmt === 'pct' ? sign+pctDiff.toFixed(1)+'% vs '+vsLabel : sign+Math.round(diff).toLocaleString()+' vs '+vsLabel;
  return '<div style="font-size:10px;color:#5f5e5a;margin-bottom:3px">'+vsLabel+': '+(compLabel||vComp.toLocaleString())+'</div>'
       + '<span style="display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:500;background:'+bg+';color:'+txt+'">'+label+'</span>';
}

function parseTargets(text) {
  if (!text) return {};
  try {
    var rows = parseCSV(text);
    var m = {};
    rows.forEach(function(r){
      var d = (r['Date']||'').trim(); if (!d) return;
      var dt = new Date(d); if (isNaN(dt)) return;
      var key = (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear();
      m[key] = {
        'Line #1': num(r['Line #1']||r['Line 1']||r['LINE #1']||''),
        'Line #2': num(r['Line #2']||r['Line 2']||r['LINE #2']||''),
        'Line #4': num(r['Line #4']||r['Line 4']||r['LINE #4']||'')
      };
    });
    return m;
  } catch(e) { return {}; }
}

function fetchWithRetry(url, retries, delay) {
  retries = retries || 5; delay = delay || 2000;
  return fetch(url).then(function(r){
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).then(function(text) {
    if (!text || text.trim().length < 50) throw new Error('Response too short');
    if (text.trim().startsWith('<!')) throw new Error('Received HTML instead of CSV');
    var firstLine = (text.trim().split('\n')[0]||'').toLowerCase();
    if (firstLine.indexOf('date') === -1 && firstLine.indexOf('lot') === -1)
      throw new Error('CSV headers missing or invalid');
    return text;
  }).catch(function(e){
    if (retries <= 1) throw e;
    return new Promise(function(res){ setTimeout(res, delay); })
      .then(function(){ return fetchWithRetry(url, retries-1, Math.round(delay*1.5)); });
  });
}

function fetchData() {
  return Promise.all([
    fetchWithRetry(CSV_2026),
    fetchWithRetry(CSV_2025),
    fetchWithRetry(CSV_TARGETS).catch(function(){ return ''; })
  ]);
}

function applyFreshData(res) {
  var newRows = parseCSV(res[0]).filter(isValid);
  var newRows25 = parseCSV(res[1]).filter(isValid);
  var newTargets = parseTargets(res[2]);
  if (newRows.length < 3) { console.warn('Refresh aborted: too few rows'); return false; }
  if (allRows.length > 0 && newRows.length < allRows.length) {
    console.warn('Refresh aborted: new data (' + newRows.length + ' rows) has fewer rows than current (' + allRows.length + '). Keeping existing data.');
    return false;
  }
  allRows = newRows; allRows25 = newRows25; dailyTargets = newTargets;
  lotMap = buildLotMap(allRows.concat(allRows25));
  buildProductionDays(true);
  return true;
}

function buildProductionDays(preserveSelection) {
  var now = new Date();
  var todayStr = (now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear();
  var seen = new Set();
  allRows.concat(allRows25).forEach(function(r){
    var d = (r['Date']||'').trim(); if (!d) return;
    var dt = new Date(d); if (isNaN(dt)) return;
    seen.add((dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear());
  });
  var days = Array.from(seen).sort(function(a,b){ return new Date(a)-new Date(b); });
  if (!seen.has(todayStr)) days.push(todayStr);
  var prev = productionDays[selectedDayIdx];
  productionDays = days;
  if (preserveSelection && prev) {
    var idx = days.indexOf(prev);
    selectedDayIdx = idx !== -1 ? idx : days.length - 1;
  } else {
    selectedDayIdx = days.length - 1;
  }
}

    var rows25 = parseCSV(results[1]).filter(isValid);
    if (rows.length < 3) {
      document.getElementById('loading').textContent = 'Data appears incomplete — retrying...';
      setTimeout(loadDashboard, 4000);
      return;
    }
    allRows = rows; allRows25 = rows25;
    dailyTargets = parseTargets(results[2]);
    lotMap = buildLotMap(allRows.concat(allRows25));
    buildProductionDays(false);
    lastRefreshTime = Date.now();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    renderSubBar();
    render();
    startRefreshTimers();
  }).catch(function(e){
    console.error('Load failed:', e);
    document.getElementById('loading').textContent = 'Connection issue — retrying in 10 seconds...';
    setTimeout(loadDashboard, 10000);
  });
}

function isViewingLive() { return selectedDayIdx === productionDays.length - 1; }

function computeRecords() {
  var allRowsBoth = allRows.concat(allRows25);
  var dailyMap = {};
  allRowsBoth.forEach(function(r) {
    var dt = new Date(r['Date']); if(isNaN(dt)) return;
    var dk = (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear();
    var line = (r['Line']||'').trim();
    var units = num(r['Final Units']);
    if(!dailyMap[dk]) dailyMap[dk] = {date:dk, total:0, byLine:{}};
    dailyMap[dk].total += units;
    if(line) dailyMap[dk].byLine[line] = (dailyMap[dk].byLine[line]||0) + units;
  });
  var weeklyMap = {};
  allRowsBoth.forEach(function(r) {
    var dt = new Date(r['Date']); if(isNaN(dt)) return;
    var d = new Date(dt); d.setHours(0,0,0,0);
    var dow = d.getDay();
    var mon = new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
    var wk = mon.getFullYear()+'-'+String(getWeekNum(mon)).padStart(2,'0');
    if(!weeklyMap[wk]) weeklyMap[wk] = {mon:mon, units:0};
    weeklyMap[wk].units += num(r['Final Units']);
  });
  var days = Object.values(dailyMap);
  var weeks = Object.values(weeklyMap);
  var top5days = days.slice().sort(function(a,b){return b.total-a.total;}).slice(0,5);
  var top5byLine = {};
  ALL_LINES.forEach(function(line) {
    top5byLine[line] = days
      .filter(function(d){ return d.byLine[line]; })
      .sort(function(a,b){ return b.byLine[line]-a.byLine[line]; })
      .slice(0,5)
      .map(function(d){ return {date:d.date, units:d.byLine[line]}; });
  });
  var top5weeks = weeks.slice().sort(function(a,b){return b.units-a.units;}).slice(0,5);
  return { dailyMap:dailyMap, top5days:top5days, top5byLine:top5byLine, top5weeks:top5weeks };
}

function hardRefresh() {
  var btn = document.querySelector('#app-bar-right button');
  if (btn) { btn.style.opacity = '.5'; btn.querySelector('span').textContent = 'Refreshing…'; }
  fetchData().then(function(res){
    if (applyFreshData(res)) { lastRefreshTime = Date.now(); render(); }
    else { if (btn) { btn.style.opacity = '1'; btn.querySelector('span').textContent = isViewingLive() ? 'Live' : 'Refresh'; } }
  }).catch(function(){ if (btn) { btn.style.opacity = '1'; btn.querySelector('span').textContent = 'Error'; setTimeout(function(){ render(); }, 1500); } });
}

function refreshAndRender(forceRender) {
  fetchData().then(function(res){
    if(applyFreshData(res)){
      lastRefreshTime = Date.now();
      var onToday = topView==='summary' && subView==='today';
      var onWeekly = topView==='summary' && subView==='weekly';
      if(onToday && !isViewingLive()) return;
      if(forceRender || onToday || onWeekly) render();
      else if(topView==='summary' && subView==='performance') render();
      else if(topView==='detail') render();
    }
  }).catch(function(e){ console.error('Refresh failed:', e); });
}

function startRefreshTimers() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (todayTimer) clearInterval(todayTimer);
  refreshTimer = setInterval(function(){
    if(topView==='summary'&&subView==='performance'||topView==='detail') refreshAndRender(false);
  }, 5*60*1000);
  todayTimer = setInterval(function(){
    if(topView==='summary'&&subView==='today') refreshAndRender(false);
  }, 60*1000);
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='visible' && Date.now()-lastRefreshTime > 45000) refreshAndRender(true);
  });
}

  var uniqueProds  = new Set(lots.map(function(l){return l.product;})).size;
  var uniqueCusts  = new Set(lots.map(function(l){return (l.product||'').split('-')[0].trim();}).filter(Boolean)).size;
  var totalLots    = lots.length;
  var devs         = lots.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var avgDev       = devs.length ? devs.reduce(function(s,d){return s+d;},0)/devs.length : 0;
  var highDevCount = devs.filter(function(d){return d<-5;}).length;
  var uniqDays     = new Set(lots.map(function(l){return l.date;}).filter(Boolean)).size;
  var avgPerDay    = uniqDays ? Math.round(totalUnits/uniqDays) : 0;

    return (d.getMonth()<now25mo)||(d.getMonth()===now25mo&&d.getDate()<=now25dy);
  });
  var total25     = rows25ytd.reduce(function(s,r){return s+num(r['Final Units']);},0);
  var lots25Map   = buildLotMap(rows25ytd);
  var lots25      = Object.values(lots25Map).filter(Boolean);
  var comp25      = lots25.filter(function(l){return l.status.toLowerCase().includes('complete');}).length;
  var total25lots = lots25.length;
  var comp25pct   = total25lots?Math.round((comp25/total25lots)*100):0;
  var uniqDays25  = new Set(lots25.map(function(l){return l.date;}).filter(Boolean)).size;
  var avg25perDay = uniqDays25?Math.round(total25/uniqDays25):0;
  var devs25      = lots25.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var avgDev25    = devs25.length?devs25.reduce(function(s,d){return s+d;},0)/devs25.length:0;
  var custs25     = new Set(lots25.map(function(l){return (l.product||'').split('-')[0].trim();}).filter(Boolean)).size;

  return {now:now,lots:lots,completeLots:completeLots,partialLots:partialLots,totalUnits:totalUnits,totalProj:totalProj,uniqueProds:uniqueProds,uniqueCusts:uniqueCusts,totalLots:totalLots,devs:devs,avgDev:avgDev,highDevCount:highDevCount,uniqDays:uniqDays,avgPerDay:avgPerDay,total25:total25,total25lots:total25lots,comp25pct:comp25pct,avg25perDay:avg25perDay,avgDev25:avgDev25,custs25:custs25,lineEntries:lineEntries,lineAvg:lineAvg,comp25:comp25};

function animateGauges(gaugeData, todayTotal, totalGoal, barColor) {
  var DURATION = 1200, start = null;
  function easeOut(t){ return 1-Math.pow(1-t,3); }
  function drawDial(idx, color, track, frac) {
    var canvas=document.getElementById('dial_'+idx); if(!canvas) return 0;
    var ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, cx=W/2, cy=H-8, r=Math.min(cx,cy)-8, lw=11;
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.strokeStyle=track;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
    if(frac>0){ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,Math.PI+Math.min(frac,1)*Math.PI);ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();}
    var p=Math.round(frac*100);
    ctx.fillStyle='#888780';ctx.font='500 12px system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p+'%',cx,cy-r*0.38);
    return p;
  }
  function draw(ts) {
    if(!start) start=ts;
    var t=Math.min((ts-start)/DURATION,1), e=easeOut(t);
    gaugeData.forEach(function(g){
      var frac=g.avg?(g.units/g.avg):0, hit=frac>=1;
      var p=drawDial(g.idx, hit?'#1D9E75':g.color, hit?'#085041':g.track, Math.min(frac*e,1));
      var ve=document.getElementById('gval_'+g.idx); if(ve){ve.textContent=Math.round(g.units*e).toLocaleString();ve.style.color=hit?'#1D9E75':g.color;}
      var be=document.getElementById('gbadge_'+g.idx); if(be){be.textContent=p+(g.sfx||'% of Avg');if(hit){be.style.background='#085041';be.style.color='#9FE1CB';}}
    });
    var tp=totalGoal?Math.round((todayTotal*e)/totalGoal*100):0;
    var pp=document.getElementById('banner-pct'); if(pp) pp.textContent=tp+'%';
    var pt=document.getElementById('banner-total'); if(pt) pt.textContent=Math.round(todayTotal*e).toLocaleString();
    var bf=document.getElementById('banner-bar'); if(bf){bf.style.width=Math.min(tp,100)+'%';bf.style.background=barColor;}
    if(t>=1){
      gaugeData.forEach(function(g){
        var frac=g.avg?(g.units/g.avg):0, hit=frac>=1;
        drawDial(g.idx, hit?'#1D9E75':g.color, hit?'#085041':g.track, frac);
        var ve=document.getElementById('gval_'+g.idx); if(ve) ve.textContent=g.units.toLocaleString();
        var be=document.getElementById('gbadge_'+g.idx); if(be) be.textContent=Math.round(frac*100)+(g.sfx||'% of Avg');
      });
      return;
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

function applyHitStates(gaugeData, todayTotal, totalGoal, statusLabel, statusColor) {

  var bt=document.getElementById('banner-track'); if(bt) bt.style.background=allHit?'#0F6E56':'#2c2c2a';
  var bs=document.getElementById('banner-bullseye'); if(bs) bs.style.display=allHit?'inline':'none';
  var bvStatus=document.getElementById('banner-status'); if(bvStatus){bvStatus.textContent=statusLabel;bvStatus.style.color=statusColor;}
  if(allHit){ var pt=document.getElementById('banner-total'); if(pt) pt.style.animation='dtfPulse .6s ease-in-out 2'; }

function lotSortKey(l){ if(l.startTime){ var t=l.startTime.trim(),m12=t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i); if(m12){ var h=parseInt(m12[1]),min=parseInt(m12[2]),ap=m12[3].toUpperCase(); if(ap==='PM'&&h!==12)h+=12; if(ap==='AM'&&h===12)h=0; return h*60+min; } var m24=t.match(/^(\d{1,2}):(\d{2})$/); if(m24) return parseInt(m24[1])*60+parseInt(m24[2]); } return 10000+(l.rowIdx||0); }

function updateOpsTable() {
  var lots=getFilteredLots();
  if(sortCol){
    lots=lots.slice().sort(function(a,b){
      var av=a[sortCol]!=null?a[sortCol]:'', bv=b[sortCol]!=null?b[sortCol]:'';
      if(sortCol==='dev'){ av=lotDev(a)!=null?lotDev(a):-999; bv=lotDev(b)!=null?lotDev(b):-999; }
      if(sortCol==='date'){ var dd=(new Date(av)-new Date(bv))*sortDir; if(dd!==0) return dd; var sw=statusSortWeight(a)-statusSortWeight(b); return sw!==0?sw:lotSortKey(b)-lotSortKey(a); }
      if(sortCol==='status'){ var sw=(statusSortWeight(a)-statusSortWeight(b))*sortDir; return sw!==0?sw:lotSortKey(b)-lotSortKey(a); }
      if(typeof av==='number'||!isNaN(parseFloat(av))) return (parseFloat(av)-parseFloat(bv))*sortDir;
      return String(av).localeCompare(String(bv))*sortDir;

// ── Customer Health ───────────────────────────────────────────────────────

function getQuarterKey(dt) {
  var y = dt.getFullYear(), q = Math.floor(dt.getMonth()/3)+1;
  return y + '-Q' + q;
}

function quarterLabel(key) {
  var p = key.split('-'); return p[1] + ' ' + p[0];
}

var _chExpanded = {};

var _chSynopsis = {}; // cache generated synopses

function toggleCH(safeId) {
  _chExpanded[safeId] = !_chExpanded[safeId];
  var body = document.getElementById('ch-body-' + safeId);
  var chev = document.getElementById('ch-chev-' + safeId);
  if (body) body.style.display = _chExpanded[safeId] ? 'block' : 'none';
  if (chev) chev.style.transform = _chExpanded[safeId] ? 'rotate(180deg)' : '';
  if (_chExpanded[safeId]) generateSynopsis(safeId);
}

function generateSynopsis(safeId) {
  var el = document.getElementById('ch-synopsis-' + safeId);
  if (!el) return;
  if (_chSynopsis[safeId]) { el.innerHTML = _chSynopsis[safeId]; return; }
  var dataEl = document.getElementById('ch-data-' + safeId);
  if (!dataEl) return;
  var cd = JSON.parse(dataEl.textContent);

  var curQk = getQuarterKey(new Date());

  // Only ever use completed quarters for any trend/trajectory statements
  var completed = cd.qtrs.filter(function(q){ return q.units > 0 && q.key !== curQk; });
  var hasActivity2025 = cd.qtrs.some(function(q){ return q.units > 0 && q.key.startsWith('2025-'); });
  var isNew = !hasActivity2025 && cd.ytd25 === 0;

  var ytdAvgRun   = cd.ytdLots   > 0 ? Math.round(cd.ytd   / cd.ytdLots)   : 0;
  var ytdAvgRun25 = cd.ytdLots25 > 0 ? Math.round(cd.ytd25 / cd.ytdLots25) : 0;
  var ytdChg  = cd.ytd25  > 0 ? (cd.ytd  - cd.ytd25)  / cd.ytd25  * 100 : null;
  var runChg  = ytdAvgRun25 > 0 ? (ytdAvgRun - ytdAvgRun25) / ytdAvgRun25 * 100 : null;
  var lotChg  = cd.ytdLots25 > 0 ? (cd.ytdLots - cd.ytdLots25) / cd.ytdLots25 * 100 : null;
  var pctChg  = cd.ytdPct25  > 0 ? (cd.ytdPct  - cd.ytdPct25) : null;

  function n(v){ return v.toLocaleString(); }

  var sentences = [];

  // ── Sentence 1: top-line volume ──
  if (isNew) {
    sentences.push(cd.name + ' joined us this year — we\'ve produced '
      + n(cd.ytd) + ' units across ' + cd.ytdLots + ' lot' + (cd.ytdLots !== 1 ? 's' : '')
      + (cd.ytdPct != null ? ', representing ' + cd.ytdPct + '% of our total production YTD' : '') + '.');
  } else if (ytdChg !== null) {
    var mag = Math.abs(ytdChg);
    var tone = mag > 40 ? (ytdChg > 0 ? 'significantly up' : 'significantly down')
             : mag > 15 ? (ytdChg > 0 ? 'up'               : 'down')
             :             (ytdChg > 0 ? 'slightly up'       : 'slightly down');
    sentences.push(cd.name + ' is ' + tone + ' ' + mag.toFixed(1) + '% YTD vs. the same period last year'
      + ' (' + n(cd.ytd25) + ' → ' + n(cd.ytd) + ' units)'
      + (cd.ytdPct != null ? ', now ' + cd.ytdPct + '% of our production' : '') + '.');
  } else {
    // No same-period YoY comparison — customer started mid-year last year
    // Find their first quarter with production
    var firstQtr = null;
    for (var fi = 0; fi < cd.qtrs.length; fi++) {
      if (cd.qtrs[fi].units > 0) { firstQtr = cd.qtrs[fi]; break; }
    }
    var whenJoined = firstQtr ? 'in ' + firstQtr.label : 'mid-last-year';
    sentences.push(cd.name + ' came on board ' + whenJoined + ' — we\'ve run '
      + n(cd.ytd) + ' units across ' + cd.ytdLots + ' lot' + (cd.ytdLots !== 1 ? 's' : '') + ' so far this year'
      + (cd.ytdPct != null ? ', making up ' + cd.ytdPct + '% of our production YTD' : '') + '.');
  }

  // ── Sentence 2: run size / lot count dynamic ──
  if (runChg !== null && Math.abs(runChg) > 4) {
    if (lotChg !== null && Math.abs(lotChg) > 4 && Math.sign(runChg) !== Math.sign(lotChg)) {
      var fewerMore = lotChg < 0 ? 'fewer' : 'more';
      var biggerSmaller = runChg > 0 ? 'larger' : 'smaller';
      sentences.push('They\'re running ' + fewerMore + ' lots (' + cd.ytdLots25 + ' → ' + cd.ytdLots
        + ') but each run is ' + biggerSmaller + ' ('
        + n(ytdAvgRun25) + ' → ' + n(ytdAvgRun) + ' avg units), pointing to '
        + (runChg > 0 ? 'bigger, more consolidated orders' : 'smaller, more fragmented orders') + '.');
    } else if (lotChg !== null && Math.abs(lotChg) > 4 && Math.sign(runChg) === Math.sign(lotChg)) {
      var dir = runChg > 0 ? 'increasing' : 'decreasing';
      sentences.push('Both lot count and average run size are ' + dir
        + ' (' + cd.ytdLots25 + ' → ' + cd.ytdLots + ' lots, '
        + n(ytdAvgRun25) + ' → ' + n(ytdAvgRun) + ' avg units).');
    } else {
      sentences.push('Average run size has ' + (runChg > 0 ? 'grown' : 'shrunk') + ' from '
        + n(ytdAvgRun25) + ' to ' + n(ytdAvgRun) + ' units ('
        + (runChg > 0 ? '+' : '') + runChg.toFixed(1) + '%) with a similar lot count.');
    }
  }

  // ── Sentence 3: share of production or quarterly trajectory ──
  if (pctChg !== null && Math.abs(pctChg) >= 0.5) {
    sentences.push('Their share of our production has '
      + (pctChg > 0 ? 'grown' : 'shrunk') + ' from '
      + cd.ytdPct25 + '% to ' + cd.ytdPct + '%'
      + (Math.abs(pctChg) >= 2 ? ', a notable shift in our production mix' : '') + '.');
  } else if (completed.length >= 3) {
    var last3 = completed.slice(-3);
    var allUp = last3[2].units > last3[1].units && last3[1].units > last3[0].units;
    var allDn = last3[2].units < last3[1].units && last3[1].units < last3[0].units;
    if (allUp) {
      sentences.push('Their volume has grown in each of the last three completed quarters ('
        + n(last3[0].units) + ' → ' + n(last3[1].units) + ' → ' + n(last3[2].units) + ' units).');
    } else if (allDn) {
      sentences.push('Their volume has declined in each of the last three completed quarters ('
        + n(last3[0].units) + ' → ' + n(last3[1].units) + ' → ' + n(last3[2].units) + ' units).');
    } else if (completed.length >= 2) {
      var prev = completed[completed.length - 2];
      var last = completed[completed.length - 1];
      var qChg = (last.units - prev.units) / prev.units * 100;
      if (Math.abs(qChg) > 10) {
        sentences.push('Their most recent completed quarter (' + last.label + ') was '
          + (qChg > 0 ? 'up' : 'down') + ' ' + Math.abs(qChg).toFixed(1) + '% vs. ' + prev.label
          + ' (' + n(prev.units) + ' → ' + n(last.units) + ' units).');
      }
    }
  } else if (completed.length === 2) {
    var prev2 = completed[0], last2 = completed[1];
    var qChg2 = (last2.units - prev2.units) / prev2.units * 100;
    if (Math.abs(qChg2) > 10) {
      sentences.push('Their most recent completed quarter (' + last2.label + ') was '
        + (qChg2 > 0 ? 'up' : 'down') + ' ' + Math.abs(qChg2).toFixed(1) + '% vs. ' + prev2.label
        + ' (' + n(prev2.units) + ' → ' + n(last2.units) + ' units).');
    }
  }

  var text = sentences.join(' ');
  if (!text) { el.innerHTML = ''; return; }

  var html = '<div style="display:flex;align-items:flex-start;gap:10px;">'
    + '<div style="width:20px;height:20px;border-radius:50%;background:#0C447C;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#85B7EB" stroke-width="1.2"/><line x1="5" y1="3" x2="5" y2="5.5" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7" r=".6" fill="#85B7EB"/></svg>'
    + '</div>'
    + '<p style="font-size:12px;color:#e8e6e0;line-height:1.65;margin:0;">' + text + '</p>'
  + '</div>';
  _chSynopsis[safeId] = html;
  el.innerHTML = html;
}

function safeid(s) {
  return s.replace(/[^a-zA-Z0-9]/g, '_');
}

function computeCustomerData() {
  var allRowsCombined = allRows.concat(allRows25);
  var allRowsCombined = allRows.concat(allRows25);
  var now = new Date();
  var nowYr = now.getFullYear();
  var curQk = getQuarterKey(now);

  // Build per-customer per-quarter data from Q1 2025 onward
  var cutoff = new Date(2025, 0, 1);
  var custQtr = {};
  var totalQtr = {};   // total units across all customers per quarter
  var totalYtd = 0;    // total units across all customers YTD this year
  var totalYtd25 = 0;  // same window last year
  allRowsCombined.forEach(function(r) {
    var prod = (r['Product']||'').trim(); if (!prod) return;
    var cust = prod.split('-')[0].trim(); if (!cust) return;
    var dt = new Date(r['Date']); if (isNaN(dt) || dt < cutoff) return;
    var qk = getQuarterKey(dt);
    if (!custQtr[cust]) custQtr[cust] = {};
    if (!custQtr[cust][qk]) custQtr[cust][qk] = {units:0, lots:new Set(), lotDates:{}};
    custQtr[cust][qk].units += num(r['Final Units']);
    var lot = (r['Lot Number']||'').trim();
    if (lot) {
      custQtr[cust][qk].lots.add(lot);
      if (!custQtr[cust][qk].lotDates[lot]) custQtr[cust][qk].lotDates[lot] = dt.getTime();
      else custQtr[cust][qk].lotDates[lot] = Math.min(custQtr[cust][qk].lotDates[lot], dt.getTime());
    }
    if (!totalQtr[qk]) totalQtr[qk] = 0;
    totalQtr[qk] += num(r['Final Units']);
  });

  // All quarters from Q1 2025 to current
  var displayQtrs = [];
  var dq = new Date(2025, 0, 1);
  while (getQuarterKey(dq) <= curQk) {
    displayQtrs.push(getQuarterKey(dq));
    dq.setMonth(dq.getMonth() + 3);
  }

  // Total YTD across all customers (for % of production)
  var ytd25cutoffAll = new Date(nowYr-1, now.getMonth(), now.getDate(), 23, 59, 59);
  var ytd25startAll  = new Date(nowYr-1, 0, 1);
  var ytdStartAll    = new Date(nowYr, 0, 1);
  allRowsCombined.forEach(function(r) {
    var dt = new Date(r['Date']); if (isNaN(dt)) return;
    var u = num(r['Final Units']);
    if (dt >= ytdStartAll && dt <= now) totalYtd += u;
    if (dt >= ytd25startAll && dt <= ytd25cutoffAll) totalYtd25 += u;
  });

  // Build annual totals per customer
  var custAnnual = {};
  allRowsCombined.forEach(function(r) {
    var prod = (r['Product']||'').trim(); if (!prod) return;
    var cust = prod.split('-')[0].trim(); if (!cust) return;
    var dt = new Date(r['Date']); if (isNaN(dt) || dt < cutoff) return;
    var yr = dt.getFullYear();
    if (!custAnnual[cust]) custAnnual[cust] = {};
    custAnnual[cust][yr] = (custAnnual[cust][yr]||0) + num(r['Final Units']);
  });

  var results = [];
  Object.keys(custQtr).forEach(function(cust) {
    var qmap = custQtr[cust];
    var qtrs = displayQtrs.map(function(qk) {
      var d = qmap[qk];
      if (!d || d.lots.size === 0) return {key:qk, units:0, lots:0, avgRun:0, freqDays:null, pctOfProd:null};
      var lotCount = d.lots.size;
      var avgRun = Math.round(d.units / lotCount);
      // Frequency: quarter length in days ÷ number of lots
      var qYear = parseInt(qk.split('-')[0]), qNum = parseInt(qk.split('Q')[1]);
      var qStart = new Date(qYear, (qNum-1)*3, 1);
      var qEnd   = new Date(qYear, qNum*3, 1);
      var isCurQ = qk === curQk;
      // For current partial quarter use days elapsed so far
      var qDays = isCurQ
        ? Math.max(1, Math.round((now - qStart) / 86400000))
        : Math.round((qEnd - qStart) / 86400000);
      var freqDays = parseFloat((qDays / lotCount).toFixed(1));
      var pctOfProd = totalQtr[qk] ? parseFloat(((d.units / totalQtr[qk]) * 100).toFixed(1)) : null;
      return {key:qk, units:d.units, lots:lotCount, avgRun:avgRun, freqDays:freqDays, pctOfProd:pctOfProd};
    });

    var withData = qtrs.filter(function(q){return q.units>0;});
    var ytd = custAnnual[cust] ? (custAnnual[cust][nowYr]||0) : 0;
    var ytdLots = 0;
    qtrs.forEach(function(q){ if (q.key.startsWith(nowYr+'-')) ytdLots += q.lots; });

    // YTD 2025: same month/day cutoff as today but in 2025
    var ytd25cutoff = new Date(now.getFullYear()-1, now.getMonth(), now.getDate(), 23, 59, 59);
    var ytd25start  = new Date(now.getFullYear()-1, 0, 1);
    var ytd25 = 0;
    var ytdLots25Set = new Set();
    allRowsCombined.forEach(function(r) {
      var p2 = (r['Product']||'').trim(); if (!p2) return;
      var c2 = p2.split('-')[0].trim(); if (c2 !== cust) return;
      var dt2 = new Date(r['Date']); if (isNaN(dt2)) return;
      if (dt2 >= ytd25start && dt2 <= ytd25cutoff) {
        ytd25 += num(r['Final Units']);
        var lot2 = (r['Lot Number']||'').trim(); if (lot2) ytdLots25Set.add(lot2);
      }
    });
    var ytdLots25 = ytdLots25Set.size;

    // Tag: based on YTD comparison so it always matches the bars shown
    var tag = 'new';
    if (ytd25 > 0) {
      var ytdChg = (ytd - ytd25) / ytd25;
      tag = ytdChg > 0.05 ? 'growing' : ytdChg < -0.05 ? 'declining' : 'flat';
    } else if (ytd > 0) {
      tag = 'new';
    }

    var annuals = custAnnual[cust] || {};
    var ytdPct   = totalYtd   > 0 ? parseFloat(((ytd   / totalYtd)   * 100).toFixed(1)) : null;
    var ytdPct25 = totalYtd25 > 0 ? parseFloat(((ytd25 / totalYtd25) * 100).toFixed(1)) : null;
    results.push({cust:cust, qtrs:qtrs, tag:tag, ytd:ytd, ytd25:ytd25, ytdLots:ytdLots, ytdLots25:ytdLots25, ytdPct:ytdPct, ytdPct25:ytdPct25, annuals:annuals, withData:withData});
  });

  // Sort by YTD units descending
  results.sort(function(a,b){ return b.ytd - a.ytd; });
  return {customers:results, displayQtrs:displayQtrs, curQk:curQk};
}
