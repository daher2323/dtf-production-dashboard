<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTF Production Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--color-background-tertiary, #f5f5f3); color: var(--color-text-primary, #1a1a1a); font-size: 14px; }
  .shell { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 18px; font-weight: 500; }
  .view-toggle { display: flex; gap: 6px; }
  .view-toggle button { padding: 6px 16px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary, #555); transition: all .15s; }
  .view-toggle button.active { background: var(--color-text-primary, #1a1a1a); color: var(--color-background-primary, #fff); border-color: transparent; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary, #ececea); border-radius: 10px; padding: 1rem; }
  .metric .label { font-size: 12px; color: var(--color-text-secondary, #666); margin-bottom: 6px; }
  .metric .value { font-size: 22px; font-weight: 500; }
  .metric .sub { font-size: 11px; color: var(--color-text-tertiary, #999); margin-top: 2px; }
  .metric.warn .value { color: #ba7517; }
  .metric.good .value { color: #3b6d11; }
  .metric.info .value { color: #185fa5; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .chart-card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); border-radius: 12px; padding: 1rem; }
  .chart-card h3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary, #666); margin-bottom: .75rem; }
  .full-card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
  .full-card h3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary, #666); margin-bottom: .75rem; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filters select, .filters input { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); border-radius: 8px; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #1a1a1a); font-size: 13px; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
  thead th { text-align: left; padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.15)); color: var(--color-text-secondary, #666); font-weight: 500; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--color-text-primary, #1a1a1a); }
  tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary, rgba(0,0,0,.08)); }
  tbody tr:hover { background: var(--color-background-secondary, #f5f5f3); }
  tbody td { padding: 6px 10px; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.complete { background: #eaf3de; color: #3b6d11; }
  .badge.partial { background: #faeeda; color: #854f0b; }
  .badge.high-dev { background: #fcebeb; color: #a32d2d; }
  .badge.low-dev { background: #eaf3de; color: #3b6d11; }
  .loading { text-align: center; padding: 3rem; color: var(--color-text-secondary, #666); }
  .debug-box { background: var(--color-background-primary,#fff); border: 0.5px solid var(--color-border-tertiary,rgba(0,0,0,.15)); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; font-size: 12px; font-family: monospace; color: var(--color-text-secondary,#666); white-space: pre-wrap; word-break: break-all; }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary, #666); }
  .pagination button { padding: 4px 10px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,.3)); border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; color: var(--color-text-primary, #1a1a1a); }
  .pagination button:disabled { opacity: .4; cursor: default; }
  @media (max-width: 600px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <div>
      <h1>Dynamic Technical Formulations — Production Dashboard</h1>
      <div id="data-range" style="font-size:12px;color:var(--color-text-secondary,#666);margin-top:2px;"></div>
    </div>
    <div class="view-toggle">
      <button class="active" onclick="setView('exec')">Executive</button>
      <button onclick="setView('ops')">Operations</button>
    </div>
  </div>
  <div id="loading" class="loading">Loading production data...</div>
  <div id="content" style="display:none"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=943770391&single=true&output=csv";

let allRows = [], currentView = 'exec', sortCol = null, sortDir = 1, page = 1;
const PAGE_SIZE = 50;
let charts = {};
let _finalCol = '', _projCol = '', _debugInfo = '';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    return headers.reduce((o, h, i) => { o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); return o; }, {});
  });
}

function isValid(r) {
  const d = (r['Date']||'').trim();
  const l = (r['Lot Number']||'').trim();
  const p = (r['Product']||'').trim();
  if (!d || !l || !p) return false;
  if (p.startsWith('#') || l.startsWith('#') || d.startsWith('#')) return false;
  return true;
}

function num(v) {
  if (v === null || v === undefined || v === '') return 0;
  const s = String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }

function rFinal(r) { return num(r[_finalCol]); }
function rProj(r)  { return num(r[_projCol]); }

function lotDev(r) {
  const proj = rProj(r), final = rFinal(r);
  if (!proj) return null;
  return ((final - proj) / proj) * 100;
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const parsed = parseCSV(text);
    allRows = parsed.filter(isValid);

    if (allRows.length > 0) {
      const keys = Object.keys(allRows[0]);
      // find final units column — match any key containing 'final'
      _finalCol = keys.find(k => k.toLowerCase().includes('final')) || '';
      // find projected units column
      _projCol  = keys.find(k => k.toLowerCase().includes('projected')) || '';

      _debugInfo = `Headers (${keys.length}): ${keys.map(k=>`"${k}"`).join(', ')}\n`
        + `Final col detected: "${_finalCol}" → sample: "${allRows[0][_finalCol]}"\n`
        + `Proj col detected:  "${_projCol}"  → sample: "${allRows[0][_projCol]}"\n`
        + `Valid rows: ${allRows.length}`;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  })
  .catch(e => {
    document.getElementById('loading').textContent = 'Failed to load data: ' + e.message;
  });

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach((b,i) => b.classList.toggle('active', (i===0&&v==='exec')||(i===1&&v==='ops')));
  render();
}

function render() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
  currentView === 'exec' ? renderExec() : renderOps();
}

function renderExec() {
  const rows = allRows;
  const completeRows = rows.filter(r => (r['Complete or Partial']||'').toLowerCase().includes('complete'));
  const partialRows  = rows.filter(r => (r['Complete or Partial']||'').toLowerCase().includes('partial'));
  const totalFinal     = rows.reduce((s,r) => s + rFinal(r), 0);
  const totalProjected = rows.reduce((s,r) => s + rProj(r),  0);
  const completeFinal  = completeRows.reduce((s,r) => s + rFinal(r), 0);
  const deviations     = rows.map(r => lotDev(r)).filter(d => d !== null);
  const avgDev         = deviations.length ? Math.round(deviations.reduce((s,d)=>s+d,0)/deviations.length) : 0;
  const highDevLots    = deviations.filter(d => Math.abs(d) >= 10).length;

  const byProduct = {};
  rows.forEach(r => {
    const p = r['Product']||'Unknown';
    if (!byProduct[p]) byProduct[p] = { proj:0, final:0, lots:0, complete:0, partial:0 };
    byProduct[p].proj  += rProj(r);
    byProduct[p].final += rFinal(r);
    byProduct[p].lots++;
    if ((r['Complete or Partial']||'').toLowerCase().includes('complete')) byProduct[p].complete++;
    else if ((r['Complete or Partial']||'').toLowerCase().includes('partial')) byProduct[p].partial++;
  });
  const topProducts = Object.entries(byProduct).sort((a,b) => b[1].final - a[1].final).slice(0,8);

  const byWeek = {};
  rows.forEach(r => {
    const w = (r['WEEK NUMBER']||'').trim()||(r['MON-YR']||'').trim()||'';
    if (!w) return;
    if (!byWeek[w]) byWeek[w] = { proj:0, final:0 };
    byWeek[w].proj  += rProj(r);
    byWeek[w].final += rFinal(r);
  });
  const weeks = Object.keys(byWeek).sort().slice(-16);

  const dates = rows.map(r=>r['Date']).filter(Boolean);
  if (dates.length) document.getElementById('data-range').textContent = `${dates[0]} – ${dates[dates.length-1]}`;

  const devColor = avgDev < 0 ? '#a32d2d' : avgDev > 0 ? '#3b6d11' : 'inherit';

  document.getElementById('content').innerHTML = `
    <div class="debug-box" id="debug-info">${_debugInfo}</div>
    <div class="metrics">
      <div class="metric info"><div class="label">Total units produced</div><div class="value">${totalFinal.toLocaleString()}</div><div class="sub">${completeFinal.toLocaleString()} from complete lots</div></div>
      <div class="metric"><div class="label">Total projected</div><div class="value">${totalProjected.toLocaleString()}</div><div class="sub">across ${rows.length} lots</div></div>
      <div class="metric ${avgDev>=0?'good':'warn'}"><div class="label">Avg lot deviation</div><div class="value" style="color:${devColor}">${avgDev>0?'+':''}${avgDev}%</div><div class="sub">${highDevLots} lots ≥10% off</div></div>
      <div class="metric good"><div class="label">Completion rate</div><div class="value">${pct(completeRows.length,rows.length)}%</div><div class="sub">${completeRows.length} complete · ${partialRows.length} partial</div></div>
      <div class="metric"><div class="label">Unique products</div><div class="value">${Object.keys(byProduct).length}</div><div class="sub">across all lots</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>Top products by units produced</h3><div style="position:relative;height:260px"><canvas id="chartProducts"></canvas></div></div>
      <div class="chart-card"><h3>Complete vs partial lots</h3><div style="position:relative;height:260px"><canvas id="chartStatus"></canvas></div></div>
    </div>
    <div class="full-card"><h3>Weekly output — projected vs actual (last 16 weeks)</h3><div style="position:relative;height:220px"><canvas id="chartWeekly"></canvas></div></div>
    <div class="full-card">
      <h3>Product performance summary</h3>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Product</th><th>Lots</th><th>Complete</th><th>Partial</th><th>Projected</th><th>Units produced</th><th>Avg deviation</th></tr></thead>
        <tbody>${topProducts.map(([p,d])=>{
          const dev = d.proj ? Math.round(((d.final-d.proj)/d.proj)*100) : 0;
          const dc = dev<-5?'color:#a32d2d':dev>5?'color:#3b6d11':'';
          return `<tr><td style="font-weight:500">${p}</td><td>${d.lots}</td><td>${d.complete}</td><td>${d.partial}</td><td>${d.proj.toLocaleString()}</td><td>${d.final.toLocaleString()}</td><td style="${dc}">${dev>0?'+':''}${dev}%</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;

  charts.products = new Chart(document.getElementById('chartProducts'), {
    type:'bar', data:{ labels: topProducts.map(([p])=>p.length>22?p.slice(0,20)+'…':p), datasets:[{ label:'Units produced', data:topProducts.map(([,d])=>d.final), backgroundColor:'#378ADD', borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{font:{size:10},maxRotation:35}}, y:{ticks:{callback:v=>v.toLocaleString()}} } }
  });
  charts.status = new Chart(document.getElementById('chartStatus'), {
    type:'doughnut', data:{ labels:[`Complete (${completeRows.length})`,`Partial (${partialRows.length})`], datasets:[{data:[completeRows.length,partialRows.length],backgroundColor:['#639922','#EF9F27'],borderWidth:0}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:12},boxWidth:12}}} }
  });
  charts.weekly = new Chart(document.getElementById('chartWeekly'), {
    type:'bar', data:{ labels:weeks, datasets:[
      { label:'Projected', data:weeks.map(w=>byWeek[w].proj), backgroundColor:'rgba(55,138,221,.25)', borderRadius:3 },
      { label:'Actual',    data:weeks.map(w=>byWeek[w].final), backgroundColor:'#378ADD', borderRadius:3 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:10}}}, scales:{ x:{ticks:{font:{size:10},autoSkip:true,maxRotation:45}}, y:{ticks:{callback:v=>v.toLocaleString()}} } }
  });
}

function renderOps() {
  const products    = [...new Set(allRows.map(r=>r['Product']).filter(Boolean))].sort();
  const weeks       = [...new Set(allRows.map(r=>r['WEEK NUMBER']).filter(Boolean))].sort();
  const bottleSizes = [...new Set(allRows.map(r=>r['Bottle Size']).filter(Boolean))].sort();
  const jarSizes    = [...new Set(allRows.map(r=>r['Jar Size']).filter(Boolean))].sort();

  document.getElementById('content').innerHTML = `
    <div class="debug-box">${_debugInfo}</div>
    <div class="filters">
      <input type="text" id="fSearch" placeholder="Search lot # or product…" style="min-width:180px" oninput="applyFilters()">
      <select id="fProduct" onchange="applyFilters()"><option value="">All products</option>${products.map(p=>`<option>${p}</option>`).join('')}</select>
      <select id="fStatus" onchange="applyFilters()"><option value="">All statuses</option><option>Complete</option><option>Partial</option></select>
      <select id="fWeek" onchange="applyFilters()"><option value="">All weeks</option>${weeks.map(w=>`<option>${w}</option>`).join('')}</select>
      <select id="fBottle" onchange="applyFilters()"><option value="">All bottle sizes</option>${bottleSizes.map(s=>`<option>${s}</option>`).join('')}</select>
      <select id="fJar" onchange="applyFilters()"><option value="">All jar sizes</option>${jarSizes.map(s=>`<option>${s}</option>`).join('')}</select>
      <button onclick="clearFilters()" style="font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;background:transparent;cursor:pointer;color:var(--color-text-secondary,#666)">Clear</button>
    </div>
    <div id="ops-metrics" class="metrics" style="margin-bottom:1rem"></div>
    <div class="full-card">
      <div class="tbl-wrap"><table id="ops-table">
        <thead><tr>
          <th onclick="sortBy('Date')">Date ↕</th>
          <th onclick="sortBy('Lot Number')">Lot # ↕</th>
          <th onclick="sortBy('Product')">Product ↕</th>
          <th onclick="sortBy('Bottle Size')">Bottle ↕</th>
          <th onclick="sortBy('Jar Size')">Jar ↕</th>
          <th onclick="sortBy('Projected Units')">Projected ↕</th>
          <th>Final units ↕</th>
          <th>Dev % ↕</th>
          <th onclick="sortBy('Complete or Partial')">Status ↕</th>
          <th onclick="sortBy('WEEK NUMBER')">Week ↕</th>
          <th>Induction</th><th>Belt speed</th><th>Lid size</th><th>Desiccant</th>
        </tr></thead>
        <tbody id="ops-body"></tbody>
      </table></div>
      <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Next →</button>
        <span id="rowCount" style="margin-left:auto"></span>
      </div>
    </div>`;
  applyFilters();
}

function getFiltered() {
  const search = (document.getElementById('fSearch')||{}).value?.toLowerCase()||'';
  const prod   = (document.getElementById('fProduct')||{}).value||'';
  const status = (document.getElementById('fStatus')||{}).value||'';
  const week   = (document.getElementById('fWeek')||{}).value||'';
  const bottle = (document.getElementById('fBottle')||{}).value||'';
  const jar    = (document.getElementById('fJar')||{}).value||'';
  return allRows.filter(r => {
    if (search && !((r['Lot Number']||'').toLowerCase().includes(search)||(r['Product']||'').toLowerCase().includes(search))) return false;
    if (prod   && r['Product'] !== prod) return false;
    if (status && !(r['Complete or Partial']||'').toLowerCase().includes(status.toLowerCase())) return false;
    if (week   && r['WEEK NUMBER'] !== week) return false;
    if (bottle && r['Bottle Size'] !== bottle) return false;
    if (jar    && r['Jar Size'] !== jar) return false;
    return true;
  });
}

function applyFilters() { page = 1; updateOpsTable(); }
function clearFilters() {
  ['fSearch','fProduct','fStatus','fWeek','fBottle','fJar'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  applyFilters();
}
function sortBy(col) { if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; } updateOpsTable(); }
function changePage(dir) { page+=dir; updateOpsTable(); }

function updateOpsTable() {
  let rows = getFiltered();
  if (sortCol) {
    rows = [...rows].sort((a,b) => {
      const av=a[sortCol]||'', bv=b[sortCol]||'';
      const an=parseFloat(String(av).replace(/,/g,'')), bn=parseFloat(String(bv).replace(/,/g,''));
      if(!isNaN(an)&&!isNaN(bn)) return (an-bn)*sortDir;
      return String(av).localeCompare(String(bv))*sortDir;
    });
  }
  const total=rows.length, totalPages=Math.ceil(total/PAGE_SIZE)||1;
  page=Math.min(Math.max(1,page),totalPages);
  const slice=rows.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);

  const totalProj  = rows.reduce((s,r)=>s+rProj(r),0);
  const totalFinal = rows.reduce((s,r)=>s+rFinal(r),0);
  const complete   = rows.filter(r=>(r['Complete or Partial']||'').toLowerCase().includes('complete')).length;
  const deviations = rows.map(r=>lotDev(r)).filter(d=>d!==null);
  const avgDev     = deviations.length ? Math.round(deviations.reduce((s,d)=>s+d,0)/deviations.length) : 0;
  const dc         = avgDev<0?'#a32d2d':avgDev>0?'#3b6d11':'inherit';

  const om=document.getElementById('ops-metrics');
  if(om) om.innerHTML=`
    <div class="metric info"><div class="label">Lots shown</div><div class="value">${total.toLocaleString()}</div></div>
    <div class="metric"><div class="label">Units produced</div><div class="value">${totalFinal.toLocaleString()}</div><div class="sub">vs ${totalProj.toLocaleString()} projected</div></div>
    <div class="metric"><div class="label">Avg deviation</div><div class="value" style="color:${dc}">${avgDev>0?'+':''}${avgDev}%</div><div class="sub">lot by lot</div></div>
    <div class="metric good"><div class="label">Complete lots</div><div class="value">${complete}</div><div class="sub">of ${total} shown</div></div>`;

  const body=document.getElementById('ops-body');
  if(!body) return;
  body.innerHTML=slice.map(r=>{
    const finalVal=rFinal(r), projVal=rProj(r);
    const dev=lotDev(r);
    const devStr=dev!==null?`${dev>0?'+':''}${Math.round(dev)}%`:'—';
    const devCls=dev!==null&&Math.abs(dev)>=10?(dev<0?'high-dev':'low-dev'):'';
    const st=(r['Complete or Partial']||'').toLowerCase();
    const badgeCls=st.includes('complete')?'complete':st.includes('partial')?'partial':'';
    return `<tr>
      <td>${r['Date']||''}</td>
      <td style="font-weight:500">${r['Lot Number']||''}</td>
      <td>${r['Product']||''}</td>
      <td>${r['Bottle Size']||'—'}</td>
      <td>${r['Jar Size']||'—'}</td>
      <td>${projVal?projVal.toLocaleString():'—'}</td>
      <td>${finalVal?finalVal.toLocaleString():'—'}</td>
      <td>${dev!==null?`<span class="badge ${devCls}">${devStr}</span>`:'—'}</td>
      <td><span class="badge ${badgeCls}">${r['Complete or Partial']||'—'}</span></td>
      <td>${r['WEEK NUMBER']||''}</td>
      <td>${r['Induction Setting']||'—'}</td>
      <td>${r['Belt Speed']||'—'}</td>
      <td>${r['Lid Size']||'—'}</td>
      <td>${r['Desiccant']||'—'}</td>
    </tr>`;
  }).join('');

  const pi=document.getElementById('pageInfo'), pb=document.getElementById('prevBtn'), nb=document.getElementById('nextBtn'), rc=document.getElementById('rowCount');
  if(pi) pi.textContent=`Page ${page} of ${totalPages}`;
  if(pb) pb.disabled=page<=1;
  if(nb) nb.disabled=page>=totalPages;
  if(rc) rc.textContent=`${total.toLocaleString()} lots`;
}
</script>
</body>
</html>
