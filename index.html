<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Technical Formulations - Production Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #141618; color: #e8e6e0; font-size: 14px; }
  .shell { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 54px; width: auto; background: #fff; border-radius: 8px; padding: 4px 8px; }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name { font-size: 20px; font-weight: 500; color: #e8e6e0; line-height: 1.2; }
  .brand-sub { font-size: 13px; color: #888780; margin-top: 2px; }
  .data-range { font-size: 11px; color: #5f5e5a; margin-top: 3px; }
  .view-toggle { display: flex; gap: 6px; }
  .view-toggle button { padding: 6px 18px; border-radius: 20px; border: 0.5px solid #444441; background: transparent; cursor: pointer; font-size: 13px; color: #888780; transition: all .15s; }
  .view-toggle button.active { background: #378ADD; color: #fff; border-color: transparent; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 1rem; }
  .metric .label { font-size: 11px; color: #888780; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .metric .value { font-size: 22px; font-weight: 500; line-height: 1; color: #e8e6e0; }
  .metric .sub { font-size: 11px; color: #5f5e5a; margin-top: 4px; }
  .metric.good .value { color: #1D9E75; }
  .metric.warn .value { color: #EF9F27; }
  .metric.info .value { color: #378ADD; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .chart-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; }
  .chart-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .full-card { background: #1e2124; border: 0.5px solid #2c2c2a; border-radius: 12px; padding: 1rem; margin-bottom: 10px; }
  .full-card h3 { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filters select, .filters input { padding: 6px 10px; border: 0.5px solid #444441; border-radius: 8px; background: #1e2124; color: #e8e6e0; font-size: 13px; }
  .filters select option { background: #1e2124; color: #e8e6e0; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #2c2c2a; color: #888780; font-weight: 500; white-space: nowrap; cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  thead th:hover { color: #e8e6e0; }
  tbody tr { border-bottom: 0.5px solid #2c2c2a; }
  tbody tr:hover { background: #252829; }
  tbody td { padding: 6px 10px; white-space: nowrap; color: #e8e6e0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.complete { background: #0F6E56; color: #9FE1CB; }
  .badge.partial  { background: #633806; color: #FAC775; }
  .badge.neg-dev  { background: #791F1F; color: #F09595; }
  .badge.pos-dev  { background: #0F6E56; color: #9FE1CB; }
  .loading { text-align: center; padding: 3rem; color: #888780; }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: #888780; }
  .pagination button { padding: 4px 10px; border: 0.5px solid #444441; border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; color: #e8e6e0; }
  .pagination button:disabled { opacity: .3; cursor: default; }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <div class="brand">
      <img src="DTF_Logo.png" alt="DTF Logo" onerror="this.style.display='none'">
      <div class="brand-text">
        <div class="brand-name">Dynamic Technical Formulations</div>
        <div class="brand-sub">Production Dashboard</div>
        <div class="data-range" id="data-range"></div>
      </div>
    </div>
    <div class="view-toggle">
      <button class="active" onclick="setView('exec')">Executive</button>
      <button onclick="setView('ops')">Operations</button>
    </div>
  </div>
  <div id="loading" class="loading">Loading production data...</div>
  <div id="content" style="display:none"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Vqunj5euX6ZRNwnYeF22UChTxiCd6gP_GVEiuFBeUo6o9c2Mc6Idt1pQkckhuyukmNJesy8_nZqX/pub?gid=943770391&single=true&output=csv";
const YEAR_TARGET = 3927000;
const WEEKLY_TARGET = Math.round(YEAR_TARGET / 52);

let allRows = [], lotMap = {}, currentView = 'exec', sortCol = 'date', sortDir = -1, page = 1;
const PAGE_SIZE = 50;
let charts = {};

function parseCSV(text) {
  const clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  const lines = clean.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().replace(/^\uFEFF/,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    return headers.reduce((o,h,i) => { o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); return o; }, {});
  });
}

function isValid(r) {
  if (!r || typeof r !== 'object') return false;
  const d = (r['Date']||'').trim(), l = (r['Lot Number']||'').trim(), p = (r['Product']||'').trim();
  if (!d || !l || !p) return false;
  if (p.startsWith('#') || l.startsWith('#') || d.startsWith('#')) return false;
  return true;
}

function num(v) {
  if (!v && v !== 0) return 0;
  const n = parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}

function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }

function buildLotMap(rows) {
  const m = {};
  rows.forEach(r => {
    if (!r || typeof r !== 'object') return;
    const lot = (r['Lot Number']||'').trim();
    if (!lot) return;
    if (!m[lot]) {
      m[lot] = {
        lot, date: r['Date']||'', product: r['Product']||'',
        bottleSize: r['Bottle Size']||'', jarSize: r['Jar Size']||'',
        projected: num(r['Projected Units']), finalUnits: 0,
        status: r['Complete or Partial']||'', week: r['WEEK NUMBER']||'',
        line: r['Line']||''
      };
    }
    m[lot].finalUnits += num(r['Final Units']);
    if (r['Complete or Partial']) m[lot].status = r['Complete or Partial'];
    if (!m[lot].line && r['Line']) m[lot].line = r['Line'];
    if (!m[lot].date && r['Date']) m[lot].date = r['Date'];
  });
  return m;
}

function lotDev(l) {
  if (!l || !l.projected) return null;
  return ((l.finalUnits - l.projected) / l.projected) * 100;
}

function jarSizeKey(j) {
  if (!j) return null;
  j = j.trim();
  const galMatch = j.match(/(\d+(?:\.\d+)?)\s*gallon/i);
  if (galMatch) return galMatch[1] + ' Gallon';
  const unitMatch = j.match(/^(\d+(?:\.\d+)?)\s*(oz|cc|ml|lb|gal|g)\b/i);
  if (unitMatch) {
    const n = unitMatch[1], u = unitMatch[2].toLowerCase();
    if (u === 'g' || u === 'gal') return n + ' Gallon';
    return n + u;
  }
  return j;
}

function isPowderLine(line) {
  var ln = (line||'').replace(/\s/g,'').toLowerCase();
  return ln === 'line#1' || ln === 'line1' || ln === 'line#4' || ln === 'line4';
}
function isCapsuleLine(line) {
  var ln = (line||'').replace(/\s/g,'').toLowerCase();
  return ln === 'line#2' || ln === 'line2';
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    allRows = parseCSV(text).filter(isValid);
    lotMap = buildLotMap(allRows);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
    setInterval(refreshData, 5 * 60 * 1000);
  })
  .catch(e => { document.getElementById('loading').textContent = 'Failed to load data: ' + e.message; });

function refreshData() {
  fetch(CSV_URL).then(r => r.text()).then(text => {
    allRows = parseCSV(text).filter(isValid);
    lotMap = buildLotMap(allRows);
    render();
  }).catch(e => console.error('Auto-refresh failed:', e));
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach((b,i) => b.classList.toggle('active',(i===0&&v==='exec')||(i===1&&v==='ops')));
  render();
}

function render() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
  try {
    currentView === 'exec' ? renderExec() : renderOps();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="padding:2rem;color:#F09595;font-size:12px;font-family:monospace">Error: ' + e.message + '<br><br>' + (e.stack||'').split('\n').slice(0,5).join('<br>') + '</div>';
  }
}

function renderExec() {
  var lots = Object.values(lotMap).filter(Boolean);
  var completeLots = lots.filter(function(l) { return l.status.toLowerCase().includes('complete'); });
  var partialLots  = lots.filter(function(l) { return l.status.toLowerCase().includes('partial'); });
  var totalUnits   = lots.reduce(function(s,l) { return s + l.finalUnits; }, 0);
  var totalProj    = lots.reduce(function(s,l) { return s + l.projected; }, 0);
  var uniqueProds  = new Set(lots.map(function(l) { return l.product; })).size;
  var uniqueCustomers = new Set(lots.map(function(l) { return (l.product||'').split('-')[0].trim(); }).filter(Boolean)).size;
  var totalLots    = lots.length;
  var devs         = lots.map(function(l) { return lotDev(l); }).filter(function(d) { return d !== null; });
  var avgDev       = devs.length ? devs.reduce(function(s,d) { return s+d; }, 0) / devs.length : 0;
  var highDevCount = devs.filter(function(d) { return d < -5; }).length;
  var uniqueProductionDays = new Set(lots.map(function(l) { return l.date; }).filter(Boolean)).size;
  var avgUnitsPerDay = uniqueProductionDays ? Math.round(totalUnits / uniqueProductionDays) : 0;
  var devColor = avgDev < -2 ? '#EF9F27' : avgDev > 2 ? '#1D9E75' : '#e8e6e0';
  var devClass  = avgDev < -2 ? 'warn' : avgDev > 2 ? 'good' : '';

  // date range
  var dates = allRows.map(function(r) { return new Date(r['Date']); }).filter(function(d) { return !isNaN(d); });
  var minDate = new Date(Math.min.apply(null, dates)), maxDate = new Date(Math.max.apply(null, dates));
  var fmt = function(d) { return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); };
  if (dates.length) document.getElementById('data-range').textContent = 'Data: ' + fmt(minDate) + ' \u2013 ' + fmt(maxDate);

  // year-end projection
  var now = new Date();
  var dayOfYear = Math.ceil((now - new Date(now.getFullYear(),0,1)) / 86400000);
  var yearProjected = Math.round((totalUnits / dayOfYear) * 365);
  var toTarget = yearProjected - YEAR_TARGET;
  var targetPct = Math.round((yearProjected / YEAR_TARGET) * 100);
  var onTrack = yearProjected >= YEAR_TARGET;
  var actualPct = yearProjected ? ((totalUnits / yearProjected) * 100) : 0;
  var targetOnBarPct = yearProjected ? ((YEAR_TARGET / yearProjected) * 100) : 100;

  // monthly
  var byMonth = {};
  allRows.forEach(function(r) {
    var d = new Date(r['Date']);
    if (isNaN(d)) return;
    var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMonth[key]) byMonth[key] = { year: d.getFullYear(), month: d.getMonth()+1, units: 0 };
    byMonth[key].units += num(r['Final Units']);
  });
  var monthRows = Object.keys(byMonth).sort().map(function(k) {
    var mo = byMonth[k];
    var daysInMonth = new Date(mo.year, mo.month, 0).getDate();
    var daysInYear  = (mo.year%4===0 && (mo.year%100!==0 || mo.year%400===0)) ? 366 : 365;
    var fullMonthTarget = Math.round((daysInMonth / daysInYear) * YEAR_TARGET);
    var isCurrentMonth  = (now.getFullYear()===mo.year && now.getMonth()+1===mo.month);
    var target = isCurrentMonth ? Math.round(fullMonthTarget * now.getDate() / daysInMonth) : fullMonthTarget;
    var pctOfTarget = target ? (mo.units / target) * 100 : 0;
    var label = String(mo.month).padStart(2,'0') + '/' + mo.year;
    return { label: label, units: mo.units, target: target, fullMonthTarget: fullMonthTarget, pctOfTarget: pctOfTarget, isCurrentMonth: isCurrentMonth, daysInMonth: daysInMonth, daysSoFar: now.getDate() };
  });

  // production lines
  var byLine = {};
  lots.forEach(function(l) {
    var line = (l.line||'').trim();
    if (!line) return;
    if (!byLine[line]) byLine[line] = { units: 0, lots: new Set() };
    byLine[line].units += l.finalUnits;
    byLine[line].lots.add(l.lot);
  });
  var lineEntries = Object.entries(byLine).sort(function(a,b) {
    return parseInt(a[0].replace(/\D/g,'')) - parseInt(b[0].replace(/\D/g,''));
  });
  var maxLineUnits = lineEntries[0] ? lineEntries[0][1].units : 1;
  var lineTotal = lineEntries.reduce(function(s,e) { return s + e[1].units; }, 0);
  var lineColors = ['#1D9E75','#378ADD','#7F77DD','#EF9F27'];

  // product type split — AFTER lineEntries is defined
  var powderUnits = 0, capsuleUnits = 0, l1units = 0, l2units = 0, l4units = 0;
  lineEntries.forEach(function(entry) {
    var line = entry[0], u = entry[1].units;
    var ln = line.replace(/\s/g,'').toLowerCase();
    if (ln === 'line#1' || ln === 'line1') { powderUnits += u; l1units = u; }
    else if (ln === 'line#4' || ln === 'line4') { powderUnits += u; l4units = u; }
    else if (ln === 'line#2' || ln === 'line2') { capsuleUnits += u; l2units = u; }
  });
  var powderPct  = totalUnits ? ((powderUnits  / totalUnits) * 100).toFixed(1) : 0;
  var capsulePct = totalUnits ? ((capsuleUnits / totalUnits) * 100).toFixed(1) : 0;

  // powder mix
  var byJar = {};
  lots.forEach(function(l) {
    var k = jarSizeKey(l.jarSize);
    if (!k) return;
    byJar[k] = (byJar[k]||0) + l.finalUnits;
  });
  var jarEntries = Object.entries(byJar).sort(function(a,b) { return b[1]-a[1]; }).slice(0,10);
  var jarTotal = jarEntries.reduce(function(s,e) { return s+e[1]; }, 0);
  var JAR_COLORS = ['#378ADD','#1D9E75','#EF9F27','#D4537E','#7F77DD','#D85A30','#639922','#E24B4A','#85B7EB','#5DCAA5'];

  // weekly
  var byWeek = {};
  allRows.forEach(function(r) {
    var w = (r['WEEK NUMBER']||'').trim();
    if (!w) return;
    byWeek[w] = (byWeek[w]||0) + num(r['Final Units']);
  });
  var currentWeekNum = (function() {
    var d = new Date(now); d.setHours(0,0,0,0);
    var jan1 = new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
  })();
  var weeks = Object.keys(byWeek)
    .sort(function(a,b) { var an=parseFloat(a),bn=parseFloat(b); return (!isNaN(an)&&!isNaN(bn))?an-bn:a.localeCompare(b); })
    .filter(function(w) { return byWeek[w] > 0; }).slice(-8);
  var completedWeekData = weeks.filter(function(w) { return parseInt(w) !== currentWeekNum; }).map(function(w) { return byWeek[w]; });
  var weekAvg = completedWeekData.length ? Math.round(completedWeekData.reduce(function(s,v){return s+v;},0)/completedWeekData.length) : 0;
  var weekData = weeks.map(function(w) { return byWeek[w]; });
  var weekColors = weeks.map(function(w) { return parseInt(w) === currentWeekNum ? 'rgba(55,138,221,0.35)' : '#378ADD'; });
  var weekLabels = weeks.map(function(w) { return parseInt(w) === currentWeekNum ? 'Week ' + w + ' (current)' : 'Week ' + w; });

  // top 10 customers
  var byCust = {};
  lots.forEach(function(l) {
    var cust = (l.product||'').split('-')[0].trim();
    if (!cust) return;
    if (!byCust[cust]) byCust[cust] = { units: 0, lots: 0 };
    byCust[cust].units += l.finalUnits;
    byCust[cust].lots++;
  });
  var top10Cust = Object.entries(byCust).sort(function(a,b) { return b[1].units - a[1].units; }).slice(0,10);
  var maxCustUnits = top10Cust[0] ? top10Cust[0][1].units : 1;

  // ---- BUILD HTML ----
  var metricsHTML =
    '<div class="metric info"><div class="label">Units produced</div><div class="value">' + totalUnits.toLocaleString() + '</div><div class="sub">vs ' + totalProj.toLocaleString() + ' projected</div></div>'
    + '<div class="metric"><div class="label">Avg units / day</div><div class="value">' + avgUnitsPerDay.toLocaleString() + '</div><div class="sub">' + uniqueProductionDays + ' production days</div></div>'
    + '<div class="metric"><div class="label">Total lots</div><div class="value">' + totalLots.toLocaleString() + '</div><div class="sub">' + completeLots.length + ' complete \u00b7 ' + partialLots.length + ' partial</div></div>'
    + '<div class="metric good"><div class="label">Completion rate</div><div class="value">' + pct(completeLots.length,totalLots) + '%</div><div class="sub">' + completeLots.length + ' of ' + totalLots + ' lots</div></div>'
    + '<div class="metric ' + devClass + '"><div class="label">Avg deviation</div><div class="value" style="color:' + devColor + '">' + (avgDev>0?'+':'') + avgDev.toFixed(1) + '%</div><div class="sub">' + highDevCount + ' lots >5% under</div></div>'
    + '<div class="metric"><div class="label">Unique products</div><div class="value">' + uniqueProds + '</div><div class="sub">across all lots</div></div>'
    + '<div class="metric"><div class="label">Unique customers</div><div class="value">' + uniqueCustomers + '</div><div class="sub">across all lots</div></div>';

  var yearEndHTML =
    '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:1.25rem">'
    + '<div><div style="font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Day of year</div><div style="font-size:20px;font-weight:500">' + dayOfYear + ' <span style="font-size:13px;color:#888780">of 365</span></div></div>'
    + '<div><div style="font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Units to date</div><div style="font-size:20px;font-weight:500;color:#378ADD">' + totalUnits.toLocaleString() + '</div></div>'
    + '<div><div style="font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Year-end projection</div><div style="font-size:20px;font-weight:500;color:' + (onTrack?'#1D9E75':'#EF9F27') + '">' + yearProjected.toLocaleString() + '</div></div>'
    + '<div><div style="font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Year-end target</div><div style="font-size:20px;font-weight:500">3,927,000</div></div>'
    + '<div><div style="font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">vs target</div><div style="font-size:20px;font-weight:500;color:' + (onTrack?'#1D9E75':'#EF9F27') + '">' + (onTrack?'+':'') + toTarget.toLocaleString() + ' <span style="font-size:13px">(' + targetPct + '%)</span></div></div>'
    + '</div>'
    + '<div style="position:relative;margin-bottom:36px">'
    + '<div style="background:#2c2c2a;border-radius:8px;height:14px;overflow:visible;position:relative">'
    + '<div style="position:absolute;top:0;left:0;height:100%;width:100%;background:' + (onTrack?'#1D9E75':'#EF9F27') + ';border-radius:8px;opacity:0.2"></div>'
    + '<div style="position:absolute;top:0;left:0;height:100%;width:' + actualPct.toFixed(1) + '%;background:#378ADD;border-radius:8px 0 0 8px"></div>'
    + '<div style="position:absolute;top:-4px;left:' + targetOnBarPct.toFixed(1) + '%;height:22px;width:2px;background:#e8e6e0;border-radius:1px"></div>'
    + '<div style="position:absolute;top:-4px;left:' + actualPct.toFixed(1) + '%;height:22px;width:2px;background:#378ADD;border-radius:1px"></div>'
    + '</div>'
    + '<div style="position:absolute;top:22px;left:' + targetOnBarPct.toFixed(1) + '%;transform:translateX(-50%);font-size:10px;color:#888780;white-space:nowrap;margin-top:4px">Target: 3,927,000</div>'
    + '<div style="position:absolute;top:22px;left:' + actualPct.toFixed(1) + '%;transform:translateX(-50%);font-size:10px;color:#378ADD;white-space:nowrap;margin-top:4px">To date: ' + totalUnits.toLocaleString() + '</div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;font-size:10px;color:#5f5e5a;margin-top:4px"><span>0</span><span style="color:' + (onTrack?'#1D9E75':'#EF9F27') + ';font-weight:500">' + targetPct + '% of target</span><span>' + yearProjected.toLocaleString() + ' (projected)</span></div>'
    + '<div style="display:flex;gap:20px;margin-top:10px">'
    + '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888780"><div style="width:10px;height:10px;border-radius:2px;background:#378ADD"></div>Units to date</div>'
    + '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888780"><div style="width:10px;height:10px;border-radius:2px;background:' + (onTrack?'#1D9E75':'#EF9F27') + ';opacity:0.5"></div>Year-end projection</div>'
    + '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888780"><div style="width:10px;height:10px;border-radius:2px;background:#e8e6e0"></div>Year-end target</div>'
    + '</div>';

  var linesHTML = lineEntries.map(function(entry, i) {
    var line = entry[0], d = entry[1];
    var sp = lineTotal ? ((d.units / lineTotal) * 100) : 0;
    var bw = Math.round((d.units / maxLineUnits) * 100);
    var col = lineColors[i % lineColors.length];
    return '<tr style="border-bottom:0.5px solid #2c2c2a">'
      + '<td style="padding:5px 8px;font-weight:500">' + line + '</td>'
      + '<td style="padding:5px 8px;text-align:right;white-space:nowrap">' + d.units.toLocaleString() + '</td>'
      + '<td style="padding:5px 8px"><div style="background:#2c2c2a;border-radius:3px;height:6px;overflow:hidden"><div style="height:100%;width:' + bw + '%;background:' + col + ';border-radius:3px"></div></div></td>'
      + '<td style="padding:5px 8px;text-align:right;color:#888780">' + sp.toFixed(1) + '%</td>'
      + '<td style="padding:5px 8px;text-align:right;color:#888780">' + d.lots.size.toLocaleString() + '</td>'
      + '</tr>';
  }).join('');

  var typeSplitHTML =
    '<div style="font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem">Product type split</div>'
    + '<div style="display:flex;gap:10px;margin-bottom:1rem">'
    + '<div style="flex:1;background:#141618;border:0.5px solid #2c2c2a;border-radius:8px;padding:.75rem 1rem">'
    + '<div style="font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px">Powder (Lines 1 &amp; 4)</div>'
    + '<div style="font-size:18px;font-weight:500;color:#1D9E75;margin-bottom:3px">' + powderUnits.toLocaleString() + '</div>'
    + '<div style="font-size:10px;color:#5f5e5a;margin-bottom:8px">' + powderPct + '% of total production</div>'
    + '<div style="height:5px;background:#2c2c2a;border-radius:3px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:' + powderPct + '%;background:#1D9E75;border-radius:3px"></div></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:10px;color:#5f5e5a"><span>L1: ' + l1units.toLocaleString() + '</span><span>L4: ' + l4units.toLocaleString() + '</span></div>'
    + '</div>'
    + '<div style="flex:1;background:#141618;border:0.5px solid #2c2c2a;border-radius:8px;padding:.75rem 1rem">'
    + '<div style="font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px">Capsules (Line 2)</div>'
    + '<div style="font-size:18px;font-weight:500;color:#378ADD;margin-bottom:3px">' + capsuleUnits.toLocaleString() + '</div>'
    + '<div style="font-size:10px;color:#5f5e5a;margin-bottom:8px">' + capsulePct + '% of total production</div>'
    + '<div style="height:5px;background:#2c2c2a;border-radius:3px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:' + capsulePct + '%;background:#378ADD;border-radius:3px"></div></div>'
    + '<div style="font-size:10px;color:#5f5e5a">L2: ' + l2units.toLocaleString() + '</div>'
    + '</div></div>'

    + '<div style="font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem">Line breakdown</div>';

  var monthTableHTML = monthRows.map(function(m) {
    var isGreen  = m.pctOfTarget >= 100;
    var isYellow = m.pctOfTarget >= 80 && m.pctOfTarget < 100;
    var pillBg   = isGreen ? '#0F6E56' : isYellow ? '#633806' : '#791F1F';
    var pillText = isGreen ? '#9FE1CB' : isYellow ? '#FAC775' : '#F09595';
    var barColor = isGreen ? '#1D9E75' : isYellow ? '#EF9F27' : '#E24B4A';
    var bw = Math.min(Math.round(m.pctOfTarget), 100);
    var targetLabel = m.isCurrentMonth
      ? m.target.toLocaleString() + '<sup style="color:#9FE1CB;font-size:9px"> *</sup>'
      : m.target.toLocaleString();
    return '<tr>'
      + '<td style="font-weight:500">' + m.label + '</td>'
      + '<td style="text-align:right">' + m.units.toLocaleString() + '</td>'
      + '<td style="text-align:right;color:#888780">' + targetLabel + '</td>'
      + '<td style="text-align:right"><span class="badge" style="background:' + pillBg + ';color:' + pillText + '">' + m.pctOfTarget.toFixed(2) + '%</span></td>'

  var currentMonthRow = monthRows.find(function(m) { return m.isCurrentMonth; });
  var asteriskNote = currentMonthRow
    ? '<div style="font-size:10px;color:#5f5e5a;margin-top:10px;padding-top:8px;border-top:0.5px solid #2c2c2a"><sup style="color:#9FE1CB">*</sup> ' + currentMonthRow.label + ' target adjusted for month-to-date (' + currentMonthRow.daysSoFar + '/' + currentMonthRow.daysInMonth + ' days). Full month target: ' + currentMonthRow.fullMonthTarget.toLocaleString() + '.</div>'
    : '';

  var jarLegendHTML = jarEntries.map(function(entry, i) {
    var j = entry[0], v = entry[1];
    var p = jarTotal ? ((v / jarTotal) * 100).toFixed(1) : 0;
    return '<tr style="border-bottom:0.5px solid #2c2c2a">'
      + '<td style="padding:3px 6px;width:16px"><div style="width:10px;height:10px;border-radius:2px;background:' + JAR_COLORS[i] + '"></div></td>'
      + '<td style="padding:3px 6px;font-weight:500">' + j + '</td>'
      + '<td style="padding:3px 6px;text-align:right;white-space:nowrap">' + v.toLocaleString() + '</td>'
      + '<td style="padding:3px 6px;text-align:right;color:#888780;width:40px">' + p + '%</td>'
      + '</tr>';
  }).join('');

  var custHTML = top10Cust.map(function(entry, i) {
    var cust = entry[0], d = entry[1];
    var avgRun = d.lots ? Math.round(d.units / d.lots) : 0;
    var bw = Math.round((d.units / maxCustUnits) * 100);
    var sharePct = totalUnits ? ((d.units / totalUnits) * 100).toFixed(1) : 0;
    return '<tr>'
      + '<td style="color:#5f5e5a;font-size:11px;width:24px">' + (i+1) + '</td>'
      + '<td style="font-weight:500">' + cust + '</td>'
      + '<td style="text-align:right">' + d.units.toLocaleString() + '</td>'
      + '<td style="padding:6px 10px;width:90px"><div style="background:#2c2c2a;border-radius:2px;height:4px;overflow:hidden"><div style="height:100%;width:' + bw + '%;background:#378ADD;border-radius:2px"></div></div></td>'
      + '<td style="text-align:right;color:#888780">' + d.lots + '</td>'
      + '<td style="text-align:right;color:#888780">' + avgRun.toLocaleString() + '</td>'
      + '<td style="text-align:right;color:#888780">' + sharePct + '%</td>'
      + '</tr>';
  }).join('');

  document.getElementById('content').innerHTML =
    '<div class="metrics">' + metricsHTML + '</div>'

    + '<div class="full-card"><h3>Year-end projection vs target</h3>' + yearEndHTML + '</div>'

    + '<div class="charts-row">'
    + '<div class="chart-card"><h3>Production lines &amp; product type split</h3>'
    + typeSplitHTML
    + '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'
    + '<th style="text-align:left;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Line</th>'
    + '<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Units</th>'
    + '<th style="border-bottom:0.5px solid #2c2c2a"></th>'
    + '<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">% of total</th>'
    + '<th style="text-align:right;padding:4px 8px;color:#888780;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:0.5px solid #2c2c2a">Lots run</th>'
    + '</tr></thead><tbody>' + linesHTML + '</tbody></table>'
    + '</div>'
    + '<div class="chart-card"><h3>Powder product mix \u2014 units by jar size</h3>'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<div style="position:relative;height:200px;min-width:200px;flex-shrink:0"><canvas id="cJar"></canvas></div>'
    + '<div id="jar-legend" style="flex:1;overflow-y:auto"></div>'
    + '</div></div>'
    + '</div>'

    + '<div class="chart-card" style="margin-bottom:10px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">'
    + '<h3 style="margin:0">Weekly units produced \u2014 last 8 weeks</h3>'
    + '<div style="display:flex;gap:16px;align-items:center;font-size:11px;color:#888780">'
    + '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:20px;border-top:2px dashed #EF9F27"></span>8-wk avg: ' + weekAvg.toLocaleString() + '</span>'
    + '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:20px;border-top:2px dashed #1D9E75"></span>Weekly target: ' + WEEKLY_TARGET.toLocaleString() + '</span>'
    + '</div></div>'
    + '<div style="position:relative;height:240px"><canvas id="cWeekly"></canvas></div></div>'

    + '<div class="full-card"><h3>Units produced by month vs. target</h3><div class="tbl-wrap"><table>'
    + '<thead><tr><th>Month</th><th style="text-align:right">Actual</th><th style="text-align:right">Target</th><th style="text-align:right">% of target</th><th></th></tr></thead>'
    + '<tbody>' + monthTableHTML + '</tbody></table>' + asteriskNote + '</div></div>'

    + '<div class="full-card"><h3>Top 10 customers by units produced</h3><div class="tbl-wrap"><table>'
    + '<thead><tr><th style="width:24px">#</th><th>Customer</th><th style="text-align:right">Units produced</th><th style="width:90px"></th><th style="text-align:right">Lots</th><th style="text-align:right">Avg run size</th><th style="text-align:right">% of production</th></tr></thead>'
    + '<tbody>' + custHTML + '</tbody></table></div></div>';

  document.getElementById('jar-legend').innerHTML =
    '<table style="width:100%;border-collapse:collapse;font-size:11px"><tbody>' + jarLegendHTML + '</tbody></table>';

  charts.jar = new Chart(document.getElementById('cJar'), {
    type: 'doughnut',
    data: { labels: jarEntries.map(function(e){return e[0];}), datasets: [{ data: jarEntries.map(function(e){return e[1];}), backgroundColor: JAR_COLORS, borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { var v=ctx.raw, p=jarTotal?((v/jarTotal)*100).toFixed(1):0; return v.toLocaleString()+' units ('+p+'%)'; }}}}}
  });

  charts.weekly = new Chart(document.getElementById('cWeekly'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [
        { type: 'bar', label: 'Units produced', data: weekData, backgroundColor: weekColors, borderRadius: 4, order: 2 },
        { type: 'line', label: '8-week avg', data: weeks.map(function(){ return weekAvg; }), borderColor: '#EF9F27', borderWidth: 2, borderDash: [6,4], pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0, order: 1 },
        { type: 'line', label: 'Weekly target', data: weeks.map(function(){ return WEEKLY_TARGET; }), borderColor: '#1D9E75', borderWidth: 2, borderDash: [6,4], pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0, order: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) {
        if (ctx.dataset.label === '8-week avg') return '8-wk avg: ' + weekAvg.toLocaleString();
        if (ctx.dataset.label === 'Weekly target') return 'Weekly target: ' + WEEKLY_TARGET.toLocaleString();
        return 'Units: ' + ctx.raw.toLocaleString();
      }}}},
      scales: {
        x: { ticks: { color: '#888780', font: { size: 10 }, maxRotation: 20 }, grid: { color: '#2c2c2a' } },
        y: { ticks: { color: '#888780', callback: function(v) { return (v/1000).toFixed(0)+'k'; } }, grid: { color: '#2c2c2a' } }
      }
    },
    plugins: [{
      id: 'barLabels',
      afterDatasetsDraw: function(chart) {
        var ctx = chart.ctx;
        var meta = chart.getDatasetMeta(0);
        ctx.save();
        ctx.font = '500 10px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        meta.data.forEach(function(bar, i) {
          var isCurrent = parseInt(weeks[i]) === currentWeekNum;
          ctx.fillStyle = isCurrent ? 'rgba(133,183,235,0.7)' : '#85B7EB';
          ctx.fillText(weekData[i].toLocaleString(), bar.x, bar.y - 4);
        });
        ctx.restore();
      }
    }]
  });
}

function renderOps() {
  var lots = Object.values(lotMap).filter(Boolean);
  var products    = Array.from(new Set(lots.map(function(l){return l.product;}).filter(Boolean))).sort();
  var weeks       = Array.from(new Set(lots.map(function(l){return l.week;}).filter(Boolean))).sort();
  var bottleSizes = Array.from(new Set(allRows.map(function(r){return r['Bottle Size'];}).filter(Boolean))).sort();
  var jarSizes    = Array.from(new Set(allRows.map(function(r){return r['Jar Size'];}).filter(Boolean))).sort();

  document.getElementById('content').innerHTML =
    '<div class="filters">'
    + '<input type="text" id="fSearch" placeholder="Search lot # or product\u2026" style="min-width:180px" oninput="applyFilters()">'
    + '<select id="fProduct" onchange="applyFilters()"><option value="">All products</option>' + products.map(function(p){return '<option>'+p+'</option>';}).join('') + '</select>'
    + '<select id="fStatus" onchange="applyFilters()"><option value="">All statuses</option><option>Complete</option><option>Partial</option></select>'
    + '<select id="fWeek" onchange="applyFilters()"><option value="">All weeks</option>' + weeks.map(function(w){return '<option>'+w+'</option>';}).join('') + '</select>'
    + '<select id="fBottle" onchange="applyFilters()"><option value="">All bottle sizes</option>' + bottleSizes.map(function(s){return '<option>'+s+'</option>';}).join('') + '</select>'
    + '<select id="fJar" onchange="applyFilters()"><option value="">All jar sizes</option>' + jarSizes.map(function(s){return '<option>'+s+'</option>';}).join('') + '</select>'
    + '<button onclick="clearFilters()" style="font-size:12px;padding:6px 12px;border:0.5px solid #444441;border-radius:8px;background:transparent;cursor:pointer;color:#888780">Clear</button>'
    + '</div>'
    + '<div id="ops-metrics" class="metrics" style="margin-bottom:1rem"></div>'
    + '<div class="full-card"><div class="tbl-wrap"><table style="min-width:600px"><thead><tr>'
    + '<th onclick="sortBy(\'date\')">Date \u21d5</th>'
    + '<th onclick="sortBy(\'lot\')">Lot # \u21d5</th>'
    + '<th onclick="sortBy(\'product\')">Product \u21d5</th>'
    + '<th onclick="sortBy(\'line\')">Line \u21d5</th>'
    + '<th onclick="sortBy(\'bottleSize\')">Bottle \u21d5</th>'
    + '<th onclick="sortBy(\'jarSize\')">Jar \u21d5</th>'
    + '<th onclick="sortBy(\'projected\')">Projected \u21d5</th>'
    + '<th onclick="sortBy(\'finalUnits\')">Final units \u21d5</th>'
    + '<th onclick="sortBy(\'dev\')">Dev % \u21d5</th>'
    + '<th onclick="sortBy(\'status\')">Status \u21d5</th>'
    + '</tr></thead><tbody id="ops-body"></tbody></table></div>'
    + '<div class="pagination"><button id="prevBtn" onclick="changePage(-1)">\u2190 Prev</button><span id="pageInfo"></span><button id="nextBtn" onclick="changePage(1)">Next \u2192</button><span id="rowCount" style="margin-left:auto"></span></div>'
    + '</div>';
  applyFilters();
}

function getFilteredLots() {
  var search = document.getElementById('fSearch') ? document.getElementById('fSearch').value.toLowerCase() : '';
  var prod   = document.getElementById('fProduct') ? document.getElementById('fProduct').value : '';
  var status = document.getElementById('fStatus')  ? document.getElementById('fStatus').value  : '';
  var week   = document.getElementById('fWeek')    ? document.getElementById('fWeek').value    : '';
  var bottle = document.getElementById('fBottle')  ? document.getElementById('fBottle').value  : '';
  var jar    = document.getElementById('fJar')     ? document.getElementById('fJar').value     : '';
  return Object.values(lotMap).filter(Boolean).filter(function(l) {
    if (search && !(l.lot.toLowerCase().includes(search) || l.product.toLowerCase().includes(search))) return false;
    if (prod   && l.product    !== prod)   return false;
    if (status && !l.status.toLowerCase().includes(status.toLowerCase())) return false;
    if (week   && l.week       !== week)   return false;
    if (bottle && l.bottleSize !== bottle) return false;
    if (jar    && l.jarSize    !== jar)    return false;
    return true;
  });
}

function applyFilters() { page = 1; updateOpsTable(); }
function clearFilters() { ['fSearch','fProduct','fStatus','fWeek','fBottle','fJar'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';}); applyFilters(); }
function sortBy(col) { if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; } updateOpsTable(); }
function changePage(dir) { page+=dir; updateOpsTable(); }

function updateOpsTable() {
  var lots = getFilteredLots();
  if (sortCol) {
    lots = lots.slice().sort(function(a,b) {
      var av = a[sortCol]!=null?a[sortCol]:'', bv = b[sortCol]!=null?b[sortCol]:'';
      if (sortCol==='dev') { av=lotDev(a)!=null?lotDev(a):-999; bv=lotDev(b)!=null?lotDev(b):-999; }
      if (sortCol==='date') { return (new Date(av)-new Date(bv))*sortDir; }
      if (typeof av==='number'||!isNaN(parseFloat(av))) return (parseFloat(av)-parseFloat(bv))*sortDir;
      return String(av).localeCompare(String(bv))*sortDir;
    });
  }
  var total=lots.length, totalPages=Math.ceil(total/PAGE_SIZE)||1;
  page=Math.min(Math.max(1,page),totalPages);
  var slice=lots.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  var totalProj=lots.reduce(function(s,l){return s+l.projected;},0);
  var totalFinal=lots.reduce(function(s,l){return s+l.finalUnits;},0);
  var complete=lots.filter(function(l){return l.status.toLowerCase().includes('complete');}).length;
  var devs=lots.map(function(l){return lotDev(l);}).filter(function(d){return d!==null;});
  var avgDev=devs.length?devs.reduce(function(s,d){return s+d;},0)/devs.length:0;
  var dc=avgDev<-2?'#EF9F27':avgDev>2?'#1D9E75':'#e8e6e0';
  var om=document.getElementById('ops-metrics');
  if(om) om.innerHTML=
    '<div class="metric info"><div class="label">Lots shown</div><div class="value">'+total.toLocaleString()+'</div></div>'
    +'<div class="metric"><div class="label">Units produced</div><div class="value">'+totalFinal.toLocaleString()+'</div><div class="sub">vs '+totalProj.toLocaleString()+' projected</div></div>'
    +'<div class="metric"><div class="label">Avg deviation</div><div class="value" style="color:'+dc+'">'+(avgDev>0?'+':'')+avgDev.toFixed(1)+'%</div><div class="sub">lot by lot</div></div>'
    +'<div class="metric good"><div class="label">Complete lots</div><div class="value">'+complete+'</div><div class="sub">of '+total+' shown</div></div>';
  var body=document.getElementById('ops-body');
  if(!body) return;
  body.innerHTML=slice.map(function(l){
    var dev=lotDev(l);
    var devStr=dev!==null?(dev>0?'+':'')+dev.toFixed(1)+'%':'\u2014';
    var devCls=dev!==null&&Math.abs(dev)>=5?(dev<0?'neg-dev':'pos-dev'):'';
    var st=l.status.toLowerCase();
    var badgeCls=st.includes('complete')?'complete':st.includes('partial')?'partial':'';
    return '<tr>'
      +'<td>'+l.date+'</td>'
      +'<td style="font-weight:500">'+l.lot+'</td>'
      +'<td>'+l.product+'</td>'
      +'<td>'+(l.line||'\u2014')+'</td>'
      +'<td>'+(l.bottleSize||'\u2014')+'</td>'
      +'<td>'+(l.jarSize||'\u2014')+'</td>'
      +'<td style="text-align:right">'+(l.projected?l.projected.toLocaleString():'\u2014')+'</td>'
      +'<td style="text-align:right">'+(l.finalUnits?l.finalUnits.toLocaleString():'\u2014')+'</td>'
      +'<td>'+(dev!==null?'<span class="badge '+devCls+'">'+devStr+'</span>':'\u2014')+'</td>'
      +'<td><span class="badge '+badgeCls+'">'+(l.status||'\u2014')+'</span></td>'
      +'</tr>';
  }).join('');
  var pi=document.getElementById('pageInfo'),pb=document.getElementById('prevBtn'),nb=document.getElementById('nextBtn'),rc=document.getElementById('rowCount');
  if(pi) pi.textContent='Page '+page+' of '+totalPages;
  if(pb) pb.disabled=page<=1;
  if(nb) nb.disabled=page>=totalPages;
  if(rc) rc.textContent=total.toLocaleString()+' lots';
}
</script>
</body>
